// LICENSE TAB
// ══════════════════════════════════════════════════
function LicenseTab({ vehicles, saveVehicles, saveOneVehicle, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [detail, setDetail] = useState(null);
  const [renewing, setRenewing] = useState(null);
  const [search, setSearch] = useState("");
  const [saving, setSaving] = useState(false);
  const [quickIns, setQuickIns] = useState({});
  const [form, setForm] = useState({ plate:"", type:"", fuelType:"", license_exp:"", insurance_exp:"" });
  const [rForm, setRForm] = useState({ kind:"ترخيص", date:"", amount:"" });

  const statusOf = exp => {
    if (!exp) return { label:"غير مدخل", color:T.sub };
    try {
      const expMs = new Date(exp).setHours(0,0,0,0);
      const todayMs = new Date().setHours(0,0,0,0);
      if (isNaN(expMs)) return { label:"غير مدخل", color:T.sub };
      const diff = Math.floor((expMs - todayMs) / 86400000);
      if (diff < 0) return { label:"منتهي", color:T.red };
      if (diff <= 3) return { label:`${diff} أيام — شديد`, color:T.red };
      if (diff <= 7) return { label:`${diff} أيام — عالي`, color:T.orange };
      if (diff <= 14) return { label:`${diff} يوم — تنبيه`, color:T.yellow };
      return { label:"ساري", color:T.green };
    } catch(e) { return { label:"غير مدخل", color:T.sub }; }
  };

  const worstColor = v => {
    const order = [T.red, T.orange, T.yellow, T.green, T.sub];
    const ls = statusOf(v.license_exp), is = statusOf(v.insurance_exp);
    return order.indexOf(ls.color) < order.indexOf(is.color) ? ls.color : is.color;
  };

  const green = vehicles.filter(v => worstColor(v)===T.green).length;
  const warn = vehicles.filter(v => [T.yellow,T.orange].includes(worstColor(v))).length;
  const expd = vehicles.filter(v => worstColor(v)===T.red).length;

  const displayed = vehicles.filter(v => {
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    return true;
  });

  const updateField = async (vehId, field, val) => { const veh=vehicles.find(v=>v.id===vehId); await saveOneVehicle({...veh,[field]:val}); };
  const addVehicle = async () => { if (!form.plate||saving) return; setSaving(true); await saveOneVehicle({...form,id:uid(),regNum:"",make:"",renewHistory:[]}); setForm({plate:"",type:"",fuelType:"",license_exp:"",insurance_exp:""}); setShowAdd(false); setSaving(false); };
  const doRenew = async () => {
    if (!rForm.kind||!rForm.date||saving) return;
    setSaving(true);
    const veh = vehicles.find(v=>v.id===renewing.id);
    const h = [...(veh.renewHistory||[]), {...rForm, addedAt:new Date().toISOString()}];
    const up = {...veh, renewHistory:h};
    if (rForm.kind==="ترخيص") up.license_exp = rForm.date; else up.insurance_exp = rForm.date;
    await saveOneVehicle(up);
    setRenewing(null); setRForm({ kind:"ترخيص", date:"", amount:"" }); setSaving(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="📋 الترخيص والتأمين" onBack={onBack}/>
      <div style={{ padding:"14px 14px 0", display:"flex", gap:8 }}>
        <StatBox icon="✅" label="سارية" value={green} color={T.green}/>
        <StatBox icon="⚠️" label="تحتاج انتباه" value={warn} color={T.yellow}/>
        <StatBox icon="🔴" label="منتهية" value={expd} color={T.red}/>
      </div>
      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>
      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث برقم اللوحة أو النوع"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v => {
          const ls = statusOf(v.license_exp), is_ = statusOf(v.insurance_exp), wc = worstColor(v);
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${wc}33`, borderRight:`4px solid ${wc}` }}>
              <div style={{ padding:"14px 16px", cursor:"pointer" }} onClick={()=>setDetail(v)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  <span style={{ color:T.sub, ...GF, fontSize:12 }}>{v.type}</span>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                    <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>الترخيص</div>
                    <div style={{ color:T.text, ...GF, fontSize:12, marginBottom:6 }}>{v.license_exp?toDateStr(v.license_exp):"غير مدخل"}</div>
                    <Badge label={ls.label} color={ls.color}/>
                  </div>
                  <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                    <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>التأمين</div>
                    <div style={{ color:T.text, ...GF, fontSize:12, marginBottom:6 }}>{v.insurance_exp?toDateStr(v.insurance_exp):"غير مدخل"}</div>
                    <Badge label={is_.label} color={is_.color}/>
                  </div>
                </div>
              </div>
              {/* Quick insurance input if missing */}
              {!v.insurance_exp && (
                <div style={{ padding:"0 14px 14px", borderTop:`1px solid ${T.border}`, paddingTop:12 }}>
                  <div style={{ color:T.sub, ...GF, fontSize:11, marginBottom:6 }}>أدخل تاريخ انتهاء التأمين:</div>
                  <div style={{ display:"flex", gap:8 }}>
                    <input type="date" value={quickIns[v.id]||""}
                      onChange={e=>setQuickIns(q=>({...q,[v.id]:e.target.value}))}
                      style={{ flex:1, background:T.card2, border:`1px solid ${T.gold}44`, borderRadius:8, padding:"8px 12px", color:T.text, fontSize:12, ...GF, outline:"none" }}/>
                    <button onClick={()=>{ const val=quickIns[v.id]; if(val){ updateField(v.id,"insurance_exp",val); setQuickIns(q=>({...q,[v.id]:""})); } }}
                      style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"8px 14px", cursor:"pointer", ...GF, fontWeight:700, fontSize:13 }}>حفظ</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ padding:"0 14px" }}>
        <Btn label="+ إضافة مركبة" onClick={()=>setShowAdd(true)} full color={T.gold}/>
      </div>

      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="إضافة مركبة جديدة">
        <Field label="رقم اللوحة" value={form.plate} onChange={v=>setForm({...form,plate:v})} req/>
        <Field label="نوع المركبة (اختياري)" value={form.type} onChange={v=>setForm({...form,type:v})}/>
        <div style={{marginBottom:14}}>
          <label style={{color:T.sub,fontSize:12,...GF,display:"block",marginBottom:6}}>نوع الوقود</label>
          <select value={form.fuelType||""} onChange={e=>setForm({...form,fuelType:e.target.value})}
            style={{width:"100%",background:T.card2,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,...GF,boxSizing:"border-box",outline:"none"}}>
            <option value="">بنزين / ديزل</option>
            <option value="electric">⚡ كهربائية</option>
            <option value="hybrid">🔋 هايبرد</option>
          </select>
        </div>
        <Field label="تاريخ انتهاء الترخيص" value={form.license_exp} onChange={v=>setForm({...form,license_exp:v})} type="date"/>
        <Field label="تاريخ انتهاء التأمين" value={form.insurance_exp} onChange={v=>setForm({...form,insurance_exp:v})} type="date"/>
        <Btn label="✓ حفظ المركبة" onClick={addVehicle} full color={T.gold}/>
      </Modal>

      <Modal show={!!detail} onClose={()=>setDetail(null)} title={detail?.plate||""}>
        {detail && (
          <div>
            <div style={{ background:T.card2, borderRadius:12, padding:16, marginBottom:16 }}>
              {[["نوع المركبة",detail.type||"—"],["انتهاء الترخيص",detail.license_exp?toDateStr(detail.license_exp):"غير مدخل"],["انتهاء التأمين",detail.insurance_exp?toDateStr(detail.insurance_exp):"غير مدخل"]].map(([k,v]) => (
                <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ color:T.sub, ...GF, fontSize:13 }}>{k}</span>
                  <span style={{ color:T.text, ...GF, fontSize:13 }}>{v}</span>
                </div>
              ))}
            </div>
            <Field label="تحديث تاريخ انتهاء التأمين" value={detail.insurance_exp||""} onChange={v=>{ updateField(detail.id,"insurance_exp",v); setDetail({...detail,insurance_exp:v}); }} type="date"/>
            <Field label="تحديث تاريخ انتهاء الترخيص" value={detail.license_exp||""} onChange={v=>{ updateField(detail.id,"license_exp",v); setDetail({...detail,license_exp:v}); }} type="date"/>
            {(detail.renewHistory||[]).length>0 && (
              <div style={{ marginBottom:16 }}>
                <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:10 }}>سجل التجديدات</p>
                {detail.renewHistory.map((r,i) => (
                  <div key={i} style={{ background:T.card2, borderRadius:10, padding:"8px 12px", marginBottom:8, display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:T.text, ...GF, fontSize:13 }}>{r.kind}</span>
                    <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(r.date)}{r.amount?` | ${r.amount} د.أ`:""}</span>
                  </div>
                ))}
              </div>
            )}
            <Btn label="🔄 تجديد" onClick={()=>{ setRenewing(detail); setDetail(null); }} full color={T.blue}/>
          </div>
        )}
      </Modal>

      <Modal show={!!renewing} onClose={()=>setRenewing(null)} title={`تجديد — ${renewing?.plate}`}>
        {renewing && (
          <div>
            <FieldSelect label="نوع التجديد" value={rForm.kind} onChange={v=>setRForm({...rForm,kind:v})} opts={["ترخيص","تأمين"]} req/>
            <Field label="تاريخ الانتهاء الجديد" value={rForm.date} onChange={v=>setRForm({...rForm,date:v})} type="date" req/>
            <Field label="المبلغ المدفوع (اختياري)" value={rForm.amount} onChange={v=>setRForm({...rForm,amount:v})} type="number"/>
            <Btn label="✓ حفظ التجديد" onClick={doRenew} full color={T.gold}/>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ══════════════════════════════════════════════════
// HANDOVER TAB
// ══════════════════════════════════════════════════
function HandoverTab({ handovers, saveHandovers, vehicles, equipmentList, myPhone, drivers, onBack, onRefresh }) {
  const [selVeh, setSelVeh] = useState("");
  const [formVeh, setFormVeh] = useState(null);
  const [histVeh, setHistVeh] = useState(null);
  const [histPhotos, setHistPhotos] = useState({});
  const [loadingPhotos, setLoadingPhotos] = useState(false);
  const [search, setSearch] = useState("");
  const [showSig, setShowSig] = useState(false);
  const [saving, setSaving] = useState(false);
  const [formTime, setFormTime] = useState(null);
  const [form, setForm] = useState({ type:"استلام", driver:"", equip:{}, photos:{f:null,b:null,r:null,l:null}, signature:null });
  const [blockMsg, setBlockMsg] = useState("");
  const [photoFiles, setPhotoFiles] = useState({f:null,b:null,r:null,l:null});
  const [photoPreviews, setPhotoPreviews] = useState({f:null,b:null,r:null,l:null});

  // حالة أي سائق: هل عنده مركبة الآن؟
  const getDriverStatus = (driverName) => {
    const dh = handovers.filter(h=>h.driver===driverName).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if (!dh.length) return null;
    const last = dh[dh.length-1];
    if (last.type==="استلام") {
      const veh = vehicles.find(v=>v.id===last.vehicleId);
      return { plate:veh?.plate||"—", since:last.date, vehicleId:last.vehicleId };
    }
    return null;
  };

  // من يحمل هذه المركبة الآن؟
  const getCurrentHolder = (vehicleId) => {
    const vh = handovers.filter(h=>h.vehicleId===vehicleId).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if (!vh.length) return null;
    const last = vh[vh.length-1];
    return last.type==="استلام" ? last.driver : null;
  };

  // إعادة ضبط ذكي: تحديد النوع والسائق والعدة تلقائياً حسب حالة المركبة
  useEffect(() => {
    if (formVeh) {
      const holder = getCurrentHolder(formVeh);
      // جلب العدة من آخر سند استلام للمركبة
      const vehH = handovers.filter(h=>h.vehicleId===formVeh).sort((a,b)=>new Date(a.date)-new Date(b.date));
      const lastHandover = vehH.length ? vehH[vehH.length-1] : null;
      const lastEquip = (lastHandover?.type==="استلام" && lastHandover?.equip) ? lastHandover.equip : {};
      setForm({
        type: holder ? "تسليم" : "استلام",
        driver: holder || "",
        equip: holder ? lastEquip : {},
        photos:{f:null,b:null,r:null,l:null}, signature:null
      });
      setFormTime(new Date());
      setBlockMsg("");
      // تنظيف الصور المؤقتة
      setPhotoFiles({f:null,b:null,r:null,l:null});
      setPhotoPreviews(prev => { Object.values(prev).forEach(u=>u&&URL.revokeObjectURL(u)); return {f:null,b:null,r:null,l:null}; });
    }
  }, [formVeh]);

  const closeFormVeh = () => {
    Object.values(photoPreviews).forEach(u=>u&&URL.revokeObjectURL(u));
    setPhotoFiles({f:null,b:null,r:null,l:null});
    setPhotoPreviews({f:null,b:null,r:null,l:null});
    setForm({ type:"استلام", driver:"", equip:{}, photos:{f:null,b:null,r:null,l:null}, signature:null });
    setFormVeh(null);
  };
  const vehHandovers = id => handovers.filter(h=>h.vehicleId===id).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const lastH = id => { const a=vehHandovers(id); return a.length?a[a.length-1]:null; };

  const handlePhotoSelect = (side, e) => {
    const file = e.target.files[0]; if (!file) return;
    setPhotoPreviews(prev => {
      if (prev[side]) URL.revokeObjectURL(prev[side]);
      return {...prev, [side]: URL.createObjectURL(file)};
    });
    setPhotoFiles(prev => ({...prev, [side]: file}));
  };

  const submit = async () => {
    if (!form.driver||!form.type||saving) return;
    // ── منع كلي: السائق مستلم مركبة أخرى ──
    if (form.type==="استلام") {
      const dStatus = getDriverStatus(form.driver);
      if (dStatus) {
        setBlockMsg(`⛔ ${form.driver} مستلم مركبة ${dStatus.plate} منذ ${toDateStr(dStatus.since)} — يجب تسجيل التسليم أولاً`);
        return;
      }
    }
    setBlockMsg("");
    setSaving(true);
    const hId = uid();
    const submitTime = new Date();
    // ── رفع الصور على Supabase Storage ──
    const uploadedPhotos = {f:null,b:null,r:null,l:null};
    for (const side of ["f","b","r","l"]) {
      if (photoFiles[side]) {
        try { uploadedPhotos[side] = await DB.uploadPhoto(photoFiles[side], hId, side); }
        catch(e) { console.error(`Photo upload error [${side}]:`, e); }
      }
    }
    const rec = { id:hId, vehicleId:formVeh, type:form.type, driver:form.driver, date:submitTime.toISOString(), equip:form.equip, photos:uploadedPhotos, signature:form.signature };
    await saveHandovers(rec);
    // إرسال سند واتساب
    if (myPhone) {
      const veh = vehicles.find(v=>v.id===formVeh);
      const equippedItems = Object.entries(form.equip).filter(([,v])=>v).map(([k])=>k);
      const photoCount = Object.values(uploadedPhotos).filter(Boolean).length;
      let msg = `🔑 *سند ${form.type} — الأثر الذهبي*\n\n🚗 المركبة: ${veh?.plate}\n👤 السائق: ${form.driver}\n📅 ${submitTime.toLocaleDateString("ar-JO")} ${fmt12(submitTime)}\n`;
      if (equippedItems.length) msg += `✓ العدة: ${equippedItems.join("، ")}\n`;
      if (photoCount) msg += `📷 الصور: ${photoCount} صورة محفوظة\n`;
      sendWA(myPhone, msg);
    }
    // تنظيف الصور المؤقتة من الذاكرة
    Object.values(photoPreviews).forEach(u=>u&&URL.revokeObjectURL(u));
    setPhotoFiles({f:null,b:null,r:null,l:null});
    setPhotoPreviews({f:null,b:null,r:null,l:null});
    setFormVeh(null);
    setSaving(false);
  };

  const photoSides = [{k:"f",l:"أمامية"},{k:"b",l:"خلفية"},{k:"r",l:"يمين"},{k:"l",l:"يسار"}];
  const displayed = vehicles.filter(v => {
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    return true;
  });

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:T.card2,padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}>
        <button onClick={onBack} style={{background:T.gold,color:"#000",border:"none",borderRadius:10,padding:"8px 16px",...GF,fontWeight:700,fontSize:13,cursor:"pointer"}}>← رجوع</button>
        <span style={{color:T.text,...GF,fontWeight:700,fontSize:16}}>🔑 الاستلام والتسليم</span>
        <button onClick={onRefresh} style={{background:T.card,color:T.blue,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 14px",...GF,fontSize:13,cursor:"pointer"}}>🔄 تحديث</button>
      </div>
      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>
      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v => {
          const last = lastH(v.id), lc = last?.type==="استلام" ? T.blue : T.green;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${T.border}`, overflow:"hidden" }}>
              <div style={{ padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  {last && <Badge label={last.type} color={lc}/>}
                </div>
                {v.type && <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:4 }}>{v.type}</div>}
                {last && <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>👤 {last.driver} — {toDateStr(last.date)} {fmt12(last.date)}</div>}
              </div>
              <div style={{ display:"flex", borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>setFormVeh(v.id)} style={{ flex:1, background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ إجراء جديد</button>
                <button onClick={async()=>{ setHistVeh(v); setHistPhotos({}); setLoadingPhotos(true); const p=await DB.getHandoverPhotos(v.id); setHistPhotos(p); setLoadingPhotos(false); }} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.sub, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>📂 السجل</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Form Modal */}
      <Modal show={!!formVeh} onClose={closeFormVeh} title={`إجراء — ${vehicles.find(v=>v.id===formVeh)?.plate||""}`}>
        <div style={{ background:T.card2, borderRadius:12, padding:"10px 14px", marginBottom:14, border:`1px solid ${T.gold}33` }}>
          <div style={{ color:T.sub, ...GF, fontSize:11 }}>التاريخ والوقت (تلقائي)</div>
          <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700, marginTop:4 }}>{formTime ? `${formTime.toLocaleDateString("ar-JO")} — ${fmt12(formTime)}` : "—"}</div>
        </div>
        <FieldSelect label="الحالة" value={form.type} onChange={v=>{ setForm({...form,type:v,driver:""}); setBlockMsg(""); }} opts={["استلام","تسليم"]} req/>

        {/* قائمة السائقين الذكية */}
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>اسم السائق *</label>
          <select value={form.driver} onChange={e=>{ setForm({...form,driver:e.target.value}); setBlockMsg(""); }}
            style={{ width:"100%", background:T.card2, border:`1px solid ${form.driver?T.gold:T.border}`, borderRadius:10, padding:"11px 14px", color:form.driver?T.text:T.sub, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}>
            <option value="">— اختر السائق —</option>
            {form.type==="استلام"
              ? drivers.filter(d=>!getDriverStatus(d.name)).map(d=><option key={d.id} value={d.name}>{d.name}</option>)
              : drivers.map(d=>{ const st=getDriverStatus(d.name); return <option key={d.id} value={d.name}>{d.name}{st?` 🔴 (${st.plate})`:""}</option>; })
            }
          </select>
          {form.type==="استلام" && drivers.filter(d=>getDriverStatus(d.name)).length>0 && (
            <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:6 }}>
              {drivers.filter(d=>getDriverStatus(d.name)).length} سائق مشغول غير معروض
            </div>
          )}
        </div>
        {blockMsg && <div style={{ background:T.red+"22", borderRadius:10, padding:"10px 14px", marginBottom:14, color:T.red, ...GF, fontSize:13 }}>{blockMsg}</div>}

        {/* Equipment checklist */}
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>عدة المركبة</label>
          <div style={{ background:T.card2, borderRadius:12, padding:"12px 14px" }}>
            {equipmentList.map(item => (
              <label key={item} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, cursor:"pointer" }}>
                <input type="checkbox" checked={!!form.equip[item]} onChange={e=>setForm(f=>({...f,equip:{...f.equip,[item]:e.target.checked}}))}
                  style={{ width:18, height:18, accentColor:T.gold, flexShrink:0 }}/>
                <span style={{ color:T.text, ...GF, fontSize:14 }}>{item}</span>
              </label>
            ))}
          </div>
        </div>

        {/* مقارنة الصور عند التسليم */}
        {form.type==="تسليم" && (() => {
          const prevH = [...handovers].filter(h=>h.vehicleId===formVeh).sort((a,b)=>new Date(a.date)-new Date(b.date));
          const lastReceive = [...prevH].reverse().find(h=>h.type==="استلام");
          if (!lastReceive) return null;
          const prevPhotos = Object.entries(lastReceive.photos||{}).filter(([,v])=>v);
          if (!prevPhotos.length) return null;
          const sideLabel = {f:"أمامية",b:"خلفية",r:"يمين",l:"يسار"};
          return (
            <div style={{ marginBottom:14 }}>
              <div style={{ background:T.blue+"11", border:`1px solid ${T.blue}33`, borderRadius:14, padding:"12px 14px" }}>
                <div style={{ color:T.blue, ...GF, fontSize:12, fontWeight:700, marginBottom:10 }}>
                  🔍 صور الاستلام السابق للمقارنة
                  <span style={{ color:T.sub, fontWeight:400, marginRight:6 }}>{toDateStr(lastReceive.date)} — {lastReceive.driver}</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  {prevPhotos.map(([s,src]) => (
                    <div key={s} style={{ background:T.card3, borderRadius:10, overflow:"hidden" }}>
                      <img src={src} style={{ width:"100%", height:72, objectFit:"cover", display:"block" }} alt={sideLabel[s]||s}
                        onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}/>
                      <div style={{ display:"none", height:72, alignItems:"center", justifyContent:"center", color:T.sub, fontSize:12, ...GF }}>لا توجد صورة</div>
                      <div style={{ padding:"4px 8px", color:T.blue, ...GF, fontSize:10, textAlign:"center" }}>{sideLabel[s]||s}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        })()}

        {/* Photos */}
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>
            📷 صور المركبة الحالية (اختياري)
            {Object.values(photoFiles).filter(Boolean).length > 0 &&
              <span style={{ color:T.gold, marginRight:8 }}>{Object.values(photoFiles).filter(Boolean).length} صورة ✓</span>}
          </label>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {photoSides.map(({k,l}) => (
              <div key={k}>
                <input type="file" accept="image/*" capture="environment" onChange={e=>handlePhotoSelect(k,e)} style={{ display:"none" }} id={`ph-${k}`}/>
                <label htmlFor={`ph-${k}`} style={{ display:"block", background:T.card2, borderRadius:10, border:`2px dashed ${photoPreviews[k]?T.gold:T.border}`, padding:"14px 8px", textAlign:"center", cursor:"pointer" }}>
                  {photoPreviews[k]
                    ? <img src={photoPreviews[k]} style={{ width:"100%", height:55, objectFit:"cover", borderRadius:8 }} alt=""/>
                    : <><div style={{ fontSize:22 }}>📷</div><div style={{ color:T.sub, ...GF, fontSize:11, marginTop:4 }}>{l}</div></>}
                </label>
              </div>
            ))}
          </div>
        </div>

        {/* Signature */}
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>توقيع السائق</label>
          {form.signature
            ? <div style={{ background:T.card2, borderRadius:12, padding:8, position:"relative" }}>
                <img src={form.signature} style={{ width:"100%", borderRadius:8, maxHeight:120, objectFit:"contain" }} alt="توقيع"/>
                <button onClick={()=>setForm(f=>({...f,signature:null}))} style={{ position:"absolute", top:8, left:8, background:T.red, border:"none", color:"#fff", borderRadius:6, padding:"4px 8px", cursor:"pointer", ...GF, fontSize:11 }}>إعادة</button>
              </div>
            : <button onClick={()=>setShowSig(true)} style={{ width:"100%", background:T.card2, border:`2px dashed ${T.gold}44`, borderRadius:12, padding:"16px", color:T.sub, cursor:"pointer", ...GF, fontSize:13 }}>✍️ اضغط للتوقيع</button>
          }
        </div>

        <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ الإجراء وإرسال السند"} onClick={submit} full color={T.gold} disabled={saving}/>
      </Modal>

      {/* Signature Modal */}
      <Modal show={showSig} onClose={()=>setShowSig(false)} title="توقيع السائق">
        <SignaturePad onSave={sig=>{ setForm(f=>({...f,signature:sig})); setShowSig(false); }} onCancel={()=>setShowSig(false)}/>
      </Modal>

      {/* History Modal */}
      <Modal show={!!histVeh} onClose={()=>{ setHistVeh(null); setHistPhotos({}); }} title={`سجل — ${histVeh?.plate}`}>
        {histVeh && (() => {
          const records = vehHandovers(histVeh.id).reverse();
          if (!records.length) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:24 }}>لا يوجد سجل بعد</div>;
          return records.map(h => {
            const hc = h.type==="استلام" ? T.blue : T.green;
            const equippedItems = Object.entries(h.equip||{}).filter(([,v])=>v).map(([k])=>k);
            const photos = Object.entries(histPhotos[h.id]||{}).filter(([,v])=>v);
            return (
              <div key={h.id} style={{ background:T.card2, borderRadius:14, padding:"12px 14px", marginBottom:12, borderRight:`3px solid ${hc}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <Badge label={h.type} color={hc}/>
                  <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(h.date)} {fmt12(h.date)}</span>
                </div>
                <div style={{ color:T.text, ...GF, marginTop:8, fontWeight:600 }}>👤 {h.driver}</div>
                {equippedItems.length>0 && <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>✓ {equippedItems.join("، ")}</div>}
                {h.signature && <img src={h.signature} style={{ width:"100%", maxHeight:80, objectFit:"contain", borderRadius:8, marginTop:8 }} alt="توقيع"/>}
                {photos.length>0 && (
                  <div style={{ display:"flex", gap:6, marginTop:8, flexWrap:"wrap" }}>
                    {photos.map(([s,src]) => <img key={s} src={src} style={{ width:52, height:52, objectFit:"cover", borderRadius:8 }} alt=""/>)}
                  </div>
                )}
              </div>
            );
          });
        })()}
      </Modal>
    </div>
  );
}

// ══════════════════════════════════════════════════
// MAINTENANCE TAB
// ══════════════════════════════════════════════════
function MaintenanceTab({ records, saveRecords, vehicles, fuelRecords, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [addVeh, setAddVeh] = useState(null);
  const [histVeh, setHistVeh] = useState(null);
  const [confirmVeh, setConfirmVeh] = useState(null);
  const [search, setSearch] = useState("");
  const [saving, setSaving] = useState(false);
  const [editVeh, setEditVeh] = useState(null);
  const [editForm, setEditForm] = useState({filterOil:1,filterDiesel:1,filterAir:1,brakes:1});
  const [form, setForm] = useState({ oilKm:"", date:todayISO(), filterOil:1, filterDiesel:1, filterAir:1, brakes:1 });

  const vehRecs = id => records.filter(r=>r.vehicleId===id).sort((a,b)=>a.oilKm-b.oilKm);

  const calcStatus = id => {
    const vr = vehRecs(id);
    const fRecs = fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>b.currKm-a.currKm);
    const latestFuelKm = fRecs.length ? fRecs[0].currKm : null;
    if (!vr.length) return { noData:true, latestFuelKm };
    const last = vr[vr.length-1];
    const nextOil = last.nextOilKm || (last.oilKm+5000);
    const alerts = [];
    if ((last.filterOil||0) >= 2) alerts.push({ label:"فلتر الزيت" });
    if ((last.filterDiesel||0) >= 3) alerts.push({ label:"فلتر الديزل" });
    if ((last.filterAir||0) >= 3) alerts.push({ label:"فلتر الهواء" });
    if ((last.brakes||0) >= 3) alerts.push({ label:"البريكات" });
    const twoMo = new Date(); twoMo.setMonth(twoMo.getMonth()-2);
    const noService = new Date(last.date) < twoMo;
    let oilFromFuel = null;
    if (latestFuelKm) {
      const diff = nextOil - latestFuelKm;
      if (diff<=0) oilFromFuel = { msg:`عداد المحروقات تجاوز موعد الغيار بـ ${Math.abs(diff).toLocaleString()} كلم`, color:T.red };
      else if (diff<=500) oilFromFuel = { msg:`موعد غيار الزيت خلال ${diff.toLocaleString()} كلم`, color:T.orange };
    }
    return { nextOil, lastKm:last.oilKm, lastDate:last.date, filterOil:last.filterOil||1, filterDiesel:last.filterDiesel||1, filterAir:last.filterAir||1, brakes:last.brakes||1, alerts, noService, latestFuelKm, oilFromFuel };
  };

  const thisMonth = records.filter(r => {
    const d = new Date(r.date||r.addedAt), n = new Date();
    return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
  }).length;

  const sorted = [...vehicles].sort((a,b) => {
    const sa = calcStatus(a.id), sb = calcStatus(b.id);
    if (sa.noData && !sb.noData) return 1;
    if (!sa.noData && sb.noData) return -1;
    return (sa.nextOil||9999999) - (sb.nextOil||9999999);
  });

  const displayed = sorted.filter(v => {
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    return true;
  });

  const doAdd = async () => {
    if (!form.oilKm||!form.date||saving) return;
    setSaving(true);
    const nextOilKm = (+form.oilKm) + 5000;
    const rec = { id:uid(), vehicleId:addVeh, oilKm:+form.oilKm, nextOilKm, date:form.date,
      filterOil:+form.filterOil, filterDiesel:+form.filterDiesel, filterAir:+form.filterAir, brakes:+form.brakes };
    await saveRecords(rec);
    setForm({ oilKm:"", date:todayISO(), filterOil:1, filterDiesel:1, filterAir:1, brakes:1 });
    setAddVeh(null);
    setSaving(false);
  };

  const confirmOilChange = veh => {
    const vr = vehRecs(veh.id);
    if (!vr.length) return;
    const last = vr[vr.length-1];
    const fRecs = fuelRecords.filter(r=>r.vehicleId===veh.id).sort((a,b)=>b.currKm-a.currKm);
    const currKm = fRecs.length ? fRecs[0].currKm : last.oilKm+5000;
    const newFilterOil = (last.filterOil||0)>=2 ? 1 : (last.filterOil||0)+1;
    const newFilterDiesel = (last.filterDiesel||0)>=3 ? 1 : (last.filterDiesel||0)+1;
    const newFilterAir = (last.filterAir||0)>=3 ? 1 : (last.filterAir||0)+1;
    const newBrakes = (last.brakes||0)>=3 ? 1 : (last.brakes||0)+1;
    setConfirmVeh({ veh, currKm, last, newFilterOil, newFilterDiesel, newFilterAir, newBrakes });
  };

  const applyOilChange = async data => {
    if (saving) return;
    setSaving(true);
    const nextOilKm = data.currKm + 5000;
    const rec = { id:uid(), vehicleId:data.veh.id, oilKm:data.currKm, nextOilKm, date:todayISO(),
      filterOil:data.newFilterOil, filterDiesel:data.newFilterDiesel, filterAir:data.newFilterAir, brakes:data.newBrakes };
    await saveRecords(rec);
    setConfirmVeh(null);
    setSaving(false);
  };

  const saveEdit = async () => {
    if (!editVeh || saving) return;
    setSaving(true);
    const vr = vehRecs(editVeh.id);
    const last = vr.length ? vr[vr.length-1] : null;
    const fRecs = fuelRecords.filter(r=>r.vehicleId===editVeh.id).sort((a,b)=>b.currKm-a.currKm);
    const currKm = fRecs.length ? fRecs[0].currKm : (last?.oilKm||0);
    const rec = { id:uid(), vehicleId:editVeh.id, oilKm:last?.oilKm||currKm, nextOilKm:last?.nextOilKm||(currKm+5000), date:todayISO(),
      filterOil:editForm.filterOil, filterDiesel:editForm.filterDiesel, filterAir:editForm.filterAir, brakes:editForm.brakes };
    await saveRecords(rec);
    setEditVeh(null);
    setSaving(false);
  };

  const Counter = ({ label, value, onChange, limit }) => (
    <div style={{ marginBottom:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:10, padding:"10px 14px" }}>
        <span style={{ color:T.text, ...GF, fontSize:13 }}>{label}</span>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ color:value>=limit?T.red:T.gold, ...GF, fontSize:13, fontWeight:700 }}>{value}/{limit}</span>
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={()=>onChange(Math.max(1,value-1))} style={{ background:T.card3, border:"none", color:T.text, borderRadius:6, width:28, height:28, cursor:"pointer", fontSize:16 }}>-</button>
            <button onClick={()=>onChange(Math.min(limit,value+1))} style={{ background:T.card3, border:"none", color:T.text, borderRadius:6, width:28, height:28, cursor:"pointer", fontSize:16 }}>+</button>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🔧 الصيانة" onBack={onBack}/>
      <div style={{ padding:"14px 14px 0" }}>
        <div style={{ background:T.card2, borderRadius:14, padding:"14px 16px", borderTop:`3px solid ${T.orange}`, display:"flex", alignItems:"center", gap:14 }}>
          <span style={{ fontSize:28 }}>🔧</span>
          <div><div style={{ color:T.sub, ...GF, fontSize:11 }}>إجراءات هذا الشهر</div><div style={{ color:T.orange, ...GF, fontSize:22, fontWeight:700 }}>{thisMonth}</div></div>
        </div>
      </div>

      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>

      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v => {
          const s = calcStatus(v.id);
          const borderC = s.noData ? T.border : (s.alerts.length||s.noService) ? T.red : s.oilFromFuel?.color || T.green;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${borderC}33`, borderRight:`4px solid ${borderC}` }}>
              <div style={{ padding:"14px 16px" }} onClick={()=>setHistVeh(v)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    {s.noService && <Badge label="⚠️ راجع البيانات" color={T.red}/>}
                    {v.type && <span style={{ color:T.sub, ...GF, fontSize:11 }}>{v.type}</span>}
                  </div>
                </div>
                {s.noData
                  ? <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل صيانة — أضف أول غيار</div>
                  : <>
                    <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>الغيار القادم</div>
                        <div style={{ color:T.orange, ...GF, fontWeight:700, fontSize:14 }}>{s.nextOil?.toLocaleString()} كلم</div>
                      </div>
                      {s.latestFuelKm && (
                        <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                          <div style={{ color:T.sub, ...GF, fontSize:10 }}>⛽ عداد المحروقات</div>
                          <div style={{ color:T.blue, ...GF, fontWeight:700, fontSize:14 }}>{s.latestFuelKm?.toLocaleString()} كلم</div>
                        </div>
                      )}
                    </div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }} onClick={e=>{ e.stopPropagation(); setEditVeh(v); setEditForm({filterOil:s.filterOil||1,filterDiesel:s.filterDiesel||1,filterAir:s.filterAir||1,brakes:s.brakes||1}); }}>
                      {[{l:"فلتر الزيت",v:s.filterOil,m:2},{l:"فلتر الديزل",v:s.filterDiesel,m:3},{l:"فلتر الهواء",v:s.filterAir,m:3},{l:"البريكات",v:s.brakes,m:3}].map(f => (
                        <div key={f.l} style={{ background:f.v>=f.m?T.red+"22":T.card2, border:`1px solid ${f.v>=f.m?T.red:T.border}`, borderRadius:8, padding:"4px 10px", display:"flex", gap:6, alignItems:"center", cursor:"pointer" }}>
                          <span style={{ color:f.v>=f.m?T.red:T.sub, ...GF, fontSize:11 }}>{f.l}</span>
                          <span style={{ color:f.v>=f.m?T.red:T.gold, ...GF, fontSize:11, fontWeight:700 }}>{f.v}/{f.m}</span>
                          <span style={{ color:T.sub, fontSize:9 }}>✏️</span>
                        </div>
                      ))}
                    </div>
                    {s.oilFromFuel && <div style={{ marginTop:8, background:s.oilFromFuel.color+"22", borderRadius:8, padding:"5px 10px" }}><span style={{ color:s.oilFromFuel.color, ...GF, fontSize:12 }}>⛽ {s.oilFromFuel.msg}</span></div>}
                    {s.alerts.length>0 && <div style={{ marginTop:8 }}>{s.alerts.map((a,i) => <div key={i} style={{ background:T.red+"22", borderRadius:8, padding:"5px 10px", marginBottom:4 }}><span style={{ color:T.red, ...GF, fontSize:12 }}>⚠️ مستحق — {a.label}</span></div>)}</div>}
                  </>
                }
              </div>
              <div style={{ display:"flex", borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>{ setAddVeh(v.id); }} style={{ flex:1, background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ تسجيل غيار</button>
                {!s.noData && <button onClick={()=>confirmOilChange(v)} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.orange, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>✓ تأكيد الغيار</button>}
                <button onClick={()=>setHistVeh(v)} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.sub, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>📂 السجل</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add Modal */}
      <Modal show={!!addVeh} onClose={()=>setAddVeh(null)} title={`تسجيل غيار — ${vehicles.find(v=>v.id===addVeh)?.plate||""}`}>
        <Field label="قراءة عداد غيار الزيت (كلم)" value={form.oilKm} onChange={v=>setForm({...form,oilKm:v})} type="number" req/>
        <Field label="تاريخ الإجراء" value={form.date} onChange={v=>setForm({...form,date:v})} type="date" req/>
        {form.oilKm && (
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>الغيار القادم تلقائياً</span>
            <span style={{ color:T.orange, ...GF, fontWeight:700 }}>{(+form.oilKm+5000).toLocaleString()} كلم</span>
          </div>
        )}
        <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:12 }}>حالة الفلاتر والبريكات الحالية:</p>
        <Counter label="فلتر الزيت (يستحق عند 2)" value={form.filterOil} onChange={v=>setForm({...form,filterOil:v})} limit={2}/>
        <Counter label="فلتر الديزل (يستحق عند 3)" value={form.filterDiesel} onChange={v=>setForm({...form,filterDiesel:v})} limit={3}/>
        <Counter label="فلتر الهواء (يستحق عند 3)" value={form.filterAir} onChange={v=>setForm({...form,filterAir:v})} limit={3}/>
        <Counter label="البريكات (تستحق عند 3)" value={form.brakes} onChange={v=>setForm({...form,brakes:v})} limit={3}/>
        <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ غيار الزيت"} onClick={doAdd} full color={T.gold} disabled={saving}/>
      </Modal>

      {/* Confirm Modal */}
      <Modal show={!!confirmVeh} onClose={()=>setConfirmVeh(null)} title="تأكيد غيار الزيت">
        {confirmVeh && (
          <div>
            <div style={{ background:T.card2, borderRadius:12, padding:16, marginBottom:16 }}>
              <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:12 }}>إعادة ضبط العدادات تلقائياً:</p>
              {[{l:"فلتر الزيت",old:confirmVeh.last.filterOil||0,newV:confirmVeh.newFilterOil,max:2},
                {l:"فلتر الديزل",old:confirmVeh.last.filterDiesel||0,newV:confirmVeh.newFilterDiesel,max:3},
                {l:"فلتر الهواء",old:confirmVeh.last.filterAir||0,newV:confirmVeh.newFilterAir,max:3},
                {l:"البريكات",old:confirmVeh.last.brakes||0,newV:confirmVeh.newBrakes,max:3},
              ].map(f => (
                <div key={f.l} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ color:T.text, ...GF, fontSize:13 }}>{f.l}</span>
                  <span style={{ color:T.sub, ...GF, fontSize:13 }}>{f.old}/{f.max} → <span style={{ color:T.green }}>{f.newV}/{f.max}</span></span>
                </div>
              ))}
            </div>
            <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:14 }}>يمكنك التعديل اليدوي بعد التأكيد</p>
            <Btn label={saving?"جارٍ الحفظ...":"✓ تأكيد الغيار"} onClick={()=>applyOilChange(confirmVeh)} full color={T.gold} disabled={saving}/>
          </div>
        )}
      </Modal>

      {/* Edit Filters Modal */}
      <Modal show={!!editVeh} onClose={()=>setEditVeh(null)} title={`تعديل الفلاتر — ${editVeh?.plate}`}>
        {editVeh && (
          <div>
            <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:14 }}>عدّل القراءة الحالية للفلاتر والبريكات:</p>
            <Counter label="فلتر الزيت (يستحق عند 2)" value={editForm.filterOil} onChange={v=>setEditForm({...editForm,filterOil:v})} limit={2}/>
            <Counter label="فلتر الديزل (يستحق عند 3)" value={editForm.filterDiesel} onChange={v=>setEditForm({...editForm,filterDiesel:v})} limit={3}/>
            <Counter label="فلتر الهواء (يستحق عند 3)" value={editForm.filterAir} onChange={v=>setEditForm({...editForm,filterAir:v})} limit={3}/>
            <Counter label="البريكات (تستحق عند 3)" value={editForm.brakes} onChange={v=>setEditForm({...editForm,brakes:v})} limit={3}/>
            <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ التعديل"} onClick={saveEdit} full color={T.gold} disabled={saving}/>
          </div>
        )}
      </Modal>

      {/* History Modal */}
      <Modal show={!!histVeh} onClose={()=>setHistVeh(null)} title={`سجل صيانة — ${histVeh?.plate}`}>
        {histVeh && (() => {
          const rr = vehRecs(histVeh.id).reverse(), total = rr.length;
          if (!total) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:24 }}>لا يوجد سجل بعد</div>;
          return rr.map((r,i) => (
            <div key={r.id} style={{ background:T.card2, borderRadius:12, padding:"12px 14px", marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <span style={{ color:T.orange, ...GF, fontWeight:700 }}>غيار زيت #{total-i}</span>
                <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(r.date)}</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ color:T.sub, ...GF, fontSize:12 }}>العداد</span>
                <span style={{ color:T.gold, ...GF, fontWeight:700 }}>{r.oilKm.toLocaleString()} كلم</span>
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {[{l:"فلتر زيت",v:r.filterOil||0,m:2},{l:"فلتر ديزل",v:r.filterDiesel||0,m:3},{l:"فلتر هواء",v:r.filterAir||0,m:3},{l:"بريكات",v:r.brakes||0,m:3}].map(f => (
                  <span key={f.l} style={{ background:f.v>=f.m?T.red+"22":T.card3, color:f.v>=f.m?T.red:T.sub, borderRadius:6, padding:"2px 8px", ...GF, fontSize:11 }}>{f.l}: {f.v}/{f.m}</span>
                ))}
              </div>
            </div>
          ));
        })()}
      </Modal>
    </div>
  );
}

// ══════════════════════════════════════════════════
// FUEL TAB
// ══════════════════════════════════════════════════
function FuelTab({ fuelRecords, saveFuelRecords, vehicles, maintenanceRecs, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [search, setSearch] = useState("");
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ vehicleId:"", prevKm:"", currKm:"", amount:"" });
  const [oilAlert, setOilAlert] = useState(null);
  const [costAlert, setCostAlert] = useState(null);
  const [filter, setFilter] = useState("الكل");
  const [histVeh, setHistVeh] = useState(null);

  const lastFuelKm = id => {
    const recs = fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>b.currKm-a.currKm);
    return recs.length ? recs[0].currKm : null;
  };

  const checkOil = (vehicleId, currKm) => {
    const mRecs = maintenanceRecs.filter(r=>r.vehicleId===vehicleId).sort((a,b)=>a.oilKm-b.oilKm);
    if (!mRecs.length) return null;
    const last = mRecs[mRecs.length-1];
    const nextOil = last.nextOilKm || (last.oilKm+5000);
    const diff = nextOil - currKm;
    if (diff<=0) return { msg:`⚠️ موعد غيار الزيت تجاوز ${Math.abs(diff).toLocaleString()} كلم`, color:T.red, urgent:true };
    if (diff<=500) return { msg:`🔔 موعد غيار الزيت خلال ${diff.toLocaleString()} كلم`, color:T.orange, urgent:false };
    return null;
  };

  const checkCostAnomaly = (vehicleId, newCost) => {
    const prevRecs = fuelRecords.filter(r=>r.vehicleId===vehicleId && r.costPerKm);
    if (prevRecs.length < 3) return null;
    const avg = prevRecs.reduce((s,r)=>s+(r.costPerKm||0),0) / prevRecs.length;
    const diff = ((newCost-avg)/avg) * 100;
    if (diff>=50) return { msg:`🔴 تكلفة مشبوهة — أعلى بـ ${diff.toFixed(0)}% من المعدل`, color:T.red, avg:avg.toFixed(3) };
    if (diff>=30) return { msg:`🟠 تكلفة مرتفعة — أعلى بـ ${diff.toFixed(0)}% من المعدل`, color:T.orange, avg:avg.toFixed(3) };
    return null;
  };

  const addRecord = async () => {
    if (!form.vehicleId||!form.prevKm||!form.currKm||!form.amount) return;
    if (saving) return;
    const prev = +form.prevKm, curr = +form.currKm;
    if (curr<=prev) { showToast("❌ العداد الحالي يجب أن يكون أكبر من السابق", T.red); return; }
    setSaving(true);
    const dist = curr - prev;
    const cost = +form.amount / dist;
    const rec = { id:uid(), vehicleId:form.vehicleId, date:new Date().toISOString(), prevKm:prev, currKm:curr, dist, amount:+form.amount, costPerKm:+cost.toFixed(3) };
    await saveFuelRecords(rec);
    const oilChk = checkOil(form.vehicleId, curr);
    if (oilChk) { const plate=vehicles.find(v=>v.id===form.vehicleId)?.plate; setOilAlert({...oilChk,plate}); }
    const costChk = checkCostAnomaly(form.vehicleId, cost);
    if (costChk) { const plate=vehicles.find(v=>v.id===form.vehicleId)?.plate; setCostAlert({...costChk,plate,cost:cost.toFixed(3)}); }
    setForm({ vehicleId:"", prevKm:"", currKm:"", amount:"" });
    setShowAdd(false);
    setSaving(false);
  };

  const vehRecords = id => {
    let recs = fuelRecords.filter(r=>r.vehicleId===id);
    if (filter==="هذا الشهر") {
      const n=new Date(); recs=recs.filter(r=>{const d=new Date(r.date);return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();});
    } else if (filter==="الشهر الماضي") {
      const n=new Date(); const lm=new Date(n.getFullYear(),n.getMonth()-1,1);
      recs=recs.filter(r=>{const d=new Date(r.date);return d.getMonth()===lm.getMonth()&&d.getFullYear()===lm.getFullYear();});
    }
    return recs.sort((a,b)=>new Date(b.date)-new Date(a.date));
  };
  const displayed = vehicles.filter(v => {
    if (v.fuelType === "electric") return false;
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    if (filter!=="الكل" && vehRecords(v.id).length===0) return false;
    return true;
  });

  const totalSpent = fuelRecords.reduce((s,r) => s+(r.amount||0), 0);
  const thisMonth = fuelRecords.filter(r => { const d=new Date(r.date),n=new Date(); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }).reduce((s,r) => s+(r.amount||0), 0);
  const allCosts = fuelRecords.filter(r => r.costPerKm);
  const avgCost = allCosts.length ? (allCosts.reduce((s,r)=>s+(r.costPerKm||0),0)/allCosts.length).toFixed(3) : 0;

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="⛽ المحروقات" onBack={onBack}
        right={<button onClick={()=>setShowAdd(true)} style={{ background:T.gold, color:"#000", border:"none", borderRadius:8, padding:"7px 14px", ...GF, fontSize:13, fontWeight:700, cursor:"pointer" }}>+ تعبئة</button>}
      />

      {/* ── Summary Row ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, padding:"14px 14px 0" }}>
        {[
          { label:"هذا الشهر", value:`${thisMonth.toFixed(0)} د.أ`, color:T.gold },
          { label:"إجمالي الإنفاق", value:`${totalSpent.toFixed(0)} د.أ`, color:T.blue },
          { label:"متوسط/كلم", value:`${avgCost}`, color:T.green },
        ].map((s,i) => (
          <div key={i} style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"10px 12px", textAlign:"center", boxShadow:T.shadow }}>
            <div style={{ color:s.color, ...GF, fontSize:15, fontWeight:900 }}>{s.value}</div>
            <div style={{ color:T.sub, ...GF, fontSize:10, marginTop:3, fontWeight:600 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* ── Filter chips ── */}
      <div style={{ padding:"12px 14px 0", display:"flex", gap:7, overflowX:"auto" }}>
        {["الكل","هذا الشهر","الشهر الماضي"].map((l,i) => (
          <button key={i} onClick={()=>setFilter(l)} style={{ background:filter===l?T.blueSoft:T.card2, color:filter===l?T.blue:T.sub2, border:`1px solid ${filter===l?"rgba(96,165,250,0.3)":T.border}`, borderRadius:20, padding:"7px 16px", ...GF, fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>{l}</button>
        ))}
        <select value={selVeh} onChange={e=>setSelVeh(e.target.value)}
          style={{ background:selVeh?T.goldGlow:T.card2, border:`1px solid ${selVeh?"rgba(245,197,66,0.3)":T.border}`, borderRadius:20, padding:"7px 14px", color:selVeh?T.gold:T.sub2, fontSize:12, ...GF, outline:"none", cursor:"pointer" }}>
          <option value="">كل المركبات</option>
          {vehicles.filter(v=>v.fuelType!=="electric").map(v=><option key={v.id} value={v.id}>{v.plate}{v.type?` — ${v.type}`:""}</option>)}
        </select>
      </div>

      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث"
          style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.length===0 && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"50px 30px", textAlign:"center" }}>
            <div style={{ width:80, height:80, background:T.card2, border:`2px dashed ${T.border2}`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:34, marginBottom:20 }}>⛽</div>
            <div style={{ color:T.text, ...GF, fontSize:16, fontWeight:800, marginBottom:8 }}>لا توجد سجلات وقود</div>
            <div style={{ color:T.sub, ...GF, fontSize:13, marginBottom:24 }}>ابدأ بتسجيل أول تعبئة لمتابعة الإنفاق وحساب تكلفة الكيلومتر</div>
            <button onClick={()=>setShowAdd(true)} style={{ background:T.gold, color:"#000", border:"none", borderRadius:12, padding:"12px 24px", ...GF, fontSize:14, fontWeight:800, cursor:"pointer" }}>+ تسجيل تعبئة</button>
          </div>
        )}
        {displayed.map(v => {
          const recs = vehRecords(v.id);
          const last = recs[0];
          const oilChk = last ? checkOil(v.id, last.currKm) : null;
          const validCostRecs = recs.filter(r=>r.costPerKm);
          const vAvg = validCostRecs.length>=3 ? (validCostRecs.reduce((s,r)=>s+(r.costPerKm||0),0)/validCostRecs.length).toFixed(3) : null;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:10, border:`1px solid ${T.border}`, boxShadow:T.shadow, overflow:"hidden" }}>
              {/* Card Header */}
              <div style={{ background:T.blueSoft, borderBottom:`1px solid rgba(96,165,250,0.1)`, padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ color:T.gold, ...GF, fontWeight:900, fontSize:15 }}>{v.plate}</div>
                  {v.type && <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>{v.type}</div>}
                </div>
                {last && <div style={{ background:T.blueSoft, border:`1px solid rgba(96,165,250,0.2)`, borderRadius:8, padding:"6px 12px", color:T.blue, ...GF, fontWeight:900, fontSize:14 }}>{last.amount.toFixed(3)} د.أ</div>}
              </div>
              {/* Stats row */}
              {last ? (
                <>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", borderBottom:`1px solid ${T.border}` }}>
                    {[
                      { lbl:"آخر تعبئة", val:toDateStr(last.date), color:T.text },
                      { lbl:"العداد الحالي", val:`${last.currKm?.toLocaleString()} كلم`, color:T.gold },
                      { lbl:"المسافة", val:`${last.dist?.toLocaleString()} كلم`, color:T.text },
                    ].map((s,i) => (
                      <div key={i} style={{ padding:"10px 10px", textAlign:"center", borderLeft:i<2?`1px solid ${T.border}`:"none" }}>
                        <div style={{ color:s.color, ...GF, fontSize:13, fontWeight:700 }}>{s.val}</div>
                        <div style={{ color:T.sub, ...GF, fontSize:10, marginTop:2 }}>{s.lbl}</div>
                      </div>
                    ))}
                  </div>
                  {oilChk && <div style={{ padding:"8px 14px", background:oilChk.color+"15", color:oilChk.color, ...GF, fontSize:12, borderBottom:`1px solid ${T.border}` }}>{oilChk.msg}</div>}
                </>
              ) : <div style={{ padding:"14px 16px", color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل تعبئة بعد</div>}
              {/* Add + History buttons */}
              <div style={{ display:"flex", borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>{ const lk=lastFuelKm(v.id); setForm({vehicleId:v.id,prevKm:lk||"",currKm:"",amount:""}); setShowAdd(true); }}
                  style={{ flex:1, background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:700, padding:"11px", cursor:"pointer" }}>+ تسجيل تعبئة</button>
                <button onClick={()=>setHistVeh(v)}
                  style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.sub, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>📂 السجل ({fuelRecords.filter(r=>r.vehicleId===v.id).length})</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add Modal */}
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="تسجيل تعبئة وقود">
        <div style={{ background:T.card2, borderRadius:12, padding:"10px 14px", marginBottom:14, border:`1px solid ${T.gold}33` }}>
          <div style={{ color:T.sub, ...GF, fontSize:11 }}>التاريخ (تلقائي)</div>
          <div style={{ color:T.gold, ...GF, fontSize:14, fontWeight:700, marginTop:4 }}>{new Date().toLocaleDateString("ar-JO")} — {fmt12(new Date())}</div>
        </div>
        <FieldSelect label="رقم المركبة" value={form.vehicleId} onChange={v=>{ const lk=lastFuelKm(v); setForm(f=>({...f,vehicleId:v,prevKm:lk||""})); }} opts={vehicles.map(v=>({v:v.id,l:v.plate}))} req/>
        <Field label="العداد السابق (كلم)" value={form.prevKm} onChange={v=>setForm(f=>({...f,prevKm:v}))} type="number" req/>
        <Field label="العداد الحالي (كلم)" value={form.currKm} onChange={v=>setForm(f=>({...f,currKm:v}))} type="number" req/>
        {form.prevKm && form.currKm && +form.currKm>+form.prevKm && (
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>المسافة المحسوبة</span>
            <span style={{ color:T.green, ...GF, fontSize:15, fontWeight:700 }}>{(+form.currKm-+form.prevKm).toLocaleString()} كلم</span>
          </div>
        )}
        <Field label="قيمة التعبئة (د.أ) — مثال: 45.500" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" req/>
        {form.amount && form.prevKm && form.currKm && +form.currKm>+form.prevKm && (
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>تكلفة الكيلومتر</span>
            <span style={{ color:T.green, ...GF, fontSize:15, fontWeight:700 }}>{(+form.amount/(+form.currKm-+form.prevKm)).toFixed(3)} د.أ/كلم</span>
          </div>
        )}
        <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ التعبئة"} onClick={addRecord} full color={T.gold} disabled={saving}/>
      </Modal>

      {/* Oil Alert */}
      <Modal show={!!oilAlert} onClose={()=>setOilAlert(null)} title="تنبيه غيار الزيت 🔧">
        {oilAlert && (
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>{oilAlert.urgent?"🔴":"🟠"}</div>
            <div style={{ color:oilAlert.color, ...GF, fontSize:17, fontWeight:700, marginBottom:8 }}>{oilAlert.plate}</div>
            <div style={{ color:T.text, ...GF, fontSize:15, marginBottom:24 }}>{oilAlert.msg}</div>
            <Btn label="حسناً، سأتخذ إجراءً" onClick={()=>setOilAlert(null)} full color={oilAlert.color}/>
          </div>
        )}
      </Modal>

      {/* Cost Alert */}
      <Modal show={!!costAlert} onClose={()=>setCostAlert(null)} title="تنبيه تكلفة المحروقات ⚠️">
        {costAlert && (
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
            <div style={{ color:costAlert.color, ...GF, fontSize:17, fontWeight:700, marginBottom:8 }}>{costAlert.plate}</div>
            <div style={{ color:T.text, ...GF, fontSize:15, marginBottom:12 }}>{costAlert.msg}</div>
            <div style={{ background:T.card2, borderRadius:12, padding:16, marginBottom:24 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>التكلفة الحالية</span>
                <span style={{ color:costAlert.color, ...GF, fontWeight:700 }}>{costAlert.cost} د.أ/كلم</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>المتوسط الطبيعي</span>
                <span style={{ color:T.green, ...GF, fontWeight:700 }}>{costAlert.avg} د.أ/كلم</span>
              </div>
            </div>
            <Btn label="راجعت وأؤكد" onClick={()=>setCostAlert(null)} full color={costAlert.color}/>
          </div>
        )}
      </Modal>

      {/* History Modal */}
      <Modal show={!!histVeh} onClose={()=>setHistVeh(null)} title={`سجل تعبئة — ${histVeh?.plate}`}>
        {histVeh && (() => {
          const recs = fuelRecords.filter(r=>r.vehicleId===histVeh.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
          if (!recs.length) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:24 }}>لا يوجد سجل تعبئة بعد</div>;
          const total = recs.reduce((s,r)=>s+(r.amount||0),0);
          return (
            <div>
              <div style={{ background:T.blueSoft, border:`1px solid rgba(96,165,250,0.2)`, borderRadius:12, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>إجمالي الإنفاق</span>
                <span style={{ color:T.blue, ...GF, fontWeight:700, fontSize:15 }}>{total.toFixed(3)} د.أ</span>
              </div>
              {recs.map((r,i) => (
                <div key={r.id} style={{ background:T.card2, borderRadius:12, padding:"12px 14px", marginBottom:10, borderRight:`3px solid ${T.blue}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <span style={{ color:T.gold, ...GF, fontWeight:700 }}>#{recs.length-i}</span>
                    <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(r.date)} — {fmt12(r.date)}</span>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {[
                      {l:"قيمة التعبئة", v:`${r.amount?.toFixed(3)} د.أ`, c:T.gold},
                      {l:"المسافة", v:`${r.dist?.toLocaleString()} كلم`, c:T.text},
                      {l:"العداد", v:`${r.currKm?.toLocaleString()} كلم`, c:T.text},
                      {l:"تكلفة/كلم", v:`${r.costPerKm?.toFixed(3)||"—"} د.أ`, c:T.green},
                    ].map(s => (
                      <div key={s.l} style={{ background:T.card3, borderRadius:8, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:3 }}>{s.l}</div>
                        <div style={{ color:s.c, ...GF, fontSize:13, fontWeight:700 }}>{s.v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        })()}
      </Modal>
    </div>
  );
}

// SETTINGS TAB
// ══════════════════════════════════════════════════
function SettingsTab({ noteOptions, saveNoteOptions, equipmentList, saveEquipment, savedPw, setSavedPw, vehicles, saveVehicles, saveOneVehicle, deleteVehicle, myPhone, setMyPhone, onLogout, onBack, fuelRecords, violations, maintenanceRecs }) {
  const [open, setOpen] = useState(null);
  const [newNote, setNewNote] = useState("");
  const [newEq, setNewEq] = useState("");
  const [newPw, setNewPw] = useState("");
  const [cfmPw, setCfmPw] = useState("");
  const [pwMsg, setPwMsg] = useState("");
  const [phoneInput, setPhoneInput] = useState(myPhone||"");
  const [phoneSaved, setPhoneSaved] = useState(false);
  const [reportMonth, setReportMonth] = useState(() => { const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0"); });
  const [exportingReport, setExportingReport] = useState(false);
  const [confirmNote, setConfirmNote] = useState(null); // index
  const [confirmEquip, setConfirmEquip] = useState(null); // index

  const changePw = () => {
    if (!newPw) return;
    if (newPw!==cfmPw) { setPwMsg("كلمتا المرور غير متطابقتين ❌"); return; }
    setSavedPw(newPw); setNewPw(""); setCfmPw("");
    setPwMsg("✅ تم تغيير كلمة المرور وحفظها");
  };

  const exportMonthlyReport = () => {
    setExportingReport(true);
    try {
      const wb = XLSX.utils.book_new();
      const mLabel = new Date(reportMonth+"-01").toLocaleDateString("ar-JO",{month:"long",year:"numeric"});

      // ── ورقة 1: ملخص المركبات ──
      const summaryRows = [["لوحة التسجيل","النوع","الماركة","مخالفات نشطة","إجمالي المخالفات (د.أ)","تكلفة الوقود (د.أ)","مسافة الشهر (كلم)","غيارات الزيت","حالة الترخيص","حالة التأمين"]];
      vehicles.forEach(v => {
        const vViol = violations.filter(x=>x.plate===v.plate && x.status!=="مسددة");
        const vViolAmt = vViol.reduce((s,x)=>s+(+x.amount||0),0);
        const vFuel = fuelRecords.filter(r=>r.vehicleId===v.id && r.date&&r.date.startsWith(reportMonth));
        const fuelCost = vFuel.reduce((s,r)=>s+(+r.amount||0),0);
        const fuelDist = vFuel.reduce((s,r)=>s+(+r.dist||0),0);
        const vMaint = maintenanceRecs.filter(r=>r.vehicleId===v.id && r.date&&r.date.startsWith(reportMonth));
        const licStatus = () => { if(!v.license_exp) return "غير مدخل"; const d=(new Date(v.license_exp)-new Date())/86400000; return d<0?"منتهي":d<=30?"قريب الانتهاء":"ساري"; };
        const insStatus = () => { if(!v.insurance_exp) return "غير مدخل"; const d=(new Date(v.insurance_exp)-new Date())/86400000; return d<0?"منتهي":d<=30?"قريب الانتهاء":"ساري"; };
        summaryRows.push([v.plate,v.type||"—",v.make||"—",vViol.length,vViolAmt.toFixed(2),fuelCost.toFixed(2),fuelDist,vMaint.length,licStatus(),insStatus()]);
      });
      // إجماليات
      summaryRows.push(["","","","الإجماليات",
        vehicles.reduce((s,v)=>s+violations.filter(x=>x.plate===v.plate&&x.status!=="مسددة").reduce((a,x)=>a+(+x.amount||0),0),0).toFixed(2),
        fuelRecords.filter(r=>r.date&&r.date.startsWith(reportMonth)).reduce((s,r)=>s+(+r.amount||0),0).toFixed(2),
        fuelRecords.filter(r=>r.date&&r.date.startsWith(reportMonth)).reduce((s,r)=>s+(+r.dist||0),0),
        "","",""
      ]);
      const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
      ws1["!cols"] = [{wch:14},{wch:14},{wch:14},{wch:12},{wch:18},{wch:16},{wch:16},{wch:12},{wch:16},{wch:16}];
      XLSX.utils.book_append_sheet(wb, ws1, "ملخص الشهر");

      // ── ورقة 2: المخالفات النشطة ──
      const violRows = [["لوحة التسجيل","السائق","نوع المخالفة","التاريخ","المبلغ (د.أ)","الحالة","ملاحظة"]];
      violations.filter(v=>v.status!=="مسددة").forEach(v=>{
        violRows.push([v.plate,v.driver,v.vtype,v.vdate,v.amount,v.status,v.note||""]);
      });
      const ws2 = XLSX.utils.aoa_to_sheet(violRows);
      ws2["!cols"] = [{wch:14},{wch:16},{wch:18},{wch:12},{wch:12},{wch:12},{wch:20}];
      XLSX.utils.book_append_sheet(wb, ws2, "المخالفات النشطة");

      // ── ورقة 3: سجل المحروقات للشهر ──
      const fuelRows = [["لوحة التسجيل","التاريخ","العداد السابق","العداد الحالي","المسافة (كلم)","التكلفة (د.أ)","تكلفة/كلم"]];
      fuelRecords.filter(r=>r.date&&r.date.startsWith(reportMonth)).forEach(r=>{
        const veh = vehicles.find(v=>v.id===r.vehicleId);
        fuelRows.push([veh?veh.plate:"—",r.date,r.prevKm,r.currKm,r.dist,r.amount,(r.costPerKm||0).toFixed(3)]);
      });
      const ws3 = XLSX.utils.aoa_to_sheet(fuelRows);
      ws3["!cols"] = [{wch:14},{wch:12},{wch:14},{wch:14},{wch:14},{wch:12},{wch:12}];
      XLSX.utils.book_append_sheet(wb, ws3, "المحروقات");

      XLSX.writeFile(wb, `تقرير_الأسطول_${reportMonth}.xlsx`);
      showToast("✅ تم تصدير التقرير");
    } catch(e) { showToast("❌ خطأ في التصدير", T.red); }
    setExportingReport(false);
  };

  const Section = ({ id, title, children }) => (
    <div style={{ background:T.card, borderRadius:14, marginBottom:12, overflow:"hidden" }}>
      <button onClick={()=>setOpen(open===id?null:id)} style={{ width:"100%", background:"none", border:"none", padding:"16px 18px", display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }}>
        <span style={{ color:T.text, ...GF, fontSize:15 }}>{title}</span>
        <span style={{ color:T.sub, fontSize:14 }}>{open===id?"▲":"▼"}</span>
      </button>
      {open===id && <div style={{ padding:"0 18px 18px", borderTop:`1px solid ${T.border}` }}><div style={{ marginTop:14 }}>{children}</div></div>}
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="⚙️ الإعدادات" onBack={onBack}/>
      <div style={{ padding:16 }}>

        <Section id="report" title="📊 التقرير الشهري الشامل">
          <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:14 }}>تصدير Excel يشمل: ملخص كل مركبة، المخالفات النشطة، سجل المحروقات</p>
          <div style={{ marginBottom:14 }}>
            <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>اختر الشهر</label>
            <input type="month" value={reportMonth} onChange={e=>setReportMonth(e.target.value)}
              style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:T.text, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}/>
          </div>
          <Btn label={exportingReport?"جارٍ التصدير...":"📥 تصدير التقرير الشهري"} onClick={exportMonthlyReport} full color={T.gold} disabled={exportingReport}/>
        </Section>

        <Section id="pw" title="🔐 تغيير كلمة المرور">
          <Field label="كلمة المرور الجديدة" value={newPw} onChange={setNewPw} type="password"/>
          <Field label="تأكيد كلمة المرور" value={cfmPw} onChange={setCfmPw} type="password"/>
          {pwMsg && <p style={{ color:pwMsg.includes("✅")?T.green:T.red, ...GF, fontSize:13, marginBottom:12 }}>{pwMsg}</p>}
          <Btn label="حفظ كلمة المرور" onClick={changePw} full color={T.gold}/>
        </Section>

        <Section id="phone" title="📱 رقم الهاتف الشخصي للتنبيهات">
          <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:12 }}>رقمك الشخصي لاستقبال تنبيهات الأولوية القصوى عبر واتساب</p>
          <Field label="رقم الهاتف (مثال: 00962791234567)" value={phoneInput} onChange={setPhoneInput} placeholder="00962xxxxxxxxx"/>
          <Btn label="✓ حفظ الرقم" onClick={()=>{ setMyPhone(phoneInput); setPhoneSaved(true); setTimeout(()=>setPhoneSaved(false),2000); }} full color={T.gold}/>
          {phoneSaved && <p style={{ color:T.green, ...GF, fontSize:12, marginTop:8, textAlign:"center" }}>✅ تم حفظ الرقم</p>}
          {myPhone && !phoneSaved && <p style={{ color:T.sub, ...GF, fontSize:12, marginTop:8, textAlign:"center" }}>الرقم الحالي: {myPhone}</p>}
        </Section>

        <Section id="vehicles" title="🚗 إدارة المركبات واستيراد البيانات">
          <VehicleImporter vehicles={vehicles} saveVehicles={saveVehicles} saveOneVehicle={saveOneVehicle} deleteVehicle={deleteVehicle}/>
        </Section>

        <Section id="notes" title={`📝 ملاحظات المخالفات (${noteOptions.length})`}>
          {noteOptions.map((n,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <span style={{ color:T.text, ...GF, fontSize:13 }}>{n}</span>
              <button onClick={()=>setConfirmNote(i)} style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:6, padding:"4px 10px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="ملاحظة جديدة"
              style={{ flex:1, background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, padding:"9px 12px", color:T.text, ...GF, fontSize:13, outline:"none" }}/>
            <button onClick={()=>{ if(newNote){ saveNoteOptions([...noteOptions,newNote]); setNewNote(""); } }}
              style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"9px 18px", cursor:"pointer", ...GF, fontWeight:700, fontSize:16 }}>+</button>
          </div>
        </Section>

        <Section id="equip" title={`🔩 عدة المركبة (${equipmentList.length})`}>
          {equipmentList.map((e,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <span style={{ color:T.text, ...GF, fontSize:13 }}>{e}</span>
              <button onClick={()=>setConfirmEquip(i)} style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:6, padding:"4px 10px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={newEq} onChange={e=>setNewEq(e.target.value)} placeholder="عنصر جديد"
              style={{ flex:1, background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, padding:"9px 12px", color:T.text, ...GF, fontSize:13, outline:"none" }}/>
            <button onClick={()=>{ if(newEq){ saveEquipment([...equipmentList,newEq]); setNewEq(""); } }}
              style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"9px 18px", cursor:"pointer", ...GF, fontWeight:700, fontSize:16 }}>+</button>
          </div>
        </Section>

        <button onClick={onLogout}
          style={{ width:"100%", background:T.red+"22", border:`1px solid ${T.red}44`, borderRadius:14, padding:"14px", color:T.red, ...GF, fontSize:15, fontWeight:700, cursor:"pointer", marginTop:8 }}>
          🚪 تسجيل الخروج
        </button>
      </div>

      <ConfirmDialog
        show={confirmNote!==null}
        title="⚠️ حذف ملاحظة"
        body={confirmNote!==null ? `هل تريد حذف الملاحظة "${noteOptions[confirmNote]}"؟` : ""}
        onConfirm={()=>{ saveNoteOptions(noteOptions.filter((_,j)=>j!==confirmNote)); setConfirmNote(null); }}
        onCancel={()=>setConfirmNote(null)}
      />
      <ConfirmDialog
        show={confirmEquip!==null}
        title="⚠️ حذف عنصر"
        body={confirmEquip!==null ? `هل تريد حذف "${equipmentList[confirmEquip]}" من قائمة العدة؟` : ""}
        onConfirm={()=>{ saveEquipment(equipmentList.filter((_,j)=>j!==confirmEquip)); setConfirmEquip(null); }}
        onCancel={()=>setConfirmEquip(null)}
      />
    </div>
  );
}
