// DRIVERS TAB
// ══════════════════════════════════════════════════
function DriversTab({ drivers, handovers, vehicles, saveDriver, deleteDriver, saveHandovers, myPhone, onBack }) {
  const [search, setSearch] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [histDriver, setHistDriver] = useState(null);
  const [quickHandover, setQuickHandover] = useState(null);
  const [saving, setSaving] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null); // { id, name }

  const getStatus = name => {
    const dh = handovers.filter(h=>h.driver===name).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if (!dh.length) return null;
    const last = dh[dh.length-1];
    if (last.type==="استلام") {
      const veh = vehicles.find(v=>v.id===last.vehicleId);
      return { plate:veh?.plate||"—", since:last.date, vehicleId:last.vehicleId };
    }
    return null;
  };

  const displayed = [...drivers].sort((a,b)=>{
    const sa=!!getStatus(a.name), sb=!!getStatus(b.name);
    if(sa&&!sb)return -1; if(!sa&&sb)return 1; return a.name.localeCompare(b.name,"ar");
  }).filter(d=>!search||d.name.includes(search));

  const busyCount = drivers.filter(d=>getStatus(d.name)).length;

  const addDriver = async () => {
    if (!newName.trim()||saving) return;
    if (drivers.find(d=>d.name===newName.trim())) { showToast("⚠️ الاسم موجود مسبقاً",T.orange); return; }
    setSaving(true);
    await saveDriver({ id:uid(), name:newName.trim() });
    setNewName(""); setShowAdd(false); setSaving(false);
  };

  const doQuickHandover = async () => {
    if (!quickHandover||saving) return;
    setSaving(true);
    const submitTime = new Date();
    const rec = { id:uid(), vehicleId:quickHandover.vehicleId, type:"تسليم", driver:quickHandover.name,
      date:submitTime.toISOString(), equip:{}, photos:{f:null,b:null,r:null,l:null}, signature:null };
    await saveHandovers(rec);
    if (myPhone) {
      const veh = vehicles.find(v=>v.id===quickHandover.vehicleId);
      sendWA(myPhone, `🔑 *سند تسليم — الأثر الذهبي*\n\n🚗 المركبة: ${veh?.plate||"—"}\n👤 السائق: ${quickHandover.name}\n📅 ${submitTime.toLocaleDateString("ar-JO")} ${fmt12(submitTime)}`);
    }
    setQuickHandover(null); setSaving(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="👤 السائقون" onBack={onBack}
        right={<button onClick={()=>setShowAdd(true)} style={{ background:T.gold, color:"#000", border:"none", borderRadius:8, padding:"7px 14px", ...GF, fontSize:13, fontWeight:700, cursor:"pointer" }}>+ إضافة</button>}
      />

      {/* ── Summary Row ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, padding:"14px 14px 0" }}>
        {[
          { label:"إجمالي السائقين", value:drivers.length, color:T.gold },
          { label:"يقودون الآن", value:busyCount, color:busyCount>0?T.red:T.sub },
          { label:"متاحون", value:drivers.length-busyCount, color:T.green },
        ].map((s,i) => (
          <div key={i} style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"10px 12px", textAlign:"center", boxShadow:T.shadow }}>
            <div style={{ color:s.color, ...GF, fontSize:17, fontWeight:900 }}>{s.value}</div>
            <div style={{ color:T.sub, ...GF, fontSize:10, marginTop:3, fontWeight:600 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* ── Search ── */}
      <div style={{ padding:"12px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث باسم السائق"
          style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      {/* ── Driver Cards ── */}
      <div style={{ padding:"12px 14px" }}>
        {displayed.length===0 && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"50px 30px", textAlign:"center" }}>
            <div style={{ width:80, height:80, background:T.card2, border:`2px dashed ${T.border2}`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:34, marginBottom:20 }}>👤</div>
            <div style={{ color:T.text, ...GF, fontSize:16, fontWeight:800, marginBottom:8 }}>{search?"لا توجد نتائج":"لا يوجد سائقون بعد"}</div>
            {!search && <div style={{ color:T.sub, ...GF, fontSize:13, marginBottom:24 }}>أضف السائقين لمتابعة حركة المركبات وسجل الاستلام والتسليم</div>}
            {!search && <button onClick={()=>setShowAdd(true)} style={{ background:T.gold, color:"#000", border:"none", borderRadius:12, padding:"12px 24px", ...GF, fontSize:14, fontWeight:800, cursor:"pointer" }}>+ إضافة أول سائق</button>}
          </div>
        )}
        {displayed.map(d => {
          const status = getStatus(d.name);
          const isActive = !!status;
          return (
            <div key={d.id} style={{ background:T.card, borderRadius:16, marginBottom:10, border:`1px solid ${T.border}`, boxShadow:T.shadow, overflow:"hidden" }}>
              {/* Main row */}
              <div style={{ padding:"14px 14px 12px", display:"flex", alignItems:"center", gap:12 }}>
                {/* Avatar */}
                <div style={{ width:46, height:46, borderRadius:23, background:isActive?T.redSoft:T.greenSoft, border:`2px solid ${isActive?"rgba(239,68,68,0.25)":"rgba(34,197,94,0.25)"}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:20 }}>
                  👤
                </div>
                {/* Info */}
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ color:T.text, ...GF, fontWeight:800, fontSize:15, marginBottom:5 }}>{d.name}</div>
                  <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:isActive?T.redSoft:T.greenSoft, color:isActive?T.red:T.green, border:`1px solid ${isActive?"rgba(239,68,68,0.2)":"rgba(34,197,94,0.2)"}`, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700, ...GF }}>
                    {isActive ? `🔴 ${status.plate}` : "🟢 متاح"}
                  </span>
                </div>
                {/* Actions */}
                <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                  {isActive && (
                    <button onClick={()=>setQuickHandover({...status,name:d.name})}
                      style={{ background:T.orangeSoft, border:`1px solid rgba(251,146,60,0.25)`, color:T.orange, borderRadius:8, padding:"7px 10px", cursor:"pointer", ...GF, fontSize:12, fontWeight:700 }}>تسليم</button>
                  )}
                  <button onClick={()=>setHistDriver(d)}
                    style={{ background:T.card2, border:`1px solid ${T.border2}`, color:T.sub2, borderRadius:8, padding:"7px 10px", cursor:"pointer", fontSize:14 }}>📂</button>
                  <button onClick={()=>setConfirmDel({ id:d.id, name:d.name })}
                    style={{ background:T.redSoft, border:`1px solid rgba(239,68,68,0.2)`, color:T.red, borderRadius:8, padding:"7px 10px", cursor:"pointer", fontSize:13 }}>✕</button>
                </div>
              </div>
              {/* Status footer */}
              {isActive && (
                <div style={{ background:T.redSoft, borderTop:`1px solid rgba(239,68,68,0.1)`, padding:"8px 14px" }}>
                  <span style={{ color:T.sub, ...GF, fontSize:11 }}>يقود منذ </span>
                  <span style={{ color:T.text, ...GF, fontSize:11, fontWeight:600 }}>{toDateStr(status.since)} {fmt12(status.since)}</span>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Modal: إضافة سائق */}
      <Modal show={showAdd} onClose={()=>{ setShowAdd(false); setNewName(""); }} title="إضافة سائق جديد">
        <Field label="اسم السائق الكامل *" value={newName} onChange={setNewName} placeholder="مثال: محمد أحمد" req/>
        <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ السائق"} onClick={addDriver} full color={T.gold} disabled={saving||!newName.trim()}/>
      </Modal>

      {/* Modal: تأكيد التسليم السريع */}
      <Modal show={!!quickHandover} onClose={()=>setQuickHandover(null)} title="تأكيد التسليم">
        {quickHandover && (
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <div style={{ fontSize:52, marginBottom:12 }}>🔑</div>
            <div style={{ color:T.text, ...GF, fontSize:17, fontWeight:700, marginBottom:16 }}>{quickHandover.name}</div>
            <div style={{ background:T.card2, borderRadius:14, padding:"16px", marginBottom:24 }}>
              <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>المركبة</span>
                <span style={{ color:T.gold, ...GF, fontWeight:700, fontSize:15 }}>🚗 {quickHandover.plate}</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>مستلم منذ</span>
                <span style={{ color:T.text, ...GF, fontSize:13 }}>{toDateStr(quickHandover.since)} {fmt12(quickHandover.since)}</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0" }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>وقت التسليم</span>
                <span style={{ color:T.green, ...GF, fontSize:13 }}>{new Date().toLocaleDateString("ar-JO")} {fmt12(new Date())}</span>
              </div>
            </div>
            <Btn label={saving?"جارٍ التسجيل...":"✓ تأكيد التسليم"} onClick={doQuickHandover} full color={T.orange} disabled={saving}/>
          </div>
        )}
      </Modal>

      {/* Modal: سجل السائق الكامل */}
      <Modal show={!!histDriver} onClose={()=>setHistDriver(null)} title={`📂 سجل — ${histDriver?.name}`}>
        {histDriver && (() => {
          const records = handovers.filter(h=>h.driver===histDriver.name).sort((a,b)=>new Date(b.date)-new Date(a.date));
          const totalReceive = records.filter(r=>r.type==="استلام").length;
          const totalReturn = records.filter(r=>r.type==="تسليم").length;
          const uniqueVehs = [...new Set(records.map(r=>r.vehicleId))].length;
          if (!records.length) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:32 }}>لا يوجد سجل بعد</div>;
          return (
            <div>
              {/* ملخص */}
              <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"10px", textAlign:"center" }}>
                  <div style={{ color:T.blue, ...GF, fontSize:18, fontWeight:700 }}>{totalReceive}</div>
                  <div style={{ color:T.sub, ...GF, fontSize:11 }}>استلام</div>
                </div>
                <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"10px", textAlign:"center" }}>
                  <div style={{ color:T.green, ...GF, fontSize:18, fontWeight:700 }}>{totalReturn}</div>
                  <div style={{ color:T.sub, ...GF, fontSize:11 }}>تسليم</div>
                </div>
                <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"10px", textAlign:"center" }}>
                  <div style={{ color:T.gold, ...GF, fontSize:18, fontWeight:700 }}>{uniqueVehs}</div>
                  <div style={{ color:T.sub, ...GF, fontSize:11 }}>مركبات</div>
                </div>
              </div>
              {/* السجل */}
              {records.map(h => {
                const hc = h.type==="استلام" ? T.blue : T.green;
                const veh = vehicles.find(v=>v.id===h.vehicleId);
                return (
                  <div key={h.id} style={{ background:T.card2, borderRadius:12, padding:"12px 14px", marginBottom:10, borderRight:`3px solid ${hc}` }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                      <Badge label={h.type} color={hc}/>
                      <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(h.date)} {fmt12(h.date)}</span>
                    </div>
                    <div style={{ color:T.gold, ...GF, fontWeight:700, fontSize:14 }}>🚗 {veh?.plate||"مركبة محذوفة"}</div>
                    {veh?.type && <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:2 }}>{veh.type}</div>}
                  </div>
                );
              })}
            </div>
          );
        })()}
      </Modal>
      <ConfirmDialog
        show={!!confirmDel}
        title="⚠️ حذف سائق"
        body={confirmDel ? `هل تريد حذف السائق "${confirmDel.name}" نهائياً؟` : ""}
        onConfirm={async()=>{ await deleteDriver(confirmDel.id); setConfirmDel(null); }}
        onCancel={()=>setConfirmDel(null)}
      />
    </div>
  );
}

// ROOT APP
// ══════════════════════════════════════════════════
function App() {
  const [screen,setScreen]=useState("loading");
  const [savedPw,setSavedPw]=useState("1234");
  const [myPhone,setMyPhone]=useState("");
  const [vehicles,setVehicles]=useState([]);
  const [violations,setViolations]=useState([]);
  const [handovers,setHandovers]=useState([]);
  const [maintenanceRecs,setMaintenanceRecs]=useState([]);
  const [fuelRecords,setFuelRecords]=useState([]);
  const [noteOptions,setNoteOptions]=useState(DEFAULT_NOTES);
  const [equipmentList,setEquipmentList]=useState(DEFAULT_EQUIP);
  const [drivers,setDrivers]=useState([]);

  const loadAll=useCallback(async()=>{
    try{
      const results=await Promise.allSettled([
        DB.getVehicles(),DB.getViolations(),DB.getHandovers(),DB.getMaintenance(),DB.getFuel(),
        DB.getDrivers(),
        DB.getSetting("password","1234"),DB.getSetting("my_phone",""),
        DB.getSetting("note_options",""),DB.getSetting("equip_list",""),
      ]);
      const gv=r=>r.status==="fulfilled"?r.value:null;
      const vehs=gv(results[0])||[],viols=gv(results[1])||[],hands=gv(results[2])||[];
      const maints=gv(results[3])||[],fuels=gv(results[4])||[],drvs=gv(results[5])||[];
      const pw=gv(results[6]),phone=gv(results[7]),notes=gv(results[8]),equip=gv(results[9]);
      setVehicles(vehs);setViolations(viols);setHandovers(hands);setMaintenanceRecs(maints);setFuelRecords(fuels);
      setDrivers(drvs);
      setSavedPw(pw||"1234");setMyPhone(phone||"");
      if(notes){try{setNoteOptions(JSON.parse(notes));}catch{}}
      if(equip){try{setEquipmentList(JSON.parse(equip));}catch{}}
      const loggedIn=localStorage.getItem("gm_fleet_v2")==="1";
      setScreen(loggedIn?"main":"login");
    }catch(e){console.error("Load error:",e);setScreen("login");}
  },[]);

  useEffect(()=>{loadAll();},[loadAll]);

  const nav=s=>setScreen(s);
  const back=()=>setScreen("main");
  const login=()=>{localStorage.setItem("gm_fleet_v2","1");setScreen("main");};
  const logout=()=>{localStorage.removeItem("gm_fleet_v2");setScreen("login");};
  const refresh=()=>loadAll();

  // Supabase save wrappers — تحديث الحالة محلياً فوراً بدون إعادة تحميل كاملة
  const saveViolation=async v=>{
    await DB.saveViolation(v);
    setViolations(prev=>{const idx=prev.findIndex(x=>x.id===v.id);return idx>=0?prev.map(x=>x.id===v.id?v:x):[...prev,v];});
  };
  const saveHandover=async h=>{
    await DB.saveHandover(h);
    setHandovers(prev=>{const idx=prev.findIndex(x=>x.id===h.id);return idx>=0?prev.map(x=>x.id===h.id?h:x):[h,...prev];});
  };
  const saveMaintenance=async m=>{
    await DB.saveMaintenance(m);
    setMaintenanceRecs(prev=>{const idx=prev.findIndex(x=>x.id===m.id);return idx>=0?prev.map(x=>x.id===m.id?m:x):[...prev,m];});
  };
  const saveFuel=async f=>{
    await DB.saveFuel(f);
    setFuelRecords(prev=>{const idx=prev.findIndex(x=>x.id===f.id);return idx>=0?prev.map(x=>x.id===f.id?f:x):[f,...prev];});
  };
  const saveVehicles=async vs=>{
    for(const v of vs)await DB.saveVehicle(v);
    setVehicles(vs);
  };
  const saveOneVehicle=async v=>{
    await DB.saveVehicle(v);
    setVehicles(prev=>{const idx=prev.findIndex(x=>x.id===v.id);return idx>=0?prev.map(x=>x.id===v.id?v:x):[...prev,v];});
  };
  const deleteVehicle=async id=>{
    await DB.deleteVehicle(id);
    setVehicles(prev=>prev.filter(v=>v.id!==id));
  };
  const saveNoteOptions=async opts=>{await DB.setSetting("note_options",JSON.stringify(opts));setNoteOptions(opts);};
  const saveEquipment=async opts=>{await DB.setSetting("equip_list",JSON.stringify(opts));setEquipmentList(opts);};
  const savePw=async p=>{await DB.setSetting("password",p);setSavedPw(p);};
  const savePhone=async p=>{await DB.setSetting("my_phone",p);setMyPhone(p);};
  const saveDriver=async d=>{
    await DB.saveDriver(d);
    setDrivers(prev=>{const idx=prev.findIndex(x=>x.id===d.id);return idx>=0?prev.map(x=>x.id===d.id?d:x):[...prev,d];});
  };
  const deleteDriver=async id=>{
    await DB.deleteDriver(id);
    setDrivers(prev=>prev.filter(d=>d.id!==id));
  };

  const notifications=buildNotifications(violations,vehicles,maintenanceRecs,fuelRecords);

  if(screen==="loading")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",direction:"rtl"}}><div style={{textAlign:"center"}}><div style={{fontSize:44,marginBottom:12}}>🚗</div><div style={{color:T.gold,...GF,fontSize:16}}>جارٍ التحميل...</div></div></div>;
  if(screen==="login")return <LoginScreen savedPw={savedPw} onLogin={login}/>;
  if(screen==="main")return <MainScreen onNav={nav} notifications={notifications} myPhone={myPhone} vehicles={vehicles} violations={violations} handovers={handovers} fuelRecords={fuelRecords} drivers={drivers} maintenanceRecs={maintenanceRecs} saveViolation={saveViolation} saveHandover={saveHandover} saveFuel={saveFuel} saveMaintenance={saveMaintenance} noteOptions={noteOptions} equipmentList={equipmentList}/>;
  if(screen==="myvehicles")return <MyVehiclesTab vehicles={vehicles} violations={violations} maintenanceRecs={maintenanceRecs} fuelRecords={fuelRecords} handovers={handovers} saveOneVehicle={saveOneVehicle} onBack={back}/>;
  if(screen==="violations")return <ViolationsTab violations={violations} saveViolations={saveViolation} vehicles={vehicles} noteOptions={noteOptions} myPhone={myPhone} onBack={back}/>;
  if(screen==="license")return <LicenseTab vehicles={vehicles} saveVehicles={saveVehicles} saveOneVehicle={saveOneVehicle} onBack={back}/>;
  if(screen==="handover")return <HandoverTab handovers={handovers} saveHandovers={saveHandover} vehicles={vehicles} equipmentList={equipmentList} myPhone={myPhone} drivers={drivers} onBack={back} onRefresh={refresh}/>;
  if(screen==="drivers")return <DriversTab drivers={drivers} handovers={handovers} vehicles={vehicles} saveDriver={saveDriver} deleteDriver={deleteDriver} saveHandovers={saveHandover} myPhone={myPhone} onBack={back}/>;
  if(screen==="maintenance")return <MaintenanceTab records={maintenanceRecs} saveRecords={saveMaintenance} vehicles={vehicles} fuelRecords={fuelRecords} onBack={back}/>;
  if(screen==="fuel")return <FuelTab fuelRecords={fuelRecords} saveFuelRecords={saveFuel} vehicles={vehicles} maintenanceRecs={maintenanceRecs} onBack={back}/>;
  if(screen==="settings")return <SettingsTab noteOptions={noteOptions} saveNoteOptions={saveNoteOptions} equipmentList={equipmentList} saveEquipment={saveEquipment} savedPw={savedPw} setSavedPw={savePw} vehicles={vehicles} saveVehicles={saveVehicles} saveOneVehicle={saveOneVehicle} deleteVehicle={deleteVehicle} myPhone={myPhone} setMyPhone={savePhone} onLogout={logout} onBack={back} fuelRecords={fuelRecords} violations={violations} maintenanceRecs={maintenanceRecs}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/fleet/sw.js").catch(()=>{});
}

</script>
</body>
</html>
