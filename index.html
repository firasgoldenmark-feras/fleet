function SignaturePad({ onSave, onCancel }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x:(touch.clientX-rect.left)*(canvas.width/rect.width), y:(touch.clientY-rect.top)*(canvas.height/rect.height) };
  };

  const initCanvas = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#1a1e2e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#252840";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(20, canvas.height-40);
    ctx.lineTo(canvas.width-20, canvas.height-40);
    ctx.stroke();
  };

  useEffect(() => { initCanvas(); }, []);

  const start = e => { e.preventDefault(); drawing.current=true; lastPos.current=getPos(e, canvasRef.current); };
  const move = e => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current, ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y); ctx.strokeStyle="#D4AF37"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.stroke();
    lastPos.current = pos;
  };
  const end = e => { e.preventDefault(); drawing.current = false; };
  const clear = () => initCanvas();

  return (
    <div>
      <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:8, textAlign:"center" }}>وقّع بإصبعك في المنطقة أدناه</p>
      <canvas ref={canvasRef} width={320} height={160}
        style={{ width:"100%", borderRadius:12, border:`2px solid ${T.gold}44`, display:"block" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <Btn label="مسح" onClick={clear} outline color={T.sub} sm/>
        <Btn label="إلغاء" onClick={onCancel} outline color={T.red} sm/>
        <div style={{flex:1}}><Btn label="✓ حفظ التوقيع" onClick={()=>onSave(canvasRef.current.toDataURL())} full color={T.gold} sm/></div>
      </div>
    </div>
  );
}

function VehicleImporter({ vehicles, saveVehicles, saveOneVehicle, deleteVehicle }) {
  const [step, setStep] = useState("idle");
  const [rawRows, setRawRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({});
  const [preview, setPreview] = useState([]);
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [showList, setShowList] = useState(false);
  const [editForm2, setEditForm2] = useState({});
  const [confirmDel, setConfirmDel] = useState(null); // { id, plate }

  const FIELDS = [
    { key:"plate", label:"رقم اللوحة", required:true },
    { key:"regNum", label:"رقم التسجيل" },
    { key:"type", label:"نوع المركبة" },
    { key:"make", label:"الصنع/الماركة" },
  ];

  const readFile = async file => {
    setLoading(true); setMsg("جارٍ قراءة الملف...");
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
      if (!data.length) { setMsg("❌ الملف فارغ"); setLoading(false); return; }
      const hdrs = data[0].map(h => String(h).trim());
      const rows = data.slice(1).filter(r => r.some(c => c !== ""));
      setHeaders(hdrs); setRawRows(rows);
      // Auto detect
      const map = {};
      const lower = hdrs.map(h => String(h).toLowerCase().trim());
      const match = kws => { const i = lower.findIndex(h => kws.some(k => h.includes(k))); return i>=0 ? hdrs[i] : null; };
      map.plate = match(["لوحة","plate","رقم المركب","رقم السيار","vehicle"]);
      map.regNum = match(["تسجيل","registration","reg","chassis","هيكل"]);
      map.type = match(["نوع","type","موديل","model","فئة"]);
      map.make = match(["صنع","ماركة","make","brand","manufacturer","شركة"]);
      setMapping(map);
      setStep("mapping");
      setMsg(map.plate ? "✅ تم التعرف على الأعمدة" : "⚠️ حدد عمود اللوحة يدوياً");
    } catch { setMsg("❌ تعذّر قراءة الملف"); }
    setLoading(false);
  };

  const buildPreview = () => {
    if (!mapping.plate) { setMsg("❌ يجب تحديد عمود رقم اللوحة"); return; }
    const pI=headers.indexOf(mapping.plate), rI=mapping.regNum?headers.indexOf(mapping.regNum):-1;
    const tI=mapping.type?headers.indexOf(mapping.type):-1, mI=mapping.make?headers.indexOf(mapping.make):-1;
    const rows = rawRows.map(r => ({
      id:uid(), plate:String(r[pI]||"").trim(), regNum:rI>=0?String(r[rI]||"").trim():"",
      type:tI>=0?String(r[tI]||"").trim():"", make:mI>=0?String(r[mI]||"").trim():"",
      license_exp:"", insurance_exp:"", renewHistory:[]
    })).filter(r => r.plate);
    setPreview(rows); setStep("preview"); setMsg("");
  };

  const confirmImport = () => {
    // دمج: الحفاظ على بيانات الترخيص والتأمين والوقود للمركبات الموجودة
    const merged = preview.map(p => {
      const exist = vehicles.find(v => v.plate===p.plate);
      if (exist) return { ...p, id:exist.id, fuelType:exist.fuelType||p.fuelType||"", license_exp:exist.license_exp||"", insurance_exp:exist.insurance_exp||"", renewHistory:exist.renewHistory||[] };
      return p;
    });
    const existing = vehicles.filter(v => !preview.some(p => p.plate===v.plate));
    saveVehicles([...existing, ...merged]);
    setStep("done"); setMsg(`✅ تم استيراد ${preview.length} مركبة`);

          <div style={{ display:"flex", gap:8 }}>
            <Btn label="← تعديل" onClick={()=>setStep("mapping")} outline color={T.sub} sm/>

      {step==="done" && <div style={{ color:T.green, ...GF, fontSize:15, textAlign:"center", padding:20 }}>{msg}</div>}

        </Modal>
      )}
      <ConfirmDialog
        show={!!confirmDel}
        title="⚠️ حذف مركبة"
        body={confirmDel ? `هل تريد حذف المركبة "${confirmDel.plate}" نهائياً؟ لا يمكن التراجع عن هذا الإجراء.` : ""}
        onConfirm={async()=>{ await deleteVehicle(confirmDel.id); setConfirmDel(null); }}
        onCancel={()=>setConfirmDel(null)}
      />
    </div>
  );
}

function buildNotifications(violations, vehicles, maintenanceRecs, fuelRecords) {
  const notes = [];

  violations.filter(v => v.status !== "مسددة").forEach(v => {
    const r = 30 - daysDiff(v.vdate);
    if (r<=0) notes.push({ id:"viol-"+v.id, icon:"⛔", title:"مخالفة — انتهت المهلة", body:`${v.plate} — ${v.vtype}`, color:T.red, tab:"violations", priority:true });
    else if (r<=5) notes.push({ id:"viol-"+v.id, icon:"🔴", title:`مخالفة — ${r} أيام متبقية`, body:`${v.plate} — ${v.vtype}`, color:T.red, tab:"violations", priority:true });
    else if (r<=10) notes.push({ id:"viol-"+v.id, icon:"🟠", title:`مخالفة — ${r} يوم متبقي`, body:`${v.plate}`, color:T.orange, tab:"violations" });
  });

  vehicles.forEach(v => {
    const chk = (exp, label) => {
      if (!exp) return;
      const expMs = new Date(exp).setHours(0,0,0,0);
      const todayMs = new Date().setHours(0,0,0,0);
      if (isNaN(expMs)) return;
      const diff = Math.floor((expMs - todayMs) / 86400000);
      if (diff < 0) notes.push({ id:"lic-"+v.id+label, icon:"🔴", title:`${label} منتهي`, body:v.plate, color:T.red, tab:"license", priority:true });
      else if (diff <= 3) notes.push({ id:"lic-"+v.id+label, icon:"🔴", title:`${label} — ${diff} أيام`, body:v.plate, color:T.red, tab:"license", priority:true });
      else if (diff <= 7) notes.push({ id:"lic-"+v.id+label, icon:"🟠", title:`${label} — ${diff} أيام`, body:v.plate, color:T.orange, tab:"license" });
      else if (diff <= 14) notes.push({ id:"lic-"+v.id+label, icon:"🟡", title:`${label} — ${diff} يوم`, body:v.plate, color:T.yellow, tab:"license" });
    };
    if (v.license_exp) chk(v.license_exp, "الترخيص");
    if (v.insurance_exp) chk(v.insurance_exp, "التأمين");
  });

  vehicles.forEach(v => {
    const fRecs = fuelRecords.filter(r=>r.vehicleId===v.id).sort((a,b)=>b.currKm-a.currKm);
    const currKm = fRecs.length ? fRecs[0].currKm : null;
    const mRecs = maintenanceRecs.filter(r=>r.vehicleId===v.id).sort((a,b)=>a.oilKm-b.oilKm);
    if (!mRecs.length) return;
    const last = mRecs[mRecs.length-1];
    const nextOil = last.nextOilKm || (last.oilKm+5000);
    if (currKm) {
      const diff = nextOil - currKm;
      if (diff<=0) notes.push({ id:"maint-"+v.id, icon:"🔴", title:"غيار زيت متأخر", body:`${v.plate} — تجاوز ${Math.abs(diff).toLocaleString()} كلم`, color:T.red, tab:"maintenance", priority:true });
      else if (diff<=500) notes.push({ id:"maint-"+v.id, icon:"🟠", title:"غيار زيت قريب", body:`${v.plate} — ${diff.toLocaleString()} كلم`, color:T.orange, tab:"maintenance" });
    }
  });

  return notes;
}

function NotificationsPanel({ notes, onNav, onClose }) {
  if (!notes.length) return (
    <div style={{ padding:"32px 20px", textAlign:"center" }}>
      <div style={{ fontSize:44, marginBottom:12 }}>✅</div>
      <div style={{ color:T.sub, ...GF, fontSize:15 }}>لا توجد تنبيهات</div>
    </div>
  );
  return (
    <div>
      {notes.map(n => (
        <button key={n.id} onClick={()=>{ onNav(n.tab); onClose(); }}
          style={{ width:"100%", background:T.card2, border:`1px solid ${n.color}33`, borderRadius:14, padding:"12px 14px", marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer", borderRight:`4px solid ${n.color}` }}>
          <span style={{ fontSize:22, flexShrink:0 }}>{n.icon}</span>
          <div style={{ flex:1, textAlign:"right" }}>
            <div style={{ color:n.color, ...GF, fontSize:13, fontWeight:700 }}>{n.title}</div>
            <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:3 }}>{n.body}</div>
          </div>
          <span style={{ color:T.border, fontSize:16 }}>‹</span>
        </button>
      ))}
    </div>
  );
}

function GlobalSearch({ vehicles, violations, drivers, handovers, fuelRecords, maintenanceRecs,
  saveViolation, saveHandover, saveFuel, saveMaintenance, noteOptions, equipmentList, onClose }) {

  const [q, setQ] = useState("");
  const [view, setView] = useState("search"); // "search"|"vehicle"|"driver"|"qviolation"|"qhandover"|"qfuel"|"qmaintenance"
  const [selVeh, setSelVeh] = useState(null);
  const [selDrv, setSelDrv] = useState(null);
  const [saving, setSaving] = useState(false);
  const inp = React.useRef(null);

  // quick-form states
  const [qvForm, setQvForm] = useState({});
  const [qhForm, setQhForm] = useState({});
  const [qfForm, setQfForm] = useState({});
  const [qmForm, setQmForm] = useState({});

  useEffect(() => { if(view==="search") setTimeout(()=>inp.current&&inp.current.focus(),100); }, [view]);

  const results = React.useMemo(() => {
    const s = q.trim().toLowerCase();
    if (s.length < 2) return [];
    const out = [];
    vehicles.forEach(v => {
      if ([v.plate,v.type,v.make,v.regNum].some(x=>(x||"").toLowerCase().includes(s)))
        out.push({ type:"vehicle", icon:"🚗", title:v.plate, sub:[v.type,v.make].filter(Boolean).join(" | ")||"مركبة", color:T.gold, obj:v });
    });
    violations.forEach(v => {
      if ([v.plate,v.driver,v.vtype,v.vnum].some(x=>(x||"").toLowerCase().includes(s)))
        out.push({ type:"violation", icon:"🚨", title:`${v.plate} — ${v.driver}`, sub:`${v.vtype} | ${v.amount} د.أ | ${v.status}`, color:T.red, obj:v });
    });
    drivers.forEach(d => {
      if ((d.name||"").toLowerCase().includes(s))
        out.push({ type:"driver", icon:"👤", title:d.name, sub:"سائق", color:T.blue, obj:d });
    });
    return out.slice(0, 12);
  }, [q, vehicles, violations, drivers]);

  // ── helpers ──
  const licStatus = exp => {
    if (!exp) return { label:"غير مدخل", color:T.sub };
    const diff = Math.floor((new Date(exp).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
    if (isNaN(diff)) return { label:"غير مدخل", color:T.sub };
    if (diff < 0) return { label:"منتهي", color:T.red };
    if (diff <= 14) return { label:`${diff} يوم`, color:diff<=3?T.red:T.orange };
    return { label:"ساري", color:T.green };
  };
  const IR = ({ label, value, color=T.text }) => (
    <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
      <span style={{ color:T.sub, ...GF, fontSize:13 }}>{label}</span>
      <span style={{ color, ...GF, fontSize:13, fontWeight:600 }}>{value}</span>
    </div>
  );
  const CardSection = ({ title, color, children }) => (
    <div style={{ background:T.card2, borderRadius:12, padding:"12px 14px", marginBottom:10, borderRight:`3px solid ${color}` }}>
      <div style={{ color:T.text, ...GF, fontWeight:700, fontSize:13, marginBottom:8 }}>{title}</div>
      {children}
    </div>
  );
  const openVehicleCard = v => {
    setSelVeh(v);
    setQvForm({ plate:v.plate, driver:"", vdate:todayISO(), vtype:"", amount:"", note:"" });
    setQhForm({ type:"استلام", driver:"", date:new Date().toISOString().slice(0,16), equip:{} });
    setQfForm({ date:todayISO(), prevKm:"", currKm:"", amount:"" });
    setQmForm({ oilKm:"", date:todayISO(), filterOil:0, filterDiesel:0, filterAir:0, brakes:0 });
    setView("vehicle");
  };
  const openDriverCard = d => { setSelDrv(d); setView("driver"); };


  // ── Quick Save Functions ──
  const doSaveViolation = async () => {
    if (!qvForm.driver||!qvForm.vdate||!qvForm.vtype||!qvForm.amount) { showToast("أكمل الحقول المطلوبة",T.red); return; }
    setSaving(true);
    try {
      await saveViolation({ id:uid(), plate:qvForm.plate, driver:qvForm.driver, vdate:qvForm.vdate, vtype:qvForm.vtype, vnum:"", amount:+qvForm.amount, note:qvForm.note||"", status:"مفتوحة" });
      setView("vehicle");
    } catch(e) { showToast("❌ فشل الحفظ",T.red); } finally { setSaving(false); }
  };
  const doSaveHandover = async () => {
    if (!qhForm.driver) { showToast("أدخل اسم السائق",T.red); return; }
    setSaving(true);
    try {
      await saveHandover({ id:uid(), vehicleId:selVeh.id, type:qhForm.type, driver:qhForm.driver, date:qhForm.date||new Date().toISOString(), equip:qhForm.equip||{}, photos:{}, signature:"" });
      setView("vehicle");
    } catch(e) { showToast("❌ فشل الحفظ",T.red); } finally { setSaving(false); }
  };
  const doSaveFuel = async () => {
    if (!qfForm.currKm||!qfForm.amount) { showToast("أكمل الحقول المطلوبة",T.red); return; }
    const dist = qfForm.prevKm ? (+qfForm.currKm - +qfForm.prevKm) : 0;
    const costPerKm = dist>0 ? (+qfForm.amount/dist) : 0;
    setSaving(true);
    try {
      await saveFuel({ id:uid(), vehicleId:selVeh.id, date:qfForm.date||todayISO(), prevKm:+qfForm.prevKm||0, currKm:+qfForm.currKm, dist, amount:+qfForm.amount, costPerKm });
      setView("vehicle");
    } catch(e) { showToast("❌ فشل الحفظ",T.red); } finally { setSaving(false); }
  };
  const doSaveMaintenance = async () => {
    if (!qmForm.oilKm) { showToast("أدخل قراءة العداد",T.red); return; }
    setSaving(true);
    try {
      await saveMaintenance({ id:uid(), vehicleId:selVeh.id, oilKm:+qmForm.oilKm, nextOilKm:+qmForm.oilKm+5000, date:qmForm.date||todayISO(), filterOil:qmForm.filterOil||0, filterDiesel:qmForm.filterDiesel||0, filterAir:qmForm.filterAir||0, brakes:qmForm.brakes||0 });
      setView("vehicle");
    } catch(e) { showToast("❌ فشل الحفظ",T.red); } finally { setSaving(false); }
  };

  // ── Counter component for maintenance ──
  const QCounter = ({ label, value, onChange, limit }) => (

      <div style={{ display:"flex", gap:8, alignItems:"center" }}>
        <button onClick={()=>onChange(Math.max(0,value-1))} style={{ background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, width:32, height:32, color:T.text, cursor:"pointer", ...GF, fontWeight:700 }}>−</button>
        <span style={{ color:value>=limit?T.red:T.gold, ...GF, fontWeight:700, minWidth:32, textAlign:"center" }}>{value}/{limit}</span>
        <button onClick={()=>onChange(Math.min(limit,value+1))} style={{ background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, width:32, height:32, color:T.text, cursor:"pointer", ...GF, fontWeight:700 }}>+</button>
      </div>
    </div>
  );

  // ══ VEHICLE CARD ══
  if (view==="vehicle" && selVeh) {
    const vViol = violations.filter(v=>v.plate===selVeh.plate && v.status!=="مسددة");
    const vFuel = fuelRecords.filter(r=>r.vehicleId===selVeh.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const lastFuel = vFuel[0];
    const avgCost = vFuel.length ? (vFuel.reduce((s,r)=>s+(r.costPerKm||0),0)/vFuel.length).toFixed(3) : null;
    const vMaint = maintenanceRecs.filter(r=>r.vehicleId===selVeh.id).sort((a,b)=>a.oilKm-b.oilKm);
    const lastMaint = vMaint[vMaint.length-1];
    const lastHand = handovers.filter(h=>h.vehicleId===selVeh.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    return (
      <div>
        <button onClick={()=>setView("search")} style={{ background:"none", border:"none", color:T.gold, ...GF, fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}>← رجوع للبحث</button>
        {/* Vehicle Header */}
        <div style={{ background:T.card2, borderRadius:14, padding:"14px 16px", marginBottom:12, borderTop:`3px solid ${T.gold}` }}>

            <IR label="عدد المخالفات" value={vViol.length} color={T.red}/>
            <IR label="إجمالي المبلغ" value={`${vViol.reduce((s,v)=>s+(+v.amount||0),0).toFixed(0)} د.أ`} color={T.orange}/>
          </> : <div style={{ color:T.green, ...GF, fontSize:12 }}>✅ لا توجد مخالفات نشطة</div>}
        </CardSection>
        <CardSection title="🔑 آخر استلام/تسليم" color={T.green}>
          {lastHand ? <>
            <IR label="النوع" value={lastHand.type} color={lastHand.type==="استلام"?T.blue:T.green}/>
            <IR label="السائق" value={lastHand.driver}/>
            <IR label="التاريخ" value={toDateStr(lastHand.date)}/>
          </> : <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل</div>}
        </CardSection>
        <CardSection title="🔧 الصيانة" color={T.orange}>
          {lastMaint ? <>
            <IR label="آخر غيار" value={`${lastMaint.oilKm?.toLocaleString()} كلم`}/>
            <IR label="الغيار القادم" value={`${lastMaint.nextOilKm?.toLocaleString()} كلم`} color={T.orange}/>
          </> : <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل صيانة</div>}
        </CardSection>
        <CardSection title="⛽ المحروقات" color={T.blue}>
          {lastFuel ? <>
            <IR label="آخر تعبئة" value={toDateStr(lastFuel.date)}/>
            <IR label="آخر عداد" value={`${lastFuel.currKm?.toLocaleString()} كلم`}/>
            {avgCost && <IR label="متوسط التكلفة/كلم" value={`${avgCost} د.أ`} color={T.blue}/>}
          </> : <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل وقود</div>}
        </CardSection>
        {/* Action Buttons */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:4 }}>
          {[
            { label:"🚨 إضافة مخالفة", view:"qviolation", color:T.red },
            { label:"🔑 استلام / تسليم", view:"qhandover", color:T.green },
            { label:"⛽ تعبئة وقود", view:"qfuel", color:T.blue },
            { label:"🔧 تسجيل صيانة", view:"qmaintenance", color:T.orange },
          ].map(b => (
            <button key={b.view} onClick={()=>setView(b.view)}
              style={{ background:b.color+"22", border:`1px solid ${b.color}44`, borderRadius:12, padding:"12px 10px", color:b.color, ...GF, fontSize:13, fontWeight:700, cursor:"pointer" }}>
              {b.label}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ══ DRIVER CARD ══
  if (view==="driver" && selDrv) {
    const dHands = handovers.filter(h=>h.driver===selDrv.name).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const dViol = violations.filter(v=>v.driver===selDrv.name);
    const activeViol = dViol.filter(v=>v.status!=="مسددة");
    // current vehicle: last handover of type استلام with no تسليم after it
    const lastHand = dHands[0];
    const currentVeh = lastHand?.type==="استلام" ? vehicles.find(v=>v.id===lastHand.vehicleId) : null;
    return (
      <div>
        <button onClick={()=>setView("search")} style={{ background:"none", border:"none", color:T.gold, ...GF, fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}>← رجوع للبحث</button>
        <div style={{ background:T.card2, borderRadius:14, padding:"14px 16px", marginBottom:12, borderTop:`3px solid ${T.blue}` }}>
          <div style={{ color:T.blue, ...GF, fontSize:20, fontWeight:800 }}>👤 {selDrv.name}</div>
          <div style={{ marginTop:8 }}>
            {currentVeh
              ? <Badge label={`🚗 بحوزته: ${currentVeh.plate}`} color={T.green}/>
              : <Badge label="لا توجد مركبة بحوزته" color={T.sub}/>}
          </div>
        </div>
        <CardSection title="🚨 المخالفات" color={T.red}>
          {activeViol.length
            ? <><IR label="مخالفات نشطة" value={activeViol.length} color={T.red}/><IR label="إجمالي" value={`${activeViol.reduce((s,v)=>s+(+v.amount||0),0)} د.أ`} color={T.orange}/></>
            : <div style={{ color:T.green, ...GF, fontSize:12 }}>✅ لا مخالفات نشطة</div>}
          {dViol.length>0 && <IR label="إجمالي المخالفات التاريخية" value={dViol.length}/>}
        </CardSection>
        <CardSection title="🔑 سجل الحركة" color={T.green}>
          {dHands.length ? dHands.slice(0,5).map((h,i)=>{
            const veh = vehicles.find(v=>v.id===h.vehicleId);
            return (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:`1px solid ${T.border}` }}>
                <span style={{ color:h.type==="استلام"?T.blue:T.green, ...GF, fontSize:12, fontWeight:700 }}>{h.type}</span>
                <span style={{ color:T.gold, ...GF, fontSize:12 }}>{veh?veh.plate:"—"}</span>
                <span style={{ color:T.sub, ...GF, fontSize:11 }}>{toDateStr(h.date)}</span>
              </div>
            );
          }) : <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل</div>}
          {dHands.length>5 && <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:6, textAlign:"center" }}>+{dHands.length-5} سجل آخر</div>}
        </CardSection>
        {/* Quick handover for driver */}
        <div style={{ marginTop:8 }}>
          <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:10 }}>استلام / تسليم سريع لهذا السائق:</p>
          <div style={{ marginBottom:10 }}>
            <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>المركبة</label>
            <select value={qhForm.vehicleId||""} onChange={e=>setQhForm({...qhForm,vehicleId:e.target.value})}
              style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:14, ...GF, outline:"none" }}>
              <option value="">— اختر المركبة —</option>
              {vehicles.map(v=><option key={v.id} value={v.id}>{v.plate}{v.type?` — ${v.type}`:""}</option>)}
            </select>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:12 }}>
            {["استلام","تسليم"].map(t=>(
              <button key={t} onClick={()=>setQhForm({...qhForm,type:t})}
                style={{ flex:1, background:qhForm.type===t?T.green+"33":T.card2, border:`1px solid ${qhForm.type===t?T.green:T.border}`, borderRadius:10, padding:"10px", color:qhForm.type===t?T.green:T.sub, ...GF, fontWeight:700, cursor:"pointer" }}>{t}</button>
            ))}
          </div>
          <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ الحركة"} onClick={async()=>{
            if(!qhForm.vehicleId){showToast("اختر المركبة",T.red);return;}
            setSaving(true);
            await saveHandover({id:uid(),vehicleId:qhForm.vehicleId,type:qhForm.type||"استلام",driver:selDrv.name,date:new Date().toISOString(),equip:{},photos:{},signature:""});
            setSaving(false);
          }} full color={T.green} disabled={saving}/>
        </div>
      </div>
    );
  }

  // ══ QUICK VIOLATION FORM ══
  if (view==="qviolation") return (
    <div>
      <button onClick={()=>setView("vehicle")} style={{ background:"none", border:"none", color:T.gold, ...GF, fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}>← رجوع للمركبة</button>
      <div style={{ background:T.red+"22", border:`1px solid ${T.red}44`, borderRadius:12, padding:"10px 14px", marginBottom:16, display:"flex", gap:10, alignItems:"center" }}>
        <span style={{ fontSize:22 }}>🚨</span>
        <div><div style={{ color:T.red, ...GF, fontWeight:700, fontSize:14 }}>مخالفة جديدة</div><div style={{ color:T.sub, ...GF, fontSize:12 }}>{selVeh?.plate}</div></div>
      </div>
      <Field label="الموظف المسؤول *" value={qvForm.driver||""} onChange={v=>setQvForm({...qvForm,driver:v})} placeholder="اسم السائق"/>
      <Field label="تاريخ المخالفة *" value={qvForm.vdate||""} onChange={v=>setQvForm({...qvForm,vdate:v})} type="date"/>
      <FieldSelect label="نوع المخالفة *" value={qvForm.vtype||""} onChange={v=>setQvForm({...qvForm,vtype:v})} opts={VTYPES}/>
      <Field label="قيمة المخالفة (د.أ) *" value={qvForm.amount||""} onChange={v=>setQvForm({...qvForm,amount:v})} type="number" placeholder="0"/>
      <FieldSelect label="ملاحظة (اختياري)" value={qvForm.note||""} onChange={v=>setQvForm({...qvForm,note:v})} opts={noteOptions||[]}/>
      <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ المخالفة"} onClick={doSaveViolation} full color={T.red} disabled={saving}/>
    </div>
  );

  // ══ QUICK HANDOVER FORM ══
  if (view==="qhandover") return (
    <div>
      <button onClick={()=>setView("vehicle")} style={{ background:"none", border:"none", color:T.gold, ...GF, fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}>← رجوع للمركبة</button>
      <div style={{ background:T.green+"22", border:`1px solid ${T.green}44`, borderRadius:12, padding:"10px 14px", marginBottom:16, display:"flex", gap:10, alignItems:"center" }}>
        <span style={{ fontSize:22 }}>🔑</span>
        <div><div style={{ color:T.green, ...GF, fontWeight:700, fontSize:14 }}>استلام / تسليم</div><div style={{ color:T.sub, ...GF, fontSize:12 }}>{selVeh?.plate}</div></div>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {["استلام","تسليم"].map(t=>(
          <button key={t} onClick={()=>setQhForm({...qhForm,type:t})}
            style={{ flex:1, background:qhForm.type===t?T.green+"33":T.card2, border:`1px solid ${qhForm.type===t?T.green:T.border}`, borderRadius:10, padding:"11px", color:qhForm.type===t?T.green:T.sub, ...GF, fontWeight:700, cursor:"pointer", fontSize:15 }}>{t}</button>
        ))}
      </div>
      <div style={{ marginBottom:14 }}>
        <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>السائق *</label>
        <select value={qhForm.driver||""} onChange={e=>setQhForm({...qhForm,driver:e.target.value})}
          style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:qhForm.driver?T.text:T.sub, fontSize:14, ...GF, outline:"none" }}>
          <option value="">— اختر السائق —</option>
          {drivers.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}
        </select>
      </div>
      <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ الحركة"} onClick={doSaveHandover} full color={T.green} disabled={saving}/>
    </div>
  );

  // ══ QUICK FUEL FORM ══
  if (view==="qfuel") return (
    <div>
      <button onClick={()=>setView("vehicle")} style={{ background:"none", border:"none", color:T.gold, ...GF, fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}>← رجوع للمركبة</button>
      <div style={{ background:T.blue+"22", border:`1px solid ${T.blue}44`, borderRadius:12, padding:"10px 14px", marginBottom:16, display:"flex", gap:10, alignItems:"center" }}>
        <span style={{ fontSize:22 }}>⛽</span>
        <div><div style={{ color:T.blue, ...GF, fontWeight:700, fontSize:14 }}>تعبئة وقود</div><div style={{ color:T.sub, ...GF, fontSize:12 }}>{selVeh?.plate}</div></div>
      </div>
      <Field label="التاريخ" value={qfForm.date||""} onChange={v=>setQfForm({...qfForm,date:v})} type="date"/>
      <Field label="العداد السابق (كلم)" value={qfForm.prevKm||""} onChange={v=>setQfForm({...qfForm,prevKm:v})} type="number" placeholder="0"/>
      <Field label="العداد الحالي (كلم) *" value={qfForm.currKm||""} onChange={v=>setQfForm({...qfForm,currKm:v})} type="number" placeholder="0"/>
      {qfForm.prevKm && qfForm.currKm && +qfForm.currKm>+qfForm.prevKm && (
        <div style={{ background:T.card2, borderRadius:10, padding:"8px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
          <span style={{ color:T.sub, ...GF, fontSize:13 }}>المسافة المقطوعة</span>
          <span style={{ color:T.gold, ...GF, fontWeight:700 }}>{(+qfForm.currKm - +qfForm.prevKm).toLocaleString()} كلم</span>
        </div>
      )}
      <Field label="التكلفة (د.أ) *" value={qfForm.amount||""} onChange={v=>setQfForm({...qfForm,amount:v})} type="number" placeholder="0"/>
      <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ التعبئة"} onClick={doSaveFuel} full color={T.blue} disabled={saving}/>
    </div>
  );

  // ══ QUICK MAINTENANCE FORM ══
  if (view==="qmaintenance") return (
    <div>
      <button onClick={()=>setView("vehicle")} style={{ background:"none", border:"none", color:T.gold, ...GF, fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}>← رجوع للمركبة</button>
      <div style={{ background:T.orange+"22", border:`1px solid ${T.orange}44`, borderRadius:12, padding:"10px 14px", marginBottom:16, display:"flex", gap:10, alignItems:"center" }}>
        <span style={{ fontSize:22 }}>🔧</span>
        <div><div style={{ color:T.orange, ...GF, fontWeight:700, fontSize:14 }}>تسجيل غيار زيت</div><div style={{ color:T.sub, ...GF, fontSize:12 }}>{selVeh?.plate}</div></div>
      </div>
      <Field label="قراءة العداد عند الغيار (كلم) *" value={qmForm.oilKm||""} onChange={v=>setQmForm({...qmForm,oilKm:v})} type="number" placeholder="0"/>
      {qmForm.oilKm && (
        <div style={{ background:T.card2, borderRadius:10, padding:"8px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
          <span style={{ color:T.sub, ...GF, fontSize:13 }}>الغيار القادم تلقائياً</span>
          <span style={{ color:T.orange, ...GF, fontWeight:700 }}>{(+qmForm.oilKm+5000).toLocaleString()} كلم</span>
        </div>
      )}
      <Field label="تاريخ الغيار" value={qmForm.date||""} onChange={v=>setQmForm({...qmForm,date:v})} type="date"/>
      <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:10 }}>حالة الفلاتر والبريكات:</p>
      <QCounter label="فلتر الزيت (يستحق عند 2)" value={qmForm.filterOil||0} onChange={v=>setQmForm({...qmForm,filterOil:v})} limit={2}/>
      <QCounter label="فلتر الديزل (يستحق عند 3)" value={qmForm.filterDiesel||0} onChange={v=>setQmForm({...qmForm,filterDiesel:v})} limit={3}/>
      <QCounter label="فلتر الهواء (يستحق عند 3)" value={qmForm.filterAir||0} onChange={v=>setQmForm({...qmForm,filterAir:v})} limit={3}/>
      <QCounter label="البريكات (تستحق عند 3)" value={qmForm.brakes||0} onChange={v=>setQmForm({...qmForm,brakes:v})} limit={3}/>
      <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ الصيانة"} onClick={doSaveMaintenance} full color={T.orange} disabled={saving}/>
    </div>
  );

  // ══ SEARCH VIEW ══
  return (
    <div>
      <div style={{ position:"relative", marginBottom:16 }}>
        <input ref={inp} value={q} onChange={e=>setQ(e.target.value)} placeholder="ابحث عن مركبة، سائق، مخالفة..."
          style={{ width:"100%", background:T.card2, border:`1.5px solid ${T.gold}66`, borderRadius:12, padding:"12px 44px 12px 14px", color:T.text, fontSize:15, ...GF, outline:"none", boxSizing:"border-box" }}/>
        <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", fontSize:18, pointerEvents:"none" }}>🔍</span>
      </div>
      {q.length>=2 && results.length===0 && (
        <div style={{ textAlign:"center", padding:"28px 0", color:T.sub, ...GF, fontSize:14 }}>لا توجد نتائج لـ "{q}"</div>
      )}
      {results.length>0 && (
        <div>
          <div style={{ color:T.sub, ...GF, fontSize:11, marginBottom:10 }}>{results.length} نتيجة — اضغط لعرض التفاصيل وإجراءات سريعة</div>
          {results.map((r,i) => (
            <button key={i} onClick={()=>{ if(r.type==="vehicle") openVehicleCard(r.obj); else if(r.type==="driver") openDriverCard(r.obj); }}
              style={{ width:"100%", background:T.card2, border:`1px solid ${r.color}33`, borderRadius:12, padding:"12px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:12, cursor:"pointer", borderRight:`3px solid ${r.color}` }}>
              <span style={{ fontSize:22, flexShrink:0 }}>{r.icon}</span>
              <div style={{ flex:1, textAlign:"right" }}>
                <div style={{ color:T.text, ...GF, fontSize:14, fontWeight:700 }}>{r.title}</div>
                <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:2 }}>{r.sub}</div>
              </div>
              <span style={{ color:T.gold, fontSize:18 }}>←</span>
            </button>
          ))}
        </div>
      )}
      {q.length<2 && (
        <div style={{ textAlign:"center", padding:"20px 0" }}>
          <div style={{ fontSize:40, marginBottom:10 }}>🔍</div>
          <div style={{ color:T.sub, ...GF, fontSize:13 }}>ابحث عن مركبة أو سائق للاطلاع على ملخص شامل وإجراء عمليات سريعة</div>
        </div>
      )}
    </div>
  );
}

// MAIN SCREEN
// ══════════════════════════════════════════════════
function MainScreen({ onNav, notifications, myPhone, vehicles, violations, handovers, fuelRecords, drivers, maintenanceRecs, saveViolation, saveHandover, saveFuel, saveMaintenance, noteOptions, equipmentList }) {
  const [showNotif, setShowNotif] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const count = notifications.length;

  // ── Dashboard stats ──
  const openViol = violations.filter(v=>v.status!=="مسددة").length;
  const openViolAmt = violations.filter(v=>v.status!=="مسددة").reduce((s,v)=>s+(+v.amount||0),0);
  const today = new Date(); today.setHours(0,0,0,0);
  const expiring = vehicles.filter(v=>{
    const chk = exp => { if(!exp) return false; const d=new Date(exp); d.setHours(0,0,0,0); return (d-today)/86400000<=30; };
    return chk(v.license_exp)||chk(v.insurance_exp);
  }).length;
  const now = new Date();
  const mKey = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const monthFuel = fuelRecords.filter(r=>r.date&&r.date.startsWith(mKey)).reduce((s,r)=>s+(+r.amount||0),0);

  const tabs = [
    { id:"myvehicles", icon:"🚗", label:"مركباتي", sub:"ملخص شامل لجميع مركبات الشركة", color:T.gold },
    { id:"violations", icon:"🚨", label:"المخالفات", sub:"متابعة مخالفات المركبات وتنبيهات الدفع", color:T.red },
    { id:"license", icon:"📋", label:"الترخيص والتأمين", sub:"تواريخ الانتهاء والتجديد والسجل", color:T.blue },
    { id:"handover", icon:"🔑", label:"الاستلام والتسليم", sub:"حركة المركبات اليومية وعدة السيارة", color:T.green },
    { id:"drivers", icon:"👤", label:"السائقون", sub:"سجل السائقين وحالة كل مركبة الآن", color:T.blue },
    { id:"maintenance", icon:"🔧", label:"الصيانة", sub:"غيار الزيت والفلاتر والبريكات", color:T.orange },
    { id:"fuel", icon:"⛽", label:"المحروقات", sub:"تعبئة الوقود وتكلفة الكيلومتر", color:T.blue },
  ];

  const sendPriorityAlerts = () => {
    const priority = notifications.filter(n => n.priority);
    if (!priority.length || !myPhone) return;
    let msg = "🚨 *تنبيهات عاجلة — أسطول الأثر الذهبي*\n\n";
    priority.forEach(n => { msg += `${n.icon} ${n.title}\n${n.body}\n\n`; });

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <h1 style={{ color:T.gold, ...GF, fontSize:21, fontWeight:900, margin:0, letterSpacing:"-0.3px" }}>الأثر الذهبي 🏆</h1>
            <p style={{ color:T.sub, ...GF, fontSize:11, margin:"4px 0 0", fontWeight:500 }}>نظام إدارة أسطول المركبات</p>

          <div style={{ display:"flex", gap:8 }}>

            <button onClick={()=>setShowSearch(true)} style={{ width:40, height:40, background:T.card2, border:`1px solid ${T.border2}`, color:T.sub2, borderRadius:8, cursor:"pointer", fontSize:17, display:"flex", alignItems:"center", justifyContent:"center" }}>🔍</button>
            <button onClick={()=>setShowNotif(true)} style={{ width:40, height:40, background:count>0?T.goldGlow:T.card2, border:`1px solid ${count>0?"rgba(245,197,66,0.3)":T.border2}`, color:T.sub2, borderRadius:8, cursor:"pointer", fontSize:17, display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
              🔔{count>0 && <span style={{ position:"absolute", top:-5, right:-5, background:T.red, color:"#fff", borderRadius:10, fontSize:9, fontWeight:700, width:18, height:18, display:"flex", alignItems:"center", justifyContent:"center", ...GF }}>{count}</span>}

            <button onClick={()=>onNav("settings")} style={{ width:40, height:40, background:T.card2, border:`1px solid ${T.border2}`, color:T.sub2, borderRadius:8, cursor:"pointer", fontSize:17, display:"flex", alignItems:"center", justifyContent:"center" }}>⚙️</button>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, padding:"14px 14px 6px" }}>
        {[

          { nav:"license",    icon:"📋", value:expiring,  label:"تجديد خلال 30 يوم", accent:expiring>0?T.orange:T.sub, accentSoft:expiring>0?T.orangeSoft:T.card2 },

      {/* ── Tab List ── */}

// MY VEHICLES TAB
// ══════════════════════════════════════════════════
function MyVehiclesTab({ vehicles, violations, maintenanceRecs, fuelRecords, handovers, saveOneVehicle, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [showAddVeh, setShowAddVeh] = useState(false);
  const [saving, setSaving] = useState(false);
  const [addForm, setAddForm] = useState({ plate:"", type:"", make:"", regNum:"", fuelType:"", license_exp:"", insurance_exp:"" });
  const veh = vehicles.find(v => v.id===selVeh);

  const vViolations = violations.filter(v => v.plate===veh?.plate && v.status!=="مسددة");
  const vViolAmt = vViolations.reduce((s,v) => s+(+v.amount||0), 0);

  const licStatus = exp => {
    if (!exp) return { label:"غير مدخل", color:T.sub };
    try {
      const expMs = new Date(exp).setHours(0,0,0,0);
      const todayMs = new Date().setHours(0,0,0,0);
      if (isNaN(expMs)) return { label:"غير مدخل", color:T.sub };
      const diff = Math.floor((expMs - todayMs) / 86400000);
      if (diff < 0) return { label:"منتهي", color:T.red };
      if (diff <= 14) return { label:`${diff} يوم`, color:diff<=3?T.red:T.orange };
      return { label:"ساري", color:T.green };
    } catch(e) { return { label:"غير مدخل", color:T.sub }; }
  };

  const lastHandover = handovers.filter(h=>h.vehicleId===selVeh).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const maintRecs = maintenanceRecs.filter(r=>r.vehicleId===selVeh).sort((a,b)=>a.oilKm-b.oilKm);
  const lastMaint = maintRecs[maintRecs.length-1];
  const fRecs = fuelRecords.filter(r=>r.vehicleId===selVeh).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const lastFuel = fRecs[0];
  const avgCost = fRecs.length ? (fRecs.reduce((s,r)=>s+(r.costPerKm||0),0)/fRecs.length).toFixed(3) : null;

  // عداد المسافة الشهري
  const calcMonthlyKm = (vId) => {
    const recs = fuelRecords.filter(r=>r.vehicleId===vId && r.currKm).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if (!recs.length) return null;
    const now = new Date();
    const mk = d => { const dt=new Date(d); return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0"); };
    const thisKey = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
    const ld = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const lastKey = ld.getFullYear()+"-"+String(ld.getMonth()+1).padStart(2,"0");
    const monthMax = {}, monthMin = {};
    recs.forEach(r => { const k=mk(r.date); if(!monthMax[k]||r.currKm>monthMax[k]) monthMax[k]=r.currKm; if(!monthMin[k]||r.currKm<monthMin[k]) monthMin[k]=r.currKm; });
    const monthKeys = Object.keys(monthMax).sort();
    const monthDist = {};
    for (let i=0; i<monthKeys.length; i++) {
      const k = monthKeys[i];
      if (i===0) { const d=monthMax[k]-(monthMin[k]||monthMax[k]); if(d>0) monthDist[k]=d; }
      else { monthDist[k]=monthMax[k]-monthMax[monthKeys[i-1]]; }
    }
    if ((monthDist[thisKey]==null||monthDist[thisKey]===0) && monthMax[thisKey]!=null) {
      const d=monthMax[thisKey]-(monthMin[thisKey]||monthMax[thisKey]);
      monthDist[thisKey]=d;
    }
    const history = monthKeys.slice(-6).filter(k=>monthDist[k]!=null&&monthDist[k]>=0).map(k=>({ key:k, label:new Date(k+"-01").toLocaleDateString("ar-JO",{month:"short",year:"numeric"}), km:monthDist[k] }));
    return { thisMonth:monthDist[thisKey]??null, lastMonth:monthDist[lastKey]??null, history };
  };
  const monthlyKm = selVeh ? calcMonthlyKm(selVeh) : null;

  const IR = ({ label, value, color=T.text }) => (
    <div style={{ display:"flex", justifyContent:"space-between", padding:"9px 0", borderBottom:`1px solid ${T.border}` }}>
      <span style={{ color:T.sub, ...GF, fontSize:13 }}>{label}</span>
      <span style={{ color, ...GF, fontSize:13, fontWeight:600 }}>{value}</span>
    </div>
  );

  const Section = ({ title, color, children }) => (
    <div style={{ background:T.card, borderRadius:16, padding:"14px 16px", marginBottom:12, borderRight:`4px solid ${color}` }}>
      <div style={{ color:T.text, ...GF, fontWeight:700, fontSize:15, marginBottom:10 }}>{title}</div>
      {children}
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🚗 مركباتي" onBack={onBack}/>
      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>

      {/* زر إضافة مركبة */}
      <div style={{ padding:"8px 14px 0" }}>
        <button onClick={()=>setShowAddVeh(true)}
          style={{ width:"100%", background:T.card, border:`1.5px dashed ${T.gold}66`, borderRadius:14, padding:"12px", color:T.gold, ...GF, fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          <span style={{ fontSize:20 }}>+</span> إضافة مركبة جديدة
        </button>
      </div>
      {!selVeh && <div style={{ textAlign:"center", padding:60, color:T.sub, ...GF, fontSize:15 }}>اختر مركبة لعرض ملخصها الشامل</div>}
      {veh && (
        <div style={{ padding:"14px 14px" }}>
          <div style={{ background:T.card, borderRadius:16, padding:"16px", marginBottom:14, borderTop:`3px solid ${T.gold}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
              <div style={{ color:T.gold, ...GF, fontSize:18, fontWeight:800 }}>{veh.plate}</div>
              {veh.fuelType==="electric" && <Badge label="⚡ كهربائية" color={T.green}/>}
              {veh.fuelType==="hybrid" && <Badge label="🔋 هايبرد" color={T.blue}/>}
            </div>
            <div style={{ color:T.sub, ...GF, fontSize:13 }}>{[veh.type,veh.make,veh.regNum].filter(Boolean).join(" | ")||"—"}</div>
          </div>

          <Section title="🚨 المخالفات" color={T.red}>
            <div style={{ display:"flex", gap:8 }}>
              <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 12px", textAlign:"center" }}>
                <div style={{ color:T.red, ...GF, fontSize:20, fontWeight:700 }}>{vViolations.length}</div>
                <div style={{ color:T.sub, ...GF, fontSize:11 }}>مخالفة نشطة</div>
              </div>
              <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 12px", textAlign:"center" }}>
                <div style={{ color:T.orange, ...GF, fontSize:18, fontWeight:700 }}>{vViolAmt.toFixed(0)}</div>
                <div style={{ color:T.sub, ...GF, fontSize:11 }}>د.أ إجمالي</div>
              </div>
            </div>
          </Section>

          <Section title="📋 الترخيص والتأمين" color={T.blue}>
            <IR label="الترخيص" value={veh.license_exp?toDateStr(veh.license_exp):"غير مدخل"} color={licStatus(veh.license_exp).color}/>
            <IR label="حالة الترخيص" value={licStatus(veh.license_exp).label} color={licStatus(veh.license_exp).color}/>
            <IR label="التأمين" value={veh.insurance_exp?toDateStr(veh.insurance_exp):"غير مدخل"} color={licStatus(veh.insurance_exp).color}/>
            <IR label="حالة التأمين" value={licStatus(veh.insurance_exp).label} color={licStatus(veh.insurance_exp).color}/>
          </Section>

          <Section title="🔑 آخر استلام/تسليم" color={T.green}>
            {lastHandover ? <>
              <IR label="النوع" value={lastHandover.type} color={lastHandover.type==="استلام"?T.blue:T.green}/>
              <IR label="السائق" value={lastHandover.driver}/>
              <IR label="التاريخ" value={`${toDateStr(lastHandover.date)} ${fmt12(lastHandover.date)}`}/>
            </> : <div style={{ color:T.sub, ...GF, fontSize:13 }}>لا يوجد سجل</div>}
          </Section>

          <Section title="🔧 الصيانة" color={T.orange}>
            {lastMaint ? <>
              <IR label="آخر غيار زيت" value={`${lastMaint.oilKm?.toLocaleString()} كلم`}/>
              <IR label="الغيار القادم" value={`${lastMaint.nextOilKm?.toLocaleString()} كلم`} color={T.orange}/>
            </> : <div style={{ color:T.sub, ...GF, fontSize:13 }}>لا يوجد سجل صيانة</div>}
          </Section>

          <Section title="⛽ المحروقات" color={T.blue}>
            {lastFuel ? <>
              <IR label="آخر تعبئة" value={toDateStr(lastFuel.date)}/>
              <IR label="العداد الحالي" value={`${lastFuel.currKm?.toLocaleString()} كلم`} color={T.gold}/>
              <IR label="متوسط تكلفة الكلم" value={avgCost?`${avgCost} د.أ`:"—"} color={T.green}/>
            </> : <div style={{ color:T.sub, ...GF, fontSize:13 }}>لا يوجد سجل محروقات</div>}
          </Section>

          {/* عداد المسافة الشهري */}
          {monthlyKm && (monthlyKm.thisMonth!==null || monthlyKm.history.length>0) && (
            <Section title="📏 المسافة الشهرية" color={T.green}>
              {/* هذا الشهر vs الشهر الماضي */}
              <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                <div style={{ flex:1, background:T.card2, borderRadius:12, padding:"10px 12px", textAlign:"center" }}>
                  <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>هذا الشهر</div>
                  <div style={{ color:T.green, ...GF, fontSize:20, fontWeight:800 }}>
                    {monthlyKm.thisMonth!=null ? monthlyKm.thisMonth.toLocaleString() : "—"}
                  </div>
                  <div style={{ color:T.sub, ...GF, fontSize:10 }}>كلم</div>
                </div>
                <div style={{ flex:1, background:T.card2, borderRadius:12, padding:"10px 12px", textAlign:"center" }}>
                  <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>الشهر الماضي</div>
                  <div style={{ color:T.blue, ...GF, fontSize:20, fontWeight:800 }}>
                    {monthlyKm.lastMonth!=null ? monthlyKm.lastMonth.toLocaleString() : "—"}
                  </div>
                  <div style={{ color:T.sub, ...GF, fontSize:10 }}>كلم</div>
                </div>
                {monthlyKm.thisMonth!=null && monthlyKm.lastMonth!=null && monthlyKm.lastMonth>0 && (() => {
                  const diff = monthlyKm.thisMonth - monthlyKm.lastMonth;
                  const pct = Math.round((diff/monthlyKm.lastMonth)*100);
                  const up = diff >= 0;
                  return (
                    <div style={{ flex:1, background:up?T.orange+"22":T.green+"22", borderRadius:12, padding:"10px 12px", textAlign:"center", border:`1px solid ${up?T.orange:T.green}44` }}>
                      <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>التغيير</div>
                      <div style={{ color:up?T.orange:T.green, ...GF, fontSize:18, fontWeight:800 }}>{up?"▲":"▼"} {Math.abs(pct)}%</div>
                      <div style={{ color:T.sub, ...GF, fontSize:10 }}>{up?"زيادة":"انخفاض"}</div>
                    </div>
                  );
                })()}
              </div>
              {/* رسم بياني نصي للأشهر الستة الأخيرة */}
              {monthlyKm.history.length > 1 && (() => {
                const maxKm = Math.max(...monthlyKm.history.map(h=>h.km));
                return (
                  <div>
                    <div style={{ color:T.sub, ...GF, fontSize:11, marginBottom:8 }}>آخر {monthlyKm.history.length} أشهر</div>
                    {monthlyKm.history.map(h => {
                      const pct = maxKm > 0 ? (h.km/maxKm)*100 : 0;
                      const now = new Date();
                      const thisKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
                      const isCurrent = h.key === thisKey;
                      return (
                        <div key={h.key} style={{ marginBottom:8 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                            <span style={{ color:isCurrent?T.gold:T.sub, ...GF, fontSize:11, fontWeight:isCurrent?700:400 }}>{h.label}{isCurrent?" ◀":""}</span>
                            <span style={{ color:isCurrent?T.gold:T.text, ...GF, fontSize:11, fontWeight:700 }}>{h.km.toLocaleString()} كلم</span>
                          </div>
                          <div style={{ background:T.card3, borderRadius:6, height:8, overflow:"hidden" }}>
                            <div style={{ background:isCurrent?T.gold:T.green, width:`${pct}%`, height:"100%", borderRadius:6, transition:"width 0.3s" }}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </Section>
          )}
        </div>
      )}

      {/* Modal: إضافة مركبة يدوياً */}
      <Modal show={showAddVeh} onClose={()=>{ setShowAddVeh(false); setAddForm({ plate:"", type:"", make:"", regNum:"", fuelType:"", license_exp:"", insurance_exp:"" }); }} title="➕ إضافة مركبة جديدة">
        <Field label="رقم اللوحة *" value={addForm.plate} onChange={v=>setAddForm(f=>({...f,plate:v}))} req/>
        <Field label="نوع المركبة" value={addForm.type} onChange={v=>setAddForm(f=>({...f,type:v}))} placeholder="مثال: شاحنة / بيك أب / سيدان"/>
        <Field label="الصنع / الماركة" value={addForm.make} onChange={v=>setAddForm(f=>({...f,make:v}))} placeholder="مثال: تويوتا / هيونداي"/>
        <Field label="رقم التسجيل" value={addForm.regNum} onChange={v=>setAddForm(f=>({...f,regNum:v}))}/>
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>نوع الوقود</label>
          <select value={addForm.fuelType} onChange={e=>setAddForm(f=>({...f,fuelType:e.target.value}))}
            style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:T.text, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}>
            <option value="">بنزين / ديزل</option>
            <option value="electric">⚡ كهربائية</option>
            <option value="hybrid">🔋 هايبرد</option>
          </select>
        </div>
        <Field label="تاريخ انتهاء الترخيص" value={addForm.license_exp} onChange={v=>setAddForm(f=>({...f,license_exp:v}))} type="date"/>
        <Field label="تاريخ انتهاء التأمين" value={addForm.insurance_exp} onChange={v=>setAddForm(f=>({...f,insurance_exp:v}))} type="date"/>
        <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ المركبة"} disabled={saving||!addForm.plate} onClick={async()=>{
          if (!addForm.plate||saving) return;
          setSaving(true);
          await saveOneVehicle({ ...addForm, id:uid(), renewHistory:[] });
          setAddForm({ plate:"", type:"", make:"", regNum:"", fuelType:"", license_exp:"", insurance_exp:"" });
          setShowAddVeh(false);
          setSaving(false);
        }} full color={T.gold}/>
      </Modal>
    </div>
  );
}

function ViolationsTab({ violations, saveViolations, vehicles, noteOptions, myPhone, onBack }) {
  const [view, setView] = useState("active");
  const [selVeh, setSelVeh] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [detail, setDetail] = useState(null);
  const [selected, setSelected] = useState([]);
  const [search, setSearch] = useState("");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [saving, setSaving] = useState(false);
  const [editVeh, setEditVeh] = useState(null);
  const [editForm, setEditForm] = useState({filterOil:1,filterDiesel:1,filterAir:1,brakes:1});
  const [form, setForm] = useState({ plate:"", driver:"", vdate:todayISO(), vtype:"", vtypeOther:"", vnum:"", amount:"", note:"" });

  const daysLeft = v => 30 - daysDiff(v.vdate);
  const statusOf = v => {
    if (v.status==="مسددة") return { label:"مسددة", color:T.green };
    if (v.status==="انتظار") return { label:"انتظار", color:T.orange };
    const r = daysLeft(v);
    if (r<=0) return { label:"انتهت المهلة", color:T.red };
    return { label:"مفتوحة", color:T.yellow };
  };

  const filterByView = v => {
    if (view==="active") return v.status!=="مسددة" && v.status!=="انتظار";
    if (view==="waiting") return v.status==="انتظار";
    if (view==="archive") return v.status==="مسددة";
    return true;
  };

  const displayed = violations.filter(v => {
    if (!filterByView(v)) return false;
    if (selVeh) { const veh=vehicles.find(x=>x.id===selVeh); if(veh && v.plate!==veh.plate) return false; }
    if (search && !v.plate.includes(search) && !v.driver.includes(search) && !(v.vnum||"").includes(search)) return false;
    if (dateFrom && v.vdate < dateFrom) return false;
    if (dateTo && v.vdate > dateTo) return false;
    return true;
  });

  const active = violations.filter(v => v.status!=="مسددة" && v.status!=="انتظار");
  const waiting = violations.filter(v => v.status==="انتظار");
  const totalAmt = active.reduce((s,v) => s+(+v.amount||0), 0);
  const savingAmt = active.filter(v=>daysLeft(v)>0).reduce((s,v) => s+(+v.amount||0)*0.3, 0);
  const weekAlert = active.filter(v => { const r=daysLeft(v); return r>0&&r<=7; }).length;

  const driverMap = {};
  violations.filter(v=>v.status!=="مسددة").forEach(v => { if(v.driver) driverMap[v.driver]=(driverMap[v.driver]||0)+1; });
  const topDriver = Object.entries(driverMap).sort((a,b) => b[1]-a[1])[0];

  const vehViolCount = id => {
    const veh = vehicles.find(v => v.id===id);
    if (!veh) return 0;
    return violations.filter(v => v.plate===veh.plate && v.status!=="مسددة").length;
  };

  const addViolation = async () => {
    if (!form.plate||!form.driver||!form.vdate||!form.vtype||!form.amount) return;
    if (saving) return;
    setSaving(true);
    const finalType = form.vtype==="أخرى" && form.vtypeOther ? form.vtypeOther : form.vtype;
    const newV = { ...form, vtype:finalType, id:uid(), status:"مفتوحة", created:new Date().toISOString() };
    await saveViolations(newV);
    setForm({ plate:"", driver:"", vdate:todayISO(), vtype:"", vtypeOther:"", vnum:"", amount:"", note:"" });
    setShowAdd(false);
    setSaving(false);
  };

  const markPaid = async id => {
    const v = violations.find(x=>x.id===id);
    await saveViolations({...v, status:"مسددة", paidDate:new Date().toISOString()});
    setDetail(null);
  };

  const sendToAccounting = async () => {
    const items = violations.filter(v => selected.includes(v.id));
    let msg = "📋 *تقرير المخالفات — الأثر الذهبي*\n\n";
    items.forEach((v,i) => { msg += `${i+1}. لوحة: ${v.plate} | السائق: ${v.driver}\n   التاريخ: ${toDateStr(v.vdate)} | النوع: ${v.vtype}\n   المبلغ: ${v.amount} د.أ | المتبقي: ${daysLeft(v)} يوم\n\n`; });
    for(const v of items){ await saveViolations({...v, status:"انتظار", sentDate:new Date().toISOString()}); }
    setSelected([]);
    if (myPhone) sendWA(myPhone, msg);
    else showToast("⚠️ لم يُحفظ رقم الهاتف في الإعدادات", T.orange);
  };

  const exportExcel = () => {
    // CSV export - works on all Android browsers
    const headers = ["رقم المركبة","الموظف المسؤول","رقم المخالفة","تاريخ المخالفة","قيمة المخالفة","وصف المخالفة","الحالة"];
    const rows = displayed.map(v => [
      v.plate, v.driver, v.vnum||"—",
      toDateStr(v.vdate), v.amount, v.vtype,
      statusOf(v).label
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `violations_${todayISO()}.csv`;
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🚨 المخالفات" onBack={onBack}
        right={<button onClick={()=>setShowAdd(true)} style={{ background:T.gold, color:"#000", border:"none", borderRadius:8, padding:"7px 14px", ...GF, fontSize:13, fontWeight:700, cursor:"pointer" }}>+ إضافة</button>}
      />

      {/* ── Summary Row ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, padding:"14px 14px 0" }}>
        {[
          { label:"نشطة", value:active.length, color:T.red },
          { label:"إجمالي المستحق", value:`${totalAmt.toFixed(0)} د.أ`, color:T.orange },
          { label:"ينتهي هذا الأسبوع", value:weekAlert, color:weekAlert>0?T.red:T.sub },
        ].map((s,i) => (
          <div key={i} style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"10px 12px", textAlign:"center", boxShadow:T.shadow }}>
            <div style={{ color:s.color, ...GF, fontSize:17, fontWeight:900 }}>{s.value}</div>
            <div style={{ color:T.sub, ...GF, fontSize:10, marginTop:3, fontWeight:600 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {topDriver && (
        <div style={{ margin:"10px 14px 0", background:T.redSoft, borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:10, border:`1px solid rgba(239,68,68,0.2)` }}>
          <span style={{ fontSize:18 }}>⚠️</span>
          <div style={{ ...GF, fontSize:12 }}><span style={{ color:T.sub }}>الأكثر مخالفةً: </span><span style={{ color:T.red, fontWeight:700 }}>{topDriver[0]}</span><span style={{ color:T.sub }}> ({topDriver[1]})</span></div>
        </div>
      )}

      {/* ── Filter chips ── */}
      <div style={{ padding:"12px 14px 0", display:"flex", gap:7, overflowX:"auto" }}>
        {[{v:"active",l:"النشطة"},{v:"waiting",l:`انتظار (${waiting.length})`},{v:"archive",l:"الأرشيف"}].map(f => (
          <button key={f.v} onClick={()=>setView(f.v)}
            style={{ background:view===f.v?T.redSoft:T.card2, color:view===f.v?T.red:T.sub2, border:`1px solid ${view===f.v?"rgba(239,68,68,0.3)":T.border}`, borderRadius:20, padding:"7px 16px", ...GF, fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>{f.l}</button>
        ))}
        <select value={selVeh} onChange={e=>setSelVeh(e.target.value)}
          style={{ background:selVeh?T.goldGlow:T.card2, border:`1px solid ${selVeh?"rgba(245,197,66,0.3)":T.border}`, borderRadius:20, padding:"7px 14px", color:selVeh?T.gold:T.sub2, fontSize:12, ...GF, outline:"none", cursor:"pointer" }}>
          <option value="">كل المركبات</option>
          {vehicles.map(v => { const cnt=vehViolCount(v.id); return <option key={v.id} value={v.id}>{v.plate}{cnt>0?` (${cnt})`:""}</option>; })}
        </select>
      </div>

      {/* ── Search ── */}
      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث باللوحة أو السائق..."
          style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      {/* ── Actions ── */}
      {(displayed.length>0 || selected.length>0) && (
        <div style={{ padding:"8px 14px 0", display:"flex", gap:8 }}>
          {displayed.length>0 && <Btn label="📊 تصدير" onClick={exportExcel} sm color={T.green} outline/>}
          {selected.length>0 && <Btn label={`📤 إرسال للمحاسبة (${selected.length})`} onClick={sendToAccounting} sm color={T.orange}/>}
        </div>
      )}

      {/* ── List ── */}
      <div style={{ padding:"12px 14px" }}>
        {displayed.length===0 && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"50px 30px", textAlign:"center" }}>
            <div style={{ width:80, height:80, background:T.card2, border:`2px dashed ${T.border2}`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:34, marginBottom:20 }}>🚨</div>
            <div style={{ color:T.text, ...GF, fontSize:16, fontWeight:800, marginBottom:8 }}>لا توجد مخالفات</div>
            <div style={{ color:T.sub, ...GF, fontSize:13, marginBottom:24 }}>{view==="active"?"لا توجد مخالفات نشطة حالياً":view==="archive"?"لا توجد مخالفات مسددة":"لا توجد مخالفات قيد الانتظار"}</div>
            <button onClick={()=>setShowAdd(true)} style={{ background:T.gold, color:"#000", border:"none", borderRadius:12, padding:"12px 24px", ...GF, fontSize:14, fontWeight:800, cursor:"pointer" }}>+ إضافة مخالفة</button>
          </div>
        )}
        {displayed.map(v => {
          const s = statusOf(v), r = daysLeft(v), isSel = selected.includes(v.id);
          const isPaid = v.status==="مسددة";
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:10, border:`1px solid ${T.border}`, boxShadow:T.shadow, overflow:"hidden", opacity:isPaid?0.7:1 }}>
              {/* Card Header */}
              <div style={{ background:isPaid?T.greenSoft:T.redSoft, borderBottom:`1px solid ${isPaid?"rgba(34,197,94,0.1)":"rgba(239,68,68,0.1)"}`, padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  {view==="active" && (
                    <input type="checkbox" checked={isSel} onChange={()=>setSelected(isSel?selected.filter(i=>i!==v.id):[...selected,v.id])}
                      style={{ width:16, height:16, accentColor:T.gold, flexShrink:0 }}/>
                  )}
                  <div>
                    <div style={{ color:T.gold, ...GF, fontWeight:900, fontSize:15 }}>{v.plate}</div>
                    <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>👤 {v.driver} · {toDateStr(v.vdate)}</div>
                  </div>
                </div>
                <Badge label={s.label} color={s.color}/>
              </div>
              {/* Card Body */}
              <div style={{ padding:"12px 14px" }} onClick={()=>setDetail(v)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ color:T.sub2, ...GF, fontSize:13 }}>{v.vtype}</span>
                  <div><span style={{ color:isPaid?T.green:T.red, ...GF, fontSize:18, fontWeight:900 }}>{v.amount}</span><span style={{ color:T.sub, ...GF, fontSize:12 }}> د.أ</span></div>
                </div>
                {v.status!=="مسددة" && r>0 && (
                  <div style={{ background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                      <span style={{ color:T.sub, ...GF, fontSize:11 }}>المتبقي من مهلة الخصم</span>
                      <span style={{ color:s.color, ...GF, fontSize:12, fontWeight:700 }}>{r} يوم</span>
                    </div>
                    <div style={{ background:T.border, borderRadius:4, height:4 }}>
                      <div style={{ background:s.color, height:4, borderRadius:4, width:`${Math.max(3,(r/30)*100)}%` }}/>
                    </div>
                  </div>
                )}
              </div>
              {/* Card Footer */}
              {!isPaid && (
                <div style={{ borderTop:`1px solid ${T.border}`, padding:"10px 14px", display:"flex", gap:8 }}>
                  <button onClick={()=>markPaid(v.id)} style={{ flex:1, background:T.greenSoft, border:`1px solid rgba(34,197,94,0.2)`, color:T.green, borderRadius:8, padding:"8px", ...GF, fontSize:12, fontWeight:700, cursor:"pointer" }}>✓ تسديد</button>
                  {myPhone && <button onClick={()=>{ let msg=`🚨 *تنبيه مخالفة*\nالمركبة: ${v.plate}\nالسائق: ${v.driver}\nالمخالفة: ${v.vtype}\nالمبلغ: ${v.amount} د.أ\nالتاريخ: ${toDateStr(v.vdate)}`; sendWA(myPhone,msg); }} style={{ flex:1, background:T.blueSoft, border:`1px solid rgba(96,165,250,0.2)`, color:T.blue, borderRadius:8, padding:"8px", ...GF, fontSize:12, fontWeight:700, cursor:"pointer" }}>📲 إشعار</button>}
                  <button onClick={()=>setDetail(v)} style={{ flex:1, background:T.card2, border:`1px solid ${T.border}`, color:T.sub2, borderRadius:8, padding:"8px", ...GF, fontSize:12, fontWeight:700, cursor:"pointer" }}>التفاصيل</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Add Modal */}
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="إضافة مخالفة جديدة">
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>رقم المركبة *</label>
          <select value={form.plate} onChange={e=>setForm({...form,plate:e.target.value})}
            style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:form.plate?T.text:T.sub, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}>
            <option value="">— اختر المركبة —</option>
            {vehicles.map(v => <option key={v.id} value={v.plate}>{v.plate}{v.type?` — ${v.type}`:""}</option>)}
          </select>
        </div>
        <Field label="الموظف المسؤول" value={form.driver} onChange={v=>setForm({...form,driver:v})} req/>
        <Field label="تاريخ المخالفة" value={form.vdate} onChange={v=>setForm({...form,vdate:v})} type="date" req/>
        <FieldSelect label="تصنيف المخالفة" value={form.vtype} onChange={v=>setForm({...form,vtype:v})} opts={VTYPES} req/>
        {form.vtype==="أخرى" && <Field label="اكتب نوع المخالفة" value={form.vtypeOther} onChange={v=>setForm({...form,vtypeOther:v})} placeholder="اكتب وصف المخالفة..." req/>}
        <Field label="رقم المخالفة (اختياري)" value={form.vnum} onChange={v=>setForm({...form,vnum:v})}/>
        <Field label="قيمة المخالفة (د.أ)" value={form.amount} onChange={v=>setForm({...form,amount:v})} type="number" req/>
        <FieldSelect label="ملاحظات (اختياري)" value={form.note} onChange={v=>setForm({...form,note:v})} opts={noteOptions}/>
        <Btn label={saving?"جارٍ الحفظ...":"✓ حفظ المخالفة"} onClick={addViolation} full color={T.gold} disabled={saving}/>
      </Modal>

      {/* Detail Modal */}
      <Modal show={!!detail} onClose={()=>setDetail(null)} title="تفاصيل المخالفة">
        {detail && (() => {
          const disc = (+detail.amount*0.7).toFixed(2), save_ = (+detail.amount*0.3).toFixed(2);
          return (
            <div>
              {[
                { icon:"📅", label:"تاريخ المخالفة", date:detail.vdate },
                detail.sentDate && { icon:"📤", label:"أُرسلت للمحاسبة", date:detail.sentDate },
                detail.paidDate && { icon:"✅", label:"تاريخ السداد", date:detail.paidDate },
              ].filter(Boolean).map((x,i) => (
                <div key={i} style={{ display:"flex", gap:12, alignItems:"center", marginBottom:12, background:T.card2, borderRadius:10, padding:"8px 12px" }}>
                  <span style={{ fontSize:20 }}>{x.icon}</span>
                  <div><div style={{ color:T.sub, ...GF, fontSize:11 }}>{x.label}</div><div style={{ color:T.text, ...GF, fontSize:14 }}>{toDateStr(x.date)}</div></div>
                </div>
              ))}
              <div style={{ background:T.card2, borderRadius:12, padding:16, margin:"16px 0" }}>
                {[["رقم اللوحة",detail.plate],["الموظف",detail.driver],["نوع المخالفة",detail.vtype],
                  ["رقم المخالفة",detail.vnum||"—"],["المبلغ الأصلي",`${detail.amount} د.أ`],
                  ["بعد خصم 30%",`${disc} د.أ`],["الوفر",`${save_} د.أ`],["الملاحظة",detail.note||"—"],
                ].map(([k,v]) => (
                  <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                    <span style={{ color:T.sub, ...GF, fontSize:13 }}>{k}</span>
                    <span style={{ color:T.text, ...GF, fontSize:13, fontWeight:600 }}>{v}</span>
                  </div>
                ))}
              </div>
              {detail.status!=="مسددة" && <Btn label="✅ تم السداد" onClick={()=>markPaid(detail.id)} full color={T.green}/>}
            </div>
          );
        })()}
      </Modal>
    </div>
  );
}
