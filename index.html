function el(tag,attrs={},...children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else if(k==="htmlFor")e.htmlFor=v;
    else if(k==="checked")e.checked=v;
    else e.setAttribute(k,v);
  }
  for(const c of children.flat()){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return e;
}

function mkHeader(title,onBack){
  const hdr=el("div",{className:"header"});

  hdr.appendChild(el("span",{className:"header-title"},title));
  hdr.appendChild(el("div",{style:{width:"80px"}}));
  return hdr;
}

function mkModal(title,buildFn){
  const overlay=el("div",{className:"modal-overlay",onClick:()=>overlay.remove()});
  const content=el("div",{className:"modal-content",onClick:e=>e.stopPropagation()});
  content.appendChild(el("div",{className:"modal-handle"}));
  const mh=el("div",{className:"modal-header"});
  mh.appendChild(el("h2",{className:"modal-title"},title));
  mh.appendChild(el("button",{className:"close-btn",onClick:()=>overlay.remove()},"✕"));
  content.appendChild(mh);
  const body=buildFn(()=>overlay.remove());
  if(body)content.appendChild(body);
  overlay.appendChild(content);
  document.body.appendChild(overlay);
  return overlay;
}

function mkField(label,val,onInput,type="text",placeholder="",req=false){
  const wrap=el("div",{className:"field-wrap"});
  if(label)wrap.appendChild(el("label",{className:"field-label"},label+(req?" *":"")));
  const inp=el("input",{type,placeholder});
  if(val!=null)inp.value=val;
  if(onInput)inp.addEventListener("input",e=>onInput(e.target.value));
  if(type==="date")inp.addEventListener("change",e=>onInput&&onInput(e.target.value));
  wrap.appendChild(inp);
  return{wrap,inp};
}

function mkSelect(label,val,onChange,opts,req=false){
  const wrap=el("div",{className:"field-wrap"});
  if(label)wrap.appendChild(el("label",{className:"field-label"},label+(req?" *":"")));
  const sel=el("select");
  sel.appendChild(el("option",{value:""},"— اختر —"));
  opts.forEach(o=>{const v=o.v||o,l=o.l||o;const opt=el("option",{value:v},l);if(v===val)opt.selected=true;sel.appendChild(opt);});
  sel.addEventListener("change",e=>onChange&&onChange(e.target.value));
  wrap.appendChild(sel);
  return{wrap,sel};
}

// ════════════════════════════════════════════════════
// NOTIFICATIONS
// ════════════════════════════════════════════════════
function buildNotifs(){
  const notes=[];
  S.violations.filter(v=>v.status!=="مسددة").forEach(v=>{
    const r=30-daysDiff(v.vdate);
    if(r<=0)notes.push({icon:"⛔",title:"مخالفة — انتهت المهلة",body:`${v.plate} — ${v.vtype}`,color:"#ef4444",tab:"violations",priority:true});
    else if(r<=5)notes.push({icon:"🔴",title:`مخالفة — ${r} أيام متبقية`,body:`${v.plate} — ${v.vtype}`,color:"#ef4444",tab:"violations",priority:true});
    else if(r<=10)notes.push({icon:"🟠",title:`مخالفة — ${r} يوم متبقي`,body:v.plate,color:"#f97316",tab:"violations"});
  });
  S.vehicles.forEach(v=>{
    const chk=(exp,label)=>{
      if(!exp)return;
      const nextExp=addOneYear(exp);
      const diff=daysDiff(new Date(),nextExp);
      if(diff<=0)notes.push({icon:"🔴",title:`${label} — موعد التجديد انتهى`,body:v.plate,color:"#ef4444",tab:"license",priority:true});
      else{const r=diff;
        if(r<=3)notes.push({icon:"🔴",title:`${label} — ${r} أيام للتجديد`,body:v.plate,color:"#ef4444",tab:"license",priority:true});
        else if(r<=7)notes.push({icon:"🟠",title:`${label} — ${r} أيام للتجديد`,body:v.plate,color:"#f97316",tab:"license"});
        else if(r<=14)notes.push({icon:"🟡",title:`${label} — ${r} يوم للتجديد`,body:v.plate,color:"#eab308",tab:"license"});
        else if(r<=30)notes.push({icon:"🟢",title:`${label} — ${r} يوم للتجديد`,body:v.plate,color:"#22c55e",tab:"license"});
      }
    };
    if(v.license_exp)chk(v.license_exp,"الترخيص");
    if(v.insurance_exp)chk(v.insurance_exp,"التأمين");
  });
  S.vehicles.forEach(v=>{
    const fRecs=S.fuel.filter(r=>r.vehicleId===v.id).sort((a,b)=>b.currKm-a.currKm);
    const currKm=fRecs.length?fRecs[0].currKm:null;
    const mRecs=S.maintenance.filter(r=>r.vehicleId===v.id).sort((a,b)=>a.oilKm-b.oilKm);
    if(!mRecs.length)return;
    const last=mRecs[mRecs.length-1];
    const nextOil=last.nextOilKm||(last.oilKm+5000);
    if(currKm){const diff=nextOil-currKm;
      if(diff<=0)notes.push({icon:"🔴",title:"غيار زيت متأخر",body:`${v.plate} — تجاوز ${Math.abs(diff).toLocaleString()} كلم`,color:"#ef4444",tab:"maintenance",priority:true});
      else if(diff<=500)notes.push({icon:"🟠",title:"غيار زيت قريب",body:`${v.plate} — ${diff.toLocaleString()} كلم`,color:"#f97316",tab:"maintenance"});
    }
  });
  return notes;
}

function sendMorningSummary(){
  if(!S.myPhone)return;
  const today=new Date();
  const lastSent=localStorage.getItem("gm_lastMorningSent");
  const todayStr=todayISO();
  if(lastSent===todayStr)return; // Already sent today
  const notes=buildNotifs();
  if(!notes.length){localStorage.setItem("gm_lastMorningSent",todayStr);return;}
  let msg="🌅 *ملخص صباح "+today.toLocaleDateString("ar-JO")+" — الأثر الذهبي*\n\n";
  const priority=notes.filter(n=>n.priority);
  const normal=notes.filter(n=>!n.priority);
  if(priority.length){msg+="🚨 *تنبيهات عاجلة ("+priority.length+"):*\n";priority.forEach(n=>{msg+=n.icon+" "+n.title+" — "+n.body+"\n";});msg+="\n";}
  if(normal.length){msg+="⚠️ *تنبيهات عادية ("+normal.length+"):*\n";normal.forEach(n=>{msg+=n.icon+" "+n.title+" — "+n.body+"\n";});msg+="\n";}
  // Add violations summary
  const activeViols=S.violations.filter(v=>v.status!=="مسددة");
  if(activeViols.length){const total=activeViols.reduce((s,v)=>s+(+v.amount||0),0);msg+=`📋 *المخالفات النشطة:* ${activeViols.length} مخالفة | ${total.toFixed(0)} د.أ

`;}
  msg+=`_تم الإرسال تلقائياً عند فتح التطبيق_`;
  sendWA(S.myPhone,msg);
  localStorage.setItem("gm_lastMorningSent",todayStr);
}

      lc.appendChild(mkBadge(ls.label,ls.color));
      if(nextLic)lc.appendChild(el("div",{style:{color:"#D4AF37",fontSize:"10px",marginTop:"4px"}},`تجديد: ${toDateStr(nextLic)}`));
      // Insurance col
      const ic=el("div",{style:{flex:"1",background:"#1a1e2e",borderRadius:"10px",padding:"8px 10px"}});
      ic.appendChild(el("div",{style:{color:"#7a8296",fontSize:"10px",marginBottom:"4px"}},"التأمين"));
      ic.appendChild(el("div",{style:{color:"#e8eaf0",fontSize:"12px",marginBottom:"4px"}},v.insurance_exp?toDateStr(v.insurance_exp):"غير مدخل"));
      ic.appendChild(mkBadge(is.label,is.color));
      if(nextIns)ic.appendChild(el("div",{style:{color:"#D4AF37",fontSize:"10px",marginTop:"4px"}},`تجديد: ${toDateStr(nextIns)}`));
      cols.appendChild(lc);cols.appendChild(ic);top.appendChild(cols);card.appendChild(top);

function showSigPad(onSave){
  const overlay=el("div",{className:"modal-overlay",onClick:e=>e.stopPropagation()});
  const content=el("div",{className:"modal-content",onClick:e=>e.stopPropagation()});
  content.appendChild(el("div",{className:"modal-handle"}));
  const mh=el("div",{className:"modal-header"});
  mh.appendChild(el("h2",{className:"modal-title"},"توقيع السائق"));
  mh.appendChild(el("button",{className:"close-btn",onClick:()=>overlay.remove()},"✕"));
  content.appendChild(mh);
  content.appendChild(el("p",{style:{color:"#7a8296",fontSize:"12px",marginBottom:"8px",textAlign:"center"}},"وقّع بإصبعك في المنطقة أدناه"));
  const canvas=el("canvas",{width:320,height:160,style:{width:"100%",borderRadius:"12px",border:"2px solid rgba(212,175,55,0.27)",display:"block"}});
  content.appendChild(canvas);
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#1a1e2e";ctx.fillRect(0,0,320,160);
  ctx.strokeStyle="#252840";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,120);ctx.lineTo(300,120);ctx.stroke();
  let drawing=false,lp=null;
  const gp=e=>{const rect=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-rect.left)*(canvas.width/rect.width),y:(t.clientY-rect.top)*(canvas.height/rect.height)};};
  canvas.addEventListener("mousedown",e=>{drawing=true;lp=gp(e);});
  canvas.addEventListener("mousemove",e=>{if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#D4AF37";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lp=p;});
  canvas.addEventListener("mouseup",()=>drawing=false);
  canvas.addEventListener("touchstart",e=>{e.preventDefault();drawing=true;lp=gp(e);},{passive:false});
  canvas.addEventListener("touchmove",e=>{e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lp.x,lp.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#D4AF37";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lp=p;},{passive:false});
  canvas.addEventListener("touchend",e=>{e.preventDefault();drawing=false;},{passive:false});
  const br=el("div",{style:{display:"flex",gap:"8px",marginTop:"12px"}});
  br.appendChild(mkBtn("مسح",()=>{ctx.fillStyle="#1a1e2e";ctx.fillRect(0,0,320,160);ctx.strokeStyle="#252840";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,120);ctx.lineTo(300,120);ctx.stroke();},{background:"transparent",border:"1.5px solid #7a8296",color:"#7a8296",borderRadius:"12px",padding:"8px 16px",fontSize:"12px",width:"auto"}));
  br.appendChild(mkBtn("إلغاء",()=>overlay.remove(),{background:"transparent",border:"1.5px solid #ef4444",color:"#ef4444",borderRadius:"12px",padding:"8px 16px",fontSize:"12px",width:"auto"}));
  const sv=mkBtn("✓ حفظ التوقيع",()=>{onSave(canvas.toDataURL());overlay.remove();},{flex:"1"});
  br.appendChild(sv);content.appendChild(br);overlay.appendChild(content);document.body.appendChild(overlay);
}

function pgMaintenance(){
  const wrap=el("div",{style:{minHeight:"100vh",background:"#0a0c14",paddingBottom:"40px"}});
  wrap.appendChild(mkHeader("🔧 الصيانة",()=>nav("main")));
  let selVeh="",search="";
  const content=el("div");wrap.appendChild(content);

  const calcSt=id=>{
    const vr=S.maintenance.filter(r=>r.vehicleId===id).sort((a,b)=>a.oilKm-b.oilKm);
    const fRecs=S.fuel.filter(r=>r.vehicleId===id).sort((a,b)=>b.currKm-a.currKm);
    const latestFuelKm=fRecs.length?fRecs[0].currKm:null;
    if(!vr.length)return{noData:true,latestFuelKm};
    const last=vr[vr.length-1];const nextOil=last.nextOilKm||(last.oilKm+5000);
    const alerts=[];
    if((last.filterOil||0)>=2)alerts.push({label:"فلتر الزيت"});
    if((last.filterDiesel||0)>=3)alerts.push({label:"فلتر الديزل"});
    if((last.filterAir||0)>=3)alerts.push({label:"فلتر الهواء"});
    if((last.brakes||0)>=3)alerts.push({label:"البريكات"});
    const twoMo=new Date();twoMo.setMonth(twoMo.getMonth()-2);const noService=new Date(last.date)<twoMo;
    let oilFromFuel=null;
    if(latestFuelKm){const diff=nextOil-latestFuelKm;if(diff<=0)oilFromFuel={msg:`عداد المحروقات تجاوز موعد الغيار بـ ${Math.abs(diff).toLocaleString()} كلم`,color:"#ef4444"};else if(diff<=500)oilFromFuel={msg:`موعد غيار الزيت خلال ${diff.toLocaleString()} كلم`,color:"#f97316"};}
    return{nextOil,lastKm:last.oilKm,lastDate:last.date,filterOil:last.filterOil||1,filterDiesel:last.filterDiesel||1,filterAir:last.filterAir||1,brakes:last.brakes||1,alerts,noService,latestFuelKm,oilFromFuel};
  };

    sbi.appendChild(el("span",{style:{fontSize:"28px"}},"🔧"));const sd=el("div");sd.appendChild(el("div",{style:{color:"#7a8296",fontSize:"11px"}},"إجراءات هذا الشهر"));sd.appendChild(el("div",{style:{color:"#f97316",fontSize:"22px",fontWeight:"700"}},String(tm)));sbi.appendChild(sd);sb.appendChild(sbi);content.appendChild(sb);
    content.appendChild(mkVehSelector(selVeh,v=>{selVeh=v;redraw();}));
    content.appendChild(mkSearchInput("🔍 بحث",search,v=>{search=v;redraw();}));
    const displayed=S.vehicles.filter(v=>{if(selVeh&&v.id!==selVeh)return false;if(search&&!v.plate.includes(search)&&!v.type?.includes(search))return false;return true;});
    const listDiv=el("div",{style:{padding:"12px 14px"}});
    displayed.forEach(v=>{
      const s=calcSt(v.id);
      const bc=s.noData?"#252840":(s.alerts.length||s.noService)?"#ef4444":s.oilFromFuel?.color||"#22c55e";
      const card=el("div",{style:{background:"#12151f",borderRadius:"16px",marginBottom:"12px",border:`1px solid ${bc}33`,borderRight:`4px solid ${bc}`}});
      const top=el("div",{style:{padding:"14px 16px",cursor:"pointer"},onClick:()=>showMaintHistory(v)});

      if(v.type)tr.appendChild(el("span",{style:{color:"#7a8296",fontSize:"11px"}},v.type));top.appendChild(tr);
      if(s.noData){top.appendChild(el("div",{style:{color:"#7a8296",fontSize:"12px"}},"لا يوجد سجل صيانة — أضف أول غيار"));}
      else{

      }

function exportMonthlyReport(){
  const now=new Date();
  const prevMonth=new Date(now.getFullYear(),now.getMonth()-1,1);
  const prevMonthEnd=new Date(now.getFullYear(),now.getMonth(),0);
  const monthName=prevMonth.toLocaleDateString("ar-JO",{month:"long",year:"numeric"});
  const isInMonth=dateStr=>{if(!dateStr)return false;const d=new Date(dateStr);return d>=prevMonth&&d<=prevMonthEnd;};

  const wb=XLSX.utils.book_new();

  // Sheet 1: Summary
  const summaryRows=[["رقم اللوحة","نوع المركبة","عدد المخالفات","قيمة المخالفات (د.أ)","إنفاق المحروقات (د.أ)","عمليات الصيانة","آخر حركة"]];
  S.vehicles.forEach(v=>{
    const viols=S.violations.filter(x=>x.plate===v.plate&&isInMonth(x.vdate));
    const violAmt=viols.reduce((s,x)=>s+(+x.amount||0),0);
    const fuel=S.fuel.filter(x=>x.vehicleId===v.id&&isInMonth(x.date));
    const fuelAmt=fuel.reduce((s,x)=>s+(x.amount||0),0);
    const maint=S.maintenance.filter(x=>x.vehicleId===v.id&&isInMonth(x.date));
    const lastH=S.handovers.filter(x=>x.vehicleId===v.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    summaryRows.push([v.plate,v.type||"—",viols.length,violAmt.toFixed(2),fuelAmt.toFixed(2),maint.length,lastH?toDateStr(lastH.date):"—"]);
  });
  const wsSummary=XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary["!cols"]=[{wch:14},{wch:16},{wch:14},{wch:18},{wch:18},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,wsSummary,"ملخص عام");

  // Sheet per vehicle
  S.vehicles.forEach(v=>{
    const rows=[];
    // Violations
    rows.push(["=== المخالفات ===","","","","",""]);
    rows.push(["التاريخ","السائق","النوع","المبلغ","الحالة","رقم المخالفة"]);
    const viols=S.violations.filter(x=>x.plate===v.plate&&isInMonth(x.vdate));
    if(viols.length)viols.forEach(x=>rows.push([toDateStr(x.vdate),x.driver,x.vtype,x.amount,x.status,x.vnum||"—"]));
    else rows.push(["لا توجد مخالفات","","","","",""]);
    rows.push([]);
    // Fuel
    rows.push(["=== المحروقات ===","","","","",""]);
    rows.push(["التاريخ","العداد السابق","العداد الحالي","المسافة","المبلغ","تكلفة الكلم"]);
    const fuel=S.fuel.filter(x=>x.vehicleId===v.id&&isInMonth(x.date));
    if(fuel.length)fuel.forEach(x=>rows.push([toDateStr(x.date),x.prevKm,x.currKm,x.dist,x.amount,x.costPerKm]));
    else rows.push(["لا توجد سجلات","","","","",""]);
    rows.push([]);
    // Maintenance
    rows.push(["=== الصيانة ===","","","","",""]);
    rows.push(["التاريخ","العداد","الغيار القادم","فلتر زيت","فلتر ديزل","بريكات"]);
    const maint=S.maintenance.filter(x=>x.vehicleId===v.id&&isInMonth(x.date));
    if(maint.length)maint.forEach(x=>rows.push([toDateStr(x.date),x.oilKm,x.nextOilKm,`${x.filterOil||0}/2`,`${x.filterDiesel||0}/3`,`${x.brakes||0}/3`]));
    else rows.push(["لا توجد سجلات","","","","",""]);
    rows.push([]);
    // Handover
    rows.push(["=== الاستلام والتسليم ===","","","","",""]);
    rows.push(["التاريخ","النوع","السائق","","",""]);
    const handovers=S.handovers.filter(x=>x.vehicleId===v.id&&isInMonth(x.date));
    if(handovers.length)handovers.forEach(x=>rows.push([toDateStr(x.date),x.type,x.driver,"","",""]));
    else rows.push(["لا توجد سجلات","","","","",""]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:14},{wch:14},{wch:16},{wch:12},{wch:12},{wch:14}];
    const sheetName=v.plate.replace(/[/*?:[\]\\]/g,"-").slice(0,31);
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });

  XLSX.writeFile(wb,`تقرير_${monthName}.xlsx`);
}

        const info=el("div");info.appendChild(el("div",{style:{color:"#D4AF37",fontWeight:"700",fontSize:"14px"}},v.plate));info.appendChild(el("div",{style:{color:"#7a8296",fontSize:"11px",marginTop:"2px"}},[v.type,v.make,v.regNum].filter(Boolean).join(" | ")||"—"));
        const btns=el("div",{style:{display:"flex",gap:"6px"}});
        const eb=el("button",{style:{background:"rgba(59,130,246,0.13)",border:"none",color:"#3b82f6",borderRadius:"8px",padding:"5px 12px",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontSize:"12px"}},"تعديل");
        eb.addEventListener("click",()=>showEditVeh(v,refresh));
        const db=el("button",{style:{background:"rgba(239,68,68,0.13)",border:"none",color:"#ef4444",borderRadius:"8px",padding:"5px 12px",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontSize:"12px"}},"حذف");
        db.addEventListener("click",()=>mkConfirm(`هل تريد حذف المركبة ${v.plate}؟`,()=>{save("vehicles",S.vehicles.filter(x=>x.id!==v.id));refresh();}));
        btns.appendChild(eb);btns.appendChild(db);row.appendChild(info);row.appendChild(btns);w.appendChild(row);
      });
      const il=el("label",{style:{display:"block",background:"#1a1e2e",borderRadius:"14px",padding:"22px 16px",textAlign:"center",cursor:"pointer",border:"2px dashed rgba(212,175,55,0.27)",marginTop:"12px"}});
      const ii=el("input",{type:"file",accept:".xlsx,.xls,.csv",style:{display:"none"}});
      ii.addEventListener("change",e=>{if(e.target.files[0])importXLS(e.target.files[0],refresh);});
      il.appendChild(ii);il.appendChild(el("div",{style:{fontSize:"36px",marginBottom:"8px"}},"📂"));il.appendChild(el("div",{style:{color:"#D4AF37",fontSize:"15px",fontWeight:"700"}},"رفع ملف Excel"));il.appendChild(el("div",{style:{color:"#7a8296",fontSize:"12px",marginTop:"6px"}},"xlsx / xls / csv"));w.appendChild(il);
      w.appendChild(el("div",{style:{marginTop:"12px"}},mkBtn("+ إضافة مركبة يدوياً",()=>showAddVeh(()=>{document.querySelectorAll(".modal-overlay").forEach(m=>m.remove());refresh();}))));
    }refresh();
  }));

  content.appendChild(mkSec("notes",`📝 ملاحظات المخالفات (${S.noteOptions.length})`,w=>{
    function refresh(){w.innerHTML="";S.noteOptions.forEach((n,i)=>{const row=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#1a1e2e",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}});row.appendChild(el("span",{style:{color:"#e8eaf0",fontSize:"13px"}},n));const d=el("button",{style:{background:"rgba(239,68,68,0.13)",border:"none",color:"#ef4444",borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontSize:"12px"}},"حذف");d.addEventListener("click",()=>mkConfirm("هل تريد حذف هذه الملاحظة؟",()=>{save("noteOptions",S.noteOptions.filter((_,j)=>j!==i));refresh();}));row.appendChild(d);w.appendChild(row);});const ar=el("div",{style:{display:"flex",gap:"8px",marginTop:"10px"}});const inp=el("input",{type:"text",placeholder:"ملاحظة جديدة",style:{flex:"1"}});const ab=el("button",{style:{background:"#D4AF37",border:"none",color:"#000",borderRadius:"8px",padding:"9px 18px",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontWeight:"700",fontSize:"16px"}},"+");ab.addEventListener("click",()=>{if(inp.value){save("noteOptions",[...S.noteOptions,inp.value]);inp.value="";refresh();}});ar.appendChild(inp);ar.appendChild(ab);w.appendChild(ar);}refresh();
  }));

  content.appendChild(mkSec("equip",`🔩 عدة المركبة (${S.equipList.length})`,w=>{
    function refresh(){w.innerHTML="";S.equipList.forEach((e,i)=>{const row=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#1a1e2e",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}});row.appendChild(el("span",{style:{color:"#e8eaf0",fontSize:"13px"}},e));const d=el("button",{style:{background:"rgba(239,68,68,0.13)",border:"none",color:"#ef4444",borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontSize:"12px"}},"حذف");d.addEventListener("click",()=>mkConfirm("هل تريد حذف هذا العنصر؟",()=>{save("equipList",S.equipList.filter((_,j)=>j!==i));refresh();}));row.appendChild(d);w.appendChild(row);});const ar=el("div",{style:{display:"flex",gap:"8px",marginTop:"10px"}});const inp=el("input",{type:"text",placeholder:"عنصر جديد",style:{flex:"1"}});const ab=el("button",{style:{background:"#D4AF37",border:"none",color:"#000",borderRadius:"8px",padding:"9px 18px",cursor:"pointer",fontFamily:"Cairo,sans-serif",fontWeight:"700",fontSize:"16px"}},"+");ab.addEventListener("click",()=>{if(inp.value){save("equipList",[...S.equipList,inp.value]);inp.value="";refresh();}});ar.appendChild(inp);ar.appendChild(ab);w.appendChild(ar);}refresh();
  }));

  // Monthly report button
  const repBtn=mkBtn("📊 تصدير التقرير الشهري",()=>exportMonthlyReport(),{background:"#22c55e",marginBottom:"12px"});
  content.appendChild(repBtn);

  const logout=el("button",{style:{width:"100%",background:"rgba(239,68,68,0.13)",border:"1px solid rgba(239,68,68,0.27)",borderRadius:"14px",padding:"14px",color:"#ef4444",fontFamily:"Cairo,sans-serif",fontSize:"15px",fontWeight:"700",cursor:"pointer",marginTop:"8px"}},"🚪 تسجيل الخروج");
  logout.addEventListener("click",()=>{localStorage.removeItem("gm_loggedin");nav("login");});
  content.appendChild(logout);wrap.appendChild(content);return wrap;
}

function showEditVeh(v,onDone){
  let form={plate:v.plate,type:v.type||"",make:v.make||"",regNum:v.regNum||"",license_exp:v.license_exp||"",insurance_exp:v.insurance_exp||""};
  mkModal(`تعديل — ${v.plate}`,close=>{
    const wrap=el("div");
    const{wrap:pw,inp:pi}=mkField("رقم اللوحة",form.plate,val=>form.plate=val);wrap.appendChild(pw);
    const{wrap:tw}=mkField("نوع المركبة",form.type,val=>form.type=val);wrap.appendChild(tw);
    const{wrap:mw}=mkField("الصنع/الماركة",form.make,val=>form.make=val);wrap.appendChild(mw);
    const{wrap:rw}=mkField("رقم التسجيل",form.regNum,val=>form.regNum=val);wrap.appendChild(rw);
    const{wrap:lw,inp:li}=mkField("تاريخ انتهاء الترخيص",form.license_exp,null,"date");
    const nlb=el("div",{className:"next-date-box",style:{display:form.license_exp?"flex":"none"}});
    nlb.appendChild(el("span",{style:{color:"#7a8296",fontSize:"12px"}},"التجديد القادم:"));const nlv=el("span",{style:{color:"#D4AF37",fontWeight:"700",fontSize:"13px"}},form.license_exp?toDateStr(addOneYear(form.license_exp)):"—");nlb.appendChild(nlv);
    li.addEventListener("change",e=>{form.license_exp=e.target.value;if(e.target.value){nlb.style.display="flex";nlv.textContent=toDateStr(addOneYear(e.target.value));}else nlb.style.display="none";});
    wrap.appendChild(lw);wrap.appendChild(nlb);
    const{wrap:iw,inp:ii}=mkField("تاريخ انتهاء التأمين",form.insurance_exp,null,"date");
    const nib=el("div",{className:"next-date-box",style:{display:form.insurance_exp?"flex":"none"}});
    nib.appendChild(el("span",{style:{color:"#7a8296",fontSize:"12px"}},"التجديد القادم:"));const niv=el("span",{style:{color:"#D4AF37",fontWeight:"700",fontSize:"13px"}},form.insurance_exp?toDateStr(addOneYear(form.insurance_exp)):"—");nib.appendChild(niv);
    ii.addEventListener("change",e=>{form.insurance_exp=e.target.value;if(e.target.value){nib.style.display="flex";niv.textContent=toDateStr(addOneYear(e.target.value));}else nib.style.display="none";});
    wrap.appendChild(iw);wrap.appendChild(nib);
    wrap.appendChild(mkBtn("✓ حفظ التعديل",()=>{save("vehicles",S.vehicles.map(x=>x.id===v.id?{...x,...form}:x));close();onDone();}));
    return wrap;
  });
}

function importXLS(file,onDone){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(!data.length)return;
      const hdrs=data[0].map(h=>String(h).trim());
      const lower=hdrs.map(h=>String(h).toLowerCase().trim());
      const match=kws=>{const i=lower.findIndex(h=>kws.some(k=>h.includes(k)));return i>=0?hdrs[i]:null;};
      const pc=match(["لوحة","plate","رقم المركب","رقم السيار","vehicle"]);
      if(!pc){alert("لم يتم التعرف على عمود اللوحة");return;}
      const pI=hdrs.indexOf(pc);
      const rows=data.slice(1).filter(r=>r.some(c=>c!=="")).map(r=>({id:uid(),plate:String(r[pI]||"").trim(),type:"",make:"",regNum:"",license_exp:"",insurance_exp:"",renewHistory:[]})).filter(r=>r.plate);
      const existing=S.vehicles.filter(v=>!rows.some(p=>p.plate===v.plate));
      save("vehicles",[...existing,...rows]);alert(`✅ تم استيراد ${rows.length} مركبة`);onDone();
    }catch{alert("خطأ في قراءة الملف");}
  };reader.readAsArrayBuffer(file);
}

// INIT

async function initApp(){
  // Try load from Supabase first
  try{
    const{data,error}=await SUPA.from("fleet_data").select("*").eq("id","main").single();
    if(data&&!error){
      if(data.saved_pw)S.savedPw=data.saved_pw;
      if(data.violations)S.violations=data.violations;
      if(data.vehicles)S.vehicles=data.vehicles;
      if(data.handovers)S.handovers=data.handovers;
      if(data.maintenance)S.maintenance=data.maintenance;
      if(data.fuel)S.fuel=data.fuel;
      if(data.note_options&&data.note_options.length)S.noteOptions=data.note_options;
      if(data.equip_list&&data.equip_list.length)S.equipList=data.equip_list;
      if(data.my_phone)S.myPhone=data.my_phone;
    }else{
      // Fallback to localStorage
      loadState();
    }
  }catch(e){
    // Fallback to localStorage
    loadState();
  }
  if(localStorage.getItem("gm_loggedin")==="1")S.screen="main";
  document.getElementById("ls").remove();
  render();
}
initApp();
