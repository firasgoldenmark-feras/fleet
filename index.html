

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>الأثر الذهبي — إدارة الأسطول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a0c14;font-family:'Cairo',sans-serif;direction:rtl;}
  input,select,button,textarea{font-family:'Cairo',sans-serif;}
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#12151f;} ::-webkit-scrollbar-thumb{background:#252840;border-radius:2px;}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  bg:"#0a0c14", card:"#12151f", card2:"#1a1e2e", card3:"#222638",
  gold:"#D4AF37", red:"#ef4444", orange:"#f97316", yellow:"#eab308",
  green:"#22c55e", blue:"#3b82f6", text:"#e8eaf0", sub:"#7a8296", border:"#252840"
};
const GF = { fontFamily:"'Cairo', sans-serif" };

const db = {
  get(k){ try{ const v=localStorage.getItem("gm_"+k); return v?JSON.parse(v):null; }catch{ return null; } },
  set(k,v){ try{ localStorage.setItem("gm_"+k,JSON.stringify(v)); }catch{} }
};

const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const toDateStr = d => d ? new Date(d).toLocaleDateString("ar-JO") : "—";
const daysDiff = (from, to=new Date()) => Math.floor((new Date(to)-new Date(from))/86400000);
const fmt12 = date => { const d=new Date(date); let h=d.getHours(),m=d.getMinutes(); const ap=h>=12?"PM":"AM"; h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`; };
const todayISO = () => new Date().toISOString().split("T")[0];
const sendWA = (phone, msg) => { if(!phone) return; window.open(`https://wa.me/${phone.replace(/D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank"); };

const DEFAULT_NOTES = ["السائق أبلغ متأخراً","مشكوك في صحتها","جارٍ مراجعة الجهة","السائق رفض الإقرار","تم إيقاف السائق مؤقتاً","أخرى"];
const DEFAULT_EQUIP = ["مفتاح جنط","جك","عاكسة","سبير أمامي","سبير خلفي","ترخيص دعاية وإعلان","طفاية حريق","بطاقة تعبئة الوقود","رخصة المركبة"];
const VTYPES = ["سرعة زائدة","وقوف مخالف","تجاوز إشارة","عدم الالتزام بالحارة","استخدام الجوال","عدم ربط الحزام","أخرى"];

function Badge({ label, color }) {
  return <span style={{ background:color+"22", color, border:`1px solid ${color}44`, borderRadius:20, padding:"2px 10px", fontSize:11, ...GF, whiteSpace:"nowrap" }}>{label}</span>;
}

function StatBox({ icon, label, value, color=T.gold }) {
  return (
    <div style={{ background:T.card2, borderRadius:14, padding:"14px 16px", flex:1, minWidth:0, borderTop:`3px solid ${color}` }}>
      <div style={{ fontSize:22 }}>{icon}</div>
      <div style={{ color, fontSize:20, fontWeight:700, ...GF, marginTop:4, lineHeight:1 }}>{value}</div>
      <div style={{ color:T.sub, fontSize:11, ...GF, marginTop:4, lineHeight:1.3 }}>{label}</div>
    </div>
  );
}

function Modal({ show, onClose, title, children }) {
  if (!show) return null;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"flex-end" }} onClick={onClose}>
      <div style={{ background:T.card, borderRadius:"24px 24px 0 0", width:"100%", maxHeight:"92vh", overflowY:"auto", padding:"24px 20px 48px" }} onClick={e=>e.stopPropagation()}>
        <div style={{ width:40, height:4, background:T.border, borderRadius:2, margin:"0 auto 20px" }}/>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <h2 style={{ color:T.gold, ...GF, fontSize:17, fontWeight:700, margin:0 }}>{title}</h2>
          <button onClick={onClose} style={{ background:T.card3, border:"none", color:T.sub, borderRadius:8, padding:"6px 14px", cursor:"pointer", ...GF }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type="text", placeholder="", req }) {
  return (
    <div style={{ marginBottom:14 }}>
      {label && <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>{label}{req?" *":""}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:T.text, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}/>
    </div>
  );
}

function FieldSelect({ label, value, onChange, opts, req }) {
  return (
    <div style={{ marginBottom:14 }}>
      {label && <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>{label}{req?" *":""}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:value?T.text:T.sub, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}>
        <option value="">— اختر —</option>
        {opts.map(o => <option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
      </select>
    </div>
  );
}

function Btn({ label, onClick, color=T.gold, full, sm, disabled, outline }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ background:outline?"transparent":disabled?T.border:color, color:outline?color:disabled?T.sub:"#000",
        border:outline?`1.5px solid ${color}`:"none", borderRadius:12, padding:sm?"8px 16px":"13px 20px",
        fontSize:sm?12:15, ...GF, fontWeight:700, cursor:disabled?"not-allowed":"pointer",
        width:full?"100%":"auto", opacity:disabled?0.5:1 }}>
      {label}
    </button>
  );
}

function Header({ title, onBack, right }) {
  return (
    <div style={{ background:T.card, padding:"16px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:`1px solid ${T.border}`, position:"sticky", top:0, zIndex:50 }}>
      {onBack ? <button onClick={onBack} style={{ background:T.card2, border:"none", color:T.gold, fontSize:16, cursor:"pointer", borderRadius:10, padding:"8px 14px", ...GF }}>← رجوع</button> : <div style={{width:80}}/>}
      <span style={{ color:T.gold, ...GF, fontSize:17, fontWeight:700 }}>{title}</span>
      <div style={{ width:80, textAlign:"left" }}>{right}</div>
    </div>
  );
}

function VehicleSelector({ vehicles, selected, onChange, label="المركبة" }) {
  return (
    <div style={{ padding:"10px 14px", borderBottom:`1px solid ${T.border}`, background:T.card }}>
      <select value={selected||""} onChange={e=>onChange(e.target.value)}
        style={{ width:"100%", background:T.card2, border:`1px solid ${T.gold}44`, borderRadius:10, padding:"10px 14px", color:selected?T.gold:T.sub, fontSize:14, ...GF, outline:"none", fontWeight:600 }}>
        <option value="">— اختر {label} —</option>
        {vehicles.map(v => <option key={v.id} value={v.id}>{v.plate}{v.type?` — ${v.type}`:""}</option>)}
      </select>
    </div>
  );
}

function SignaturePad({ onSave, onCancel }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x:(touch.clientX-rect.left)*(canvas.width/rect.width), y:(touch.clientY-rect.top)*(canvas.height/rect.height) };
  };

  const initCanvas = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#1a1e2e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#252840";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(20, canvas.height-40);
    ctx.lineTo(canvas.width-20, canvas.height-40);
    ctx.stroke();
  };

  useEffect(() => { initCanvas(); }, []);

  const start = e => { e.preventDefault(); drawing.current=true; lastPos.current=getPos(e, canvasRef.current); };
  const move = e => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current, ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y); ctx.strokeStyle="#D4AF37"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.stroke();
    lastPos.current = pos;
  };
  const end = e => { e.preventDefault(); drawing.current = false; };
  const clear = () => initCanvas();

  return (
    <div>
      <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:8, textAlign:"center" }}>وقّع بإصبعك في المنطقة أدناه</p>
      <canvas ref={canvasRef} width={320} height={160}
        style={{ width:"100%", borderRadius:12, border:`2px solid ${T.gold}44`, display:"block" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <Btn label="مسح" onClick={clear} outline color={T.sub} sm/>
        <Btn label="إلغاء" onClick={onCancel} outline color={T.red} sm/>
        <div style={{flex:1}}><Btn label="✓ حفظ التوقيع" onClick={()=>onSave(canvasRef.current.toDataURL())} full color={T.gold} sm/></div>
      </div>
    </div>
  );
}

function VehicleImporter({ vehicles, saveVehicles }) {
  const [step, setStep] = useState("idle");
  const [rawRows, setRawRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({});
  const [preview, setPreview] = useState([]);
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [editVeh, setEditVeh] = useState(null);
  const [showList, setShowList] = useState(false);
  const [editForm, setEditForm] = useState({});

  const FIELDS = [
    { key:"plate", label:"رقم اللوحة", required:true },
    { key:"regNum", label:"رقم التسجيل" },
    { key:"type", label:"نوع المركبة" },
    { key:"make", label:"الصنع/الماركة" },
  ];

  const readFile = async file => {
    setLoading(true); setMsg("جارٍ قراءة الملف...");
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
      if (!data.length) { setMsg("❌ الملف فارغ"); setLoading(false); return; }
      const hdrs = data[0].map(h => String(h).trim());
      const rows = data.slice(1).filter(r => r.some(c => c !== ""));
      setHeaders(hdrs); setRawRows(rows);
      const map = {};
      const lower = hdrs.map(h => String(h).toLowerCase().trim());
      const match = kws => { const i = lower.findIndex(h => kws.some(k => h.includes(k))); return i>=0 ? hdrs[i] : null; };
      map.plate = match(["لوحة","plate","رقم المركب","رقم السيار","vehicle"]);
      map.regNum = match(["تسجيل","registration","reg","chassis","هيكل"]);
      map.type = match(["نوع","type","موديل","model","فئة"]);
      map.make = match(["صنع","ماركة","make","brand","manufacturer","شركة"]);
      setMapping(map);
      setStep("mapping");
      setMsg(map.plate ? "✅ تم التعرف على الأعمدة" : "⚠️ حدد عمود اللوحة يدوياً");
    } catch { setMsg("❌ تعذّر قراءة الملف"); }
    setLoading(false);
  };

  const buildPreview = () => {
    if (!mapping.plate) { setMsg("❌ يجب تحديد عمود رقم اللوحة"); return; }
    const pI=headers.indexOf(mapping.plate), rI=mapping.regNum?headers.indexOf(mapping.regNum):-1;
    const tI=mapping.type?headers.indexOf(mapping.type):-1, mI=mapping.make?headers.indexOf(mapping.make):-1;
    const rows = rawRows.map(r => ({
      id:uid(), plate:String(r[pI]||"").trim(), regNum:rI>=0?String(r[rI]||"").trim():"",
      type:tI>=0?String(r[tI]||"").trim():"", make:mI>=0?String(r[mI]||"").trim():"",
      license_exp:"", insurance_exp:"", renewHistory:[]
    })).filter(r => r.plate);
    setPreview(rows); setStep("preview"); setMsg("");
  };

  const confirmImport = () => {
    const existing = vehicles.filter(v => !preview.some(p => p.plate===v.plate));
    saveVehicles([...existing, ...preview]);
    setStep("done"); setMsg(`✅ تم استيراد ${preview.length} مركبة`);
    setTimeout(() => { setStep("idle"); setMsg(""); }, 3000);
  };

  return (
    <div>
      <div style={{ background:T.card2, borderRadius:12, marginBottom:14, overflow:"hidden" }}>
        <button onClick={()=>setShowList(!showList)} style={{ width:"100%", background:"none", border:"none", padding:"14px 16px", display:"flex", justifyContent:"space-between", cursor:"pointer" }}>
          <span style={{ color:T.text, ...GF, fontSize:14 }}>🚗 المركبات المحفوظة ({vehicles.length})</span>
          <span style={{ color:T.sub }}>{showList?"▲":"▼"}</span>
        </button>
        {showList && (
          <div style={{ borderTop:`1px solid ${T.border}`, padding:"10px 14px" }}>
            {!vehicles.length
              ? <div style={{ color:T.sub, ...GF, fontSize:13, textAlign:"center", padding:16 }}>لا توجد مركبات بعد</div>
              : vehicles.map(v => (
                <div key={v.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card, borderRadius:10, padding:"10px 12px", marginBottom:8 }}>
                  <div>
                    <div style={{ color:T.gold, ...GF, fontWeight:700, fontSize:14 }}>{v.plate}</div>
                    <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>{[v.type,v.make,v.regNum].filter(Boolean).join(" | ")||"—"}</div>
                  </div>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={()=>{ setEditVeh(v.id); setEditForm({plate:v.plate,regNum:v.regNum||"",type:v.type||"",make:v.make||"",license_exp:v.license_exp||"",insurance_exp:v.insurance_exp||""}); }}
                      style={{ background:T.blue+"22", border:"none", color:T.blue, borderRadius:8, padding:"5px 12px", cursor:"pointer", ...GF, fontSize:12 }}>تعديل</button>
                    <button onClick={()=>saveVehicles(vehicles.filter(x=>x.id!==v.id))}
                      style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:8, padding:"5px 12px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      {step==="idle" && (
        <div>
          <label style={{ display:"block", background:T.card2, borderRadius:14, padding:"22px 16px", textAlign:"center", cursor:"pointer", border:`2px dashed ${T.gold}44` }}>
            <input type="file" accept=".xlsx,.xls,.csv" onChange={e=>{ if(e.target.files[0]) readFile(e.target.files[0]); }} style={{ display:"none" }}/>
            <div style={{ fontSize:36, marginBottom:8 }}>📂</div>
            <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700 }}>رفع ملف Excel</div>
            <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>xlsx / xls / csv — يتعرف تلقائياً على الأعمدة</div>
          </label>
          {msg && <div style={{ marginTop:10, color:T.red, ...GF, fontSize:13, textAlign:"center" }}>{msg}</div>}
        </div>
      )}

      {loading && <div style={{ textAlign:"center", padding:24 }}><div style={{ fontSize:32 }}>🔍</div><div style={{ color:T.gold, ...GF, fontSize:14, marginTop:8 }}>{msg}</div></div>}

      {step==="mapping" && !loading && (
        <div>
          <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700, marginBottom:14 }}>🗂️ تأكيد خريطة الأعمدة</div>
          {msg && <div style={{ color:msg.includes("✅")?T.green:T.yellow, ...GF, fontSize:12, marginBottom:12 }}>{msg}</div>}
          {FIELDS.map(f => (
            <div key={f.key} style={{ marginBottom:12 }}>
              <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>{f.label}{f.required?" *":""}</label>
              <select value={mapping[f.key]||""} onChange={e=>setMapping({...mapping,[f.key]:e.target.value||null})}
                style={{ width:"100%", background:T.card2, border:`1px solid ${mapping[f.key]?T.gold:T.border}`, borderRadius:10, padding:"10px 14px", color:mapping[f.key]?T.gold:T.sub, fontSize:13, ...GF, outline:"none" }}>
                <option value="">— لا يوجد —</option>
                {headers.map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:16 }}>
            <Btn label="← رجوع" onClick={()=>setStep("idle")} outline color={T.sub} sm/>
            <div style={{flex:1}}><Btn label="معاينة البيانات →" onClick={buildPreview} full color={T.gold}/></div>
          </div>
        </div>
      )}

      {step==="preview" && (
        <div>
          <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700, marginBottom:4 }}>👁️ معاينة</div>
          <div style={{ color:T.sub, ...GF, fontSize:12, marginBottom:14 }}>{preview.length} مركبة جاهزة</div>
          <div style={{ maxHeight:240, overflowY:"auto", marginBottom:14 }}>
            {preview.slice(0,20).map((v,i) => (
              <div key={i} style={{ background:T.card2, borderRadius:10, padding:"10px 12px", marginBottom:8, display:"flex", justifyContent:"space-between" }}>
                <div>
                  <div style={{ color:T.gold, ...GF, fontWeight:700, fontSize:14 }}>{v.plate}</div>
                  <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>{[v.type,v.make,v.regNum].filter(Boolean).join(" | ")||"—"}</div>
                </div>
                <span style={{ color:T.green, fontSize:18 }}>✓</span>
              </div>
            ))}
            {preview.length>20 && <div style={{ color:T.sub, ...GF, fontSize:12, textAlign:"center", padding:8 }}>...و{preview.length-20} أخرى</div>}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <Btn label="← تعديل" onClick={()=>setStep("mapping")} outline color={T.sub} sm/>
            <div style={{flex:1}}><Btn label={`✓ استيراد ${preview.length} مركبة`} onClick={confirmImport} full color={T.green}/></div>
          </div>
        </div>
      )}

      {step==="done" && <div style={{ color:T.green, ...GF, fontSize:15, textAlign:"center", padding:20 }}>{msg}</div>}

      {editVeh && (
        <Modal show={true} onClose={()=>setEditVeh(null)} title="تعديل بيانات المركبة">
          <Field label="رقم اللوحة" value={editForm.plate} onChange={v=>setEditForm({...editForm,plate:v})} req/>
          <Field label="رقم التسجيل" value={editForm.regNum} onChange={v=>setEditForm({...editForm,regNum:v})}/>
          <Field label="نوع المركبة" value={editForm.type} onChange={v=>setEditForm({...editForm,type:v})}/>
          <Field label="الصنع/الماركة" value={editForm.make} onChange={v=>setEditForm({...editForm,make:v})}/>
          <Field label="تاريخ انتهاء الترخيص" value={editForm.license_exp} onChange={v=>setEditForm({...editForm,license_exp:v})} type="date"/>
          <Field label="تاريخ انتهاء التأمين" value={editForm.insurance_exp} onChange={v=>setEditForm({...editForm,insurance_exp:v})} type="date"/>
          <Btn label="✓ حفظ التعديل" onClick={()=>{ saveVehicles(vehicles.map(v=>v.id===editVeh?{...v,...editForm}:v)); setEditVeh(null); }} full color={T.gold}/>
        </Modal>
      )}
    </div>
  );
}

function buildNotifications(violations, vehicles, maintenanceRecs, fuelRecords) {
  const notes = [];
  violations.filter(v => v.status !== "مسددة").forEach(v => {
    const r = 30 - daysDiff(v.vdate);
    if (r<=0) notes.push({ id:"viol-"+v.id, icon:"⛔", title:"مخالفة — انتهت المهلة", body:`${v.plate} — ${v.vtype}`, color:T.red, tab:"violations", priority:true });
    else if (r<=5) notes.push({ id:"viol-"+v.id, icon:"🔴", title:`مخالفة — ${r} أيام متبقية`, body:`${v.plate} — ${v.vtype}`, color:T.red, tab:"violations", priority:true });
    else if (r<=10) notes.push({ id:"viol-"+v.id, icon:"🟠", title:`مخالفة — ${r} يوم متبقي`, body:`${v.plate}`, color:T.orange, tab:"violations" });
  });
  vehicles.forEach(v => {
    const chk = (exp, label) => {
      if (!exp) return;
      const diff = daysDiff(new Date(), exp);
      if (diff>=0) notes.push({ id:"lic-"+v.id+label, icon:"🔴", title:`${label} منتهي`, body:v.plate, color:T.red, tab:"license", priority:true });
      else { const r=Math.abs(diff);
        if (r<=3) notes.push({ id:"lic-"+v.id+label, icon:"🔴", title:`${label} — ${r} أيام`, body:v.plate, color:T.red, tab:"license", priority:true });
        else if (r<=7) notes.push({ id:"lic-"+v.id+label, icon:"🟠", title:`${label} — ${r} أيام`, body:v.plate, color:T.orange, tab:"license" });
        else if (r<=14) notes.push({ id:"lic-"+v.id+label, icon:"🟡", title:`${label} — ${r} يوم`, body:v.plate, color:T.yellow, tab:"license" });
      }
    };
