<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#D4AF37"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="أسطول الأثر الذهبي"/>
<title>أسطول مركبات شركة الأثر الذهبي</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;background:#0a0c14;font-family:'Cairo',sans-serif;overscroll-behavior:none;}
  #root{min-height:100vh;}
  input,select,button{font-family:'Cairo',sans-serif;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#12151f;}
  ::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═══════════════════════════════════════
// THEME
// ═══════════════════════════════════════
const T = {
  bg:"#0a0c14", card:"#12151f", card2:"#1a1e2e", card3:"#222638",
  gold:"#D4AF37", red:"#ef4444", orange:"#f97316", yellow:"#eab308",
  green:"#22c55e", blue:"#3b82f6", text:"#e8eaf0", sub:"#7a8296",
  border:"#252840",
};

// ═══════════════════════════════════════
// STORAGE — localStorage
// ═══════════════════════════════════════
const db = {
  get(key) { try { const v=localStorage.getItem("gm_"+key); return v?JSON.parse(v):null; } catch { return null; } },
  set(key,val) { try { localStorage.setItem("gm_"+key, JSON.stringify(val)); } catch {} }
};

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const toDateStr = d => d ? new Date(d).toLocaleDateString("ar-JO") : "—";
const daysDiff = (from, to=new Date()) => Math.floor((new Date(to)-new Date(from))/86400000);
const formatTime12 = date => {
  const d=new Date(date); let h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?"PM":"AM"; h=h%12||12;
  return `${h}:${String(m).padStart(2,"0")} ${ap}`;
};
const todayISO = () => new Date().toISOString().split("T")[0];

const DEFAULT_NOTES=["السائق أبلغ متأخراً","مشكوك في صحتها","جارٍ مراجعة الجهة","السائق رفض الإقرار","تم إيقاف السائق مؤقتاً","أخرى"];
const DEFAULT_EQUIP=["مفتاح جنط","جك","عاكسة","سبير أمامي","سبير خلفي","ترخيص دعاية وإعلان","طفاية حريق","بطاقة تعبئة الوقود","رخصة المركبة"];
const VTYPES=["سرعة زائدة","وقوف مخالف","تجاوز إشارة","عدم الالتزام بالحارة","استخدام الجوال","عدم ربط الحزام","أخرى"];

const GF = { fontFamily:"'Cairo', sans-serif" };

// ═══════════════════════════════════════
// SHARED UI
// ═══════════════════════════════════════
function Badge({ label, color }) {
  return <span style={{ background:color+"22", color, border:`1px solid ${color}44`, borderRadius:20, padding:"2px 10px", fontSize:11, ...GF, whiteSpace:"nowrap" }}>{label}</span>;
}

function StatBox({ icon, label, value, color=T.gold }) {
  return (
    <div style={{ background:T.card2, borderRadius:14, padding:"14px 16px", flex:1, minWidth:0, borderTop:`3px solid ${color}` }}>
      <div style={{ fontSize:22 }}>{icon}</div>
      <div style={{ color, fontSize:20, fontWeight:700, ...GF, marginTop:4, lineHeight:1 }}>{value}</div>
      <div style={{ color:T.sub, fontSize:11, ...GF, marginTop:4, lineHeight:1.3 }}>{label}</div>
    </div>
  );
}

function Modal({ show, onClose, title, children }) {
  if (!show) return null;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"flex-end" }} onClick={onClose}>
      <div style={{ background:T.card, borderRadius:"24px 24px 0 0", width:"100%", maxHeight:"92vh", overflowY:"auto", padding:"24px 20px 48px" }} onClick={e=>e.stopPropagation()}>
        <div style={{ width:40, height:4, background:T.border, borderRadius:2, margin:"0 auto 20px" }}/>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <h2 style={{ color:T.gold, ...GF, fontSize:17, fontWeight:700, margin:0 }}>{title}</h2>
          <button onClick={onClose} style={{ background:T.card3, border:"none", color:T.sub, borderRadius:8, padding:"6px 14px", cursor:"pointer", ...GF, fontSize:14 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type="text", placeholder="", req }) {
  return (
    <div style={{ marginBottom:14 }}>
      {label && <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>{label}{req?" *":""}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:T.text, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}/>
    </div>
  );
}

function FieldSelect({ label, value, onChange, opts, req }) {
  return (
    <div style={{ marginBottom:14 }}>
      {label && <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>{label}{req?" *":""}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:value?T.text:T.sub, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}>
        <option value="">— اختر —</option>
        {opts.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
      </select>
    </div>
  );
}

function Btn({ label, onClick, color=T.gold, full, sm, disabled, outline }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ background:outline?"transparent":disabled?T.border:color, color:outline?color:disabled?T.sub:"#000",
        border:outline?`1.5px solid ${color}`:"none", borderRadius:12, padding:sm?"8px 16px":"13px 20px",
        fontSize:sm?12:15, ...GF, fontWeight:700, cursor:disabled?"not-allowed":"pointer",
        width:full?"100%":"auto", opacity:disabled?0.5:1 }}>
      {label}
    </button>
  );
}

function Header({ title, onBack, right }) {
  return (
    <div style={{ background:T.card, padding:"16px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:`1px solid ${T.border}`, position:"sticky", top:0, zIndex:50 }}>
      {onBack
        ? <button onClick={onBack} style={{ background:T.card2, border:"none", color:T.gold, fontSize:16, cursor:"pointer", borderRadius:10, padding:"8px 14px", ...GF }}>← رجوع</button>
        : <div style={{width:80}}/>}
      <span style={{ color:T.gold, ...GF, fontSize:17, fontWeight:700 }}>{title}</span>
      <div style={{ width:80, textAlign:"left" }}>{right}</div>
    </div>
  );
}

// ═══════════════════════════════════════
// AUTOCOMPLETE PLATE FIELD
// ═══════════════════════════════════════
function PlateField({ label, value, onChange, vehicles, req }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const suggestions = value.length >= 2 ? vehicles.filter(v=>v.plate.includes(value)||v.regNum?.includes(value)).slice(0,5) : [];

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  return (
    <div style={{ marginBottom:14, position:"relative" }} ref={ref}>
      {label && <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>{label}{req?" *":""}</label>}
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}} placeholder="أدخل أول حرفين..."
        style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:T.text, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}/>
      {open && suggestions.length > 0 && (
        <div style={{ position:"absolute", top:"100%", right:0, left:0, background:T.card3, borderRadius:12, border:`1px solid ${T.gold}44`, zIndex:200, overflow:"hidden", boxShadow:"0 8px 32px rgba(0,0,0,0.6)" }}>
          {suggestions.map((v,i)=>(
            <button key={i} onClick={()=>{onChange(v.plate);setOpen(false);}}
              style={{ width:"100%", background:"none", border:"none", borderBottom:`1px solid ${T.border}`, padding:"12px 16px", textAlign:"right", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ color:T.gold, ...GF, fontSize:14, fontWeight:700 }}>{v.plate}</div>
                <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>{[v.type,v.make,v.regNum].filter(Boolean).join(" | ")}</div>
              </div>
              <span style={{ color:T.border, fontSize:18 }}>←</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
// VEHICLE IMPORTER
// ═══════════════════════════════════════
function VehicleImporter({ vehicles, saveVehicles }) {
  const [step,setStep]=useState("idle");
  const [rawRows,setRawRows]=useState([]);
  const [headers,setHeaders]=useState([]);
  const [mapping,setMapping]=useState({});
  const [preview,setPreview]=useState([]);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");
  const [editVeh,setEditVeh]=useState(null);
  const [showList,setShowList]=useState(false);
  const [editForm,setEditForm]=useState({});

  const FIELDS=[
    {key:"plate",label:"رقم اللوحة",required:true},
    {key:"regNum",label:"رقم التسجيل",required:false},
    {key:"type",label:"نوع المركبة",required:false},
    {key:"make",label:"الصنع/الماركة",required:false},
  ];

  const readExcel = async file => {
    setLoading(true); setMsg("جارٍ قراءة الملف...");
    try {
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf,{type:"array"});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const data= XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(!data.length){setMsg("❌ الملف فارغ");setLoading(false);return;}
      const hdrs=data[0].map(h=>String(h).trim());
      const rows=data.slice(1).filter(r=>r.some(c=>c!==""));
      setHeaders(hdrs); setRawRows(rows);
      detectMapping(hdrs);
    } catch { setMsg("❌ تعذّر قراءة الملف"); setLoading(false); }
  };

  const detectMapping = (hdrs) => {
    setMsg("🔍 يتعرف على الأعمدة...");
    const map = {};
    const lower = hdrs.map(h => String(h).toLowerCase().trim());

    const match = (keywords) => {
      const idx = lower.findIndex(h => keywords.some(k => h.includes(k)));
      return idx >= 0 ? hdrs[idx] : null;
    };

    map.plate  = match(["لوحة","plate","رقم المركب","رقم السيار","vehicle"]);
    map.regNum = match(["تسجيل","registration","reg","chassis","هيكل"]);
    map.type   = match(["نوع","type","موديل","model","فئة"]);
    map.make   = match(["صنع","ماركة","make","brand","manufacturer","شركة"]);

    setMapping(map);
    setStep("mapping");
    setMsg(map.plate ? "✅ تم التعرف على الأعمدة — تأكد وعدّل إن احتجت" : "⚠️ لم يُعثر على عمود اللوحة تلقائياً — حدده يدوياً");
    setLoading(false);
  };

  const buildPreview = () => {
    if(!mapping.plate){setMsg("❌ يجب تحديد عمود رقم اللوحة");return;}
    const pI=headers.indexOf(mapping.plate), rI=mapping.regNum?headers.indexOf(mapping.regNum):-1;
    const tI=mapping.type?headers.indexOf(mapping.type):-1, mI=mapping.make?headers.indexOf(mapping.make):-1;
    const rows=rawRows.map(r=>({id:uid(),plate:String(r[pI]||"").trim(),regNum:rI>=0?String(r[rI]||"").trim():"",
      type:tI>=0?String(r[tI]||"").trim():"",make:mI>=0?String(r[mI]||"").trim():"",
      license_exp:"",insurance_exp:"",renewHistory:[]})).filter(r=>r.plate);
    setPreview(rows); setStep("preview"); setMsg("");
  };

  const confirmImport = () => {
    const existing=vehicles.filter(v=>!preview.some(p=>p.plate===v.plate));
    saveVehicles([...existing,...preview]);
    setStep("done"); setMsg(`✅ تم استيراد ${preview.length} مركبة`);
    setTimeout(()=>{setStep("idle");setMsg("");},3000);
  };

  return (
    <div>
      <div style={{ background:T.card2, borderRadius:12, marginBottom:14, overflow:"hidden" }}>
        <button onClick={()=>setShowList(!showList)} style={{ width:"100%", background:"none", border:"none", padding:"14px 16px", display:"flex", justifyContent:"space-between", cursor:"pointer" }}>
          <span style={{ color:T.text, ...GF, fontSize:14 }}>🚗 المركبات المحفوظة ({vehicles.length})</span>
          <span style={{ color:T.sub }}>{showList?"▲":"▼"}</span>
        </button>
        {showList && (
          <div style={{ borderTop:`1px solid ${T.border}`, padding:"10px 14px" }}>
            {!vehicles.length
              ? <div style={{ color:T.sub, ...GF, fontSize:13, textAlign:"center", padding:16 }}>لا توجد مركبات بعد</div>
              : vehicles.map(v=>(
                <div key={v.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card, borderRadius:10, padding:"10px 12px", marginBottom:8 }}>
                  <div>
                    <div style={{ color:T.gold, ...GF, fontWeight:700, fontSize:14 }}>{v.plate}</div>
                    <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>{[v.type,v.make,v.regNum].filter(Boolean).join(" | ")||"—"}</div>
                  </div>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={()=>{setEditVeh(v.id);setEditForm({plate:v.plate,regNum:v.regNum||"",type:v.type||"",make:v.make||""});}}
                      style={{ background:T.blue+"22", border:"none", color:T.blue, borderRadius:8, padding:"5px 12px", cursor:"pointer", ...GF, fontSize:12 }}>تعديل</button>
                    <button onClick={()=>saveVehicles(vehicles.filter(x=>x.id!==v.id))}
                      style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:8, padding:"5px 12px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      {step==="idle" && (
        <div>
          <label style={{ display:"block", background:T.card2, borderRadius:14, padding:"22px 16px", textAlign:"center", cursor:"pointer", border:`2px dashed ${T.gold}44` }}>
            <input type="file" accept=".xlsx,.xls,.csv" onChange={e=>{if(e.target.files[0])readExcel(e.target.files[0]);}} style={{ display:"none" }}/>
            <div style={{ fontSize:36, marginBottom:8 }}>📂</div>
            <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700 }}>رفع ملف Excel</div>
            <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>xlsx / xls / csv</div>
            <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:4 }}>يتعرف تلقائياً على الأعمدة</div>
          </label>
          {msg&&<div style={{ marginTop:10, color:T.red, ...GF, fontSize:13, textAlign:"center" }}>{msg}</div>}
        </div>
      )}

      {loading && <div style={{ textAlign:"center", padding:24 }}><div style={{ fontSize:32 }}>🤖</div><div style={{ color:T.gold, ...GF, fontSize:14, marginTop:8 }}>{msg}</div></div>}

      {step==="mapping" && !loading && (
        <div>
          <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700, marginBottom:14 }}>🗂️ تأكيد خريطة الأعمدة</div>
          {msg&&<div style={{ color:T.yellow, ...GF, fontSize:12, marginBottom:12 }}>{msg}</div>}
          {FIELDS.map(f=>(
            <div key={f.key} style={{ marginBottom:12 }}>
              <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>{f.label}{f.required?" *":""}</label>
              <select value={mapping[f.key]||""} onChange={e=>setMapping({...mapping,[f.key]:e.target.value||null})}
                style={{ width:"100%", background:T.card2, border:`1px solid ${mapping[f.key]?T.gold:T.border}`, borderRadius:10, padding:"10px 14px", color:mapping[f.key]?T.gold:T.sub, fontSize:13, ...GF, outline:"none" }}>
                <option value="">— لا يوجد —</option>
                {headers.map(h=><option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:16 }}>
            <Btn label="← رجوع" onClick={()=>setStep("idle")} outline color={T.sub} sm/>
            <div style={{ flex:1 }}><Btn label="معاينة البيانات →" onClick={buildPreview} full color={T.gold}/></div>
          </div>
        </div>
      )}

      {step==="preview" && (
        <div>
          <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700, marginBottom:4 }}>👁️ معاينة البيانات</div>
          <div style={{ color:T.sub, ...GF, fontSize:12, marginBottom:14 }}>{preview.length} مركبة جاهزة</div>
          <div style={{ maxHeight:240, overflowY:"auto", marginBottom:14 }}>
            {preview.slice(0,20).map((v,i)=>(
              <div key={i} style={{ background:T.card2, borderRadius:10, padding:"10px 12px", marginBottom:8, display:"flex", justifyContent:"space-between" }}>
                <div>
                  <div style={{ color:T.gold, ...GF, fontWeight:700, fontSize:14 }}>{v.plate}</div>
                  <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>{[v.type,v.make,v.regNum].filter(Boolean).join(" | ")||"—"}</div>
                </div>
                <span style={{ color:T.green, fontSize:18 }}>✓</span>
              </div>
            ))}
            {preview.length>20&&<div style={{ color:T.sub, ...GF, fontSize:12, textAlign:"center", padding:8 }}>...و{preview.length-20} أخرى</div>}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <Btn label="← تعديل" onClick={()=>setStep("mapping")} outline color={T.sub} sm/>
            <div style={{ flex:1 }}><Btn label={`✓ استيراد ${preview.length} مركبة`} onClick={confirmImport} full color={T.green}/></div>
          </div>
        </div>
      )}

      {step==="done"&&<div style={{ color:T.green, ...GF, fontSize:15, textAlign:"center", padding:20 }}>{msg}</div>}

      {editVeh&&(
        <Modal show={true} onClose={()=>setEditVeh(null)} title="تعديل بيانات المركبة">
          <Field label="رقم اللوحة"   value={editForm.plate}  onChange={v=>setEditForm({...editForm,plate:v})} req/>
          <Field label="رقم التسجيل"  value={editForm.regNum} onChange={v=>setEditForm({...editForm,regNum:v})}/>
          <Field label="نوع المركبة"   value={editForm.type}   onChange={v=>setEditForm({...editForm,type:v})}/>
          <Field label="الصنع/الماركة" value={editForm.make}   onChange={v=>setEditForm({...editForm,make:v})}/>
          <Btn label="✓ حفظ التعديل" onClick={()=>{saveVehicles(vehicles.map(v=>v.id===editVeh?{...v,...editForm}:v));setEditVeh(null);}} full color={T.gold}/>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
function LoginScreen({ savedPw, onLogin }) {
  const [pw,setPw]=useState(""); const [err,setErr]=useState("");
  return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, direction:"rtl" }}>
      <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at 50% 0%, #D4AF3715 0%, transparent 60%)", pointerEvents:"none" }}/>
      <div style={{ fontSize:56, marginBottom:12 }}>🚗</div>
      <h1 style={{ color:T.gold, ...GF, fontSize:28, fontWeight:800, margin:0 }}>الأثر الذهبي</h1>
      <p style={{ color:T.sub, ...GF, fontSize:13, marginTop:6, marginBottom:44 }}>نظام إدارة أسطول المركبات</p>
      <div style={{ width:"100%", maxWidth:380, background:T.card, borderRadius:24, padding:28, border:`1px solid ${T.border}` }}>
        <div style={{ background:T.card2, borderRadius:12, padding:"12px 16px", marginBottom:18, border:`1px solid ${T.border}` }}>
          <div style={{ color:T.sub, ...GF, fontSize:11, marginBottom:4 }}>اسم المستخدم</div>
          <div style={{ color:T.text, ...GF, fontSize:15, fontWeight:600 }}>فراس عمران</div>
        </div>
        <Field label="كلمة المرور" value={pw} onChange={v=>{setPw(v);setErr("");}} type="password" placeholder="أدخل كلمة المرور"/>
        {err&&<p style={{ color:T.red, ...GF, fontSize:13, margin:"0 0 12px", textAlign:"center" }}>{err}</p>}
        <Btn label="دخول →" onClick={()=>{ if(pw===savedPw) onLogin(); else setErr("كلمة المرور غير صحيحة ❌"); }} full color={T.gold}/>

// TAB 5 — FUEL
// ═══════════════════════════════════════
function FuelTab({ fuelRecords, saveFuelRecords, vehicles, maintenanceRecs, onBack }) {
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({vehicleId:"",prevKm:"",currKm:"",amount:""});
  const [oilAlert,setOilAlert]=useState(null);

  const lastFuelKm=id=>{
    const recs=fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>b.km-a.km);
    return recs.length?recs[0].km:null;
  };

  const checkOil=(vehicleId,currKm)=>{
    const maintRecs=maintenanceRecs.filter(r=>r.vehicleId===vehicleId).sort((a,b)=>a.km-b.km);
    if(!maintRecs.length) return null;
    const last=maintRecs[maintRecs.length-1];
    const nextOil=last.km+5000;
    const diff=nextOil-currKm;
    if(diff<=0) return {msg:`⚠️ موعد غيار الزيت تجاوز ${Math.abs(diff).toLocaleString()} كلم!`,color:T.red,urgent:true};
    if(diff<=500) return {msg:`🔔 موعد غيار الزيت خلال ${diff.toLocaleString()} كلم`,color:T.orange,urgent:false};
    return null;
  };

  const addRecord=()=>{
    if(!form.vehicleId||!form.prevKm||!form.currKm||!form.amount) return;
    const prev=+form.prevKm, curr=+form.currKm;
    if(curr<=prev){alert("العداد الحالي يجب أن يكون أكبر من السابق");return;}
    const dist=curr-prev;
    const cost=(+form.amount/dist).toFixed(3);
    const rec={id:uid(),vehicleId:form.vehicleId,date:new Date().toISOString(),prevKm:prev,currKm:curr,dist,amount:+form.amount,costPerKm:+cost};
    saveFuelRecords([...fuelRecords,rec]);
    const alert_=checkOil(form.vehicleId,curr);
    if(alert_) setOilAlert({...alert_,plate:vehicles.find(v=>v.id===form.vehicleId)?.plate});
    setForm({vehicleId:"",prevKm:"",currKm:"",amount:""});
    setShowAdd(false);
  };

  const vehRecords=id=>fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const displayed=vehicles.filter(v=>!search||v.plate.includes(search)||v.type?.includes(search));

  const totalSpent=fuelRecords.reduce((s,r)=>s+(r.amount||0),0);
  const avgCost=fuelRecords.length?(fuelRecords.reduce((s,r)=>s+(r.costPerKm||0),0)/fuelRecords.length).toFixed(3):0;
  const thisMonth=fuelRecords.filter(r=>{const d=new Date(r.date),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).reduce((s,r)=>s+(r.amount||0),0);

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="⛽ المحروقات" onBack={onBack}/>

      <div style={{ padding:"14px 14px 0", display:"flex", gap:8 }}>
        <StatBox icon="⛽" label="إجمالي الإنفاق" value={`${totalSpent.toFixed(0)} د.أ`} color={T.blue}/>
        <StatBox icon="📅" label="إنفاق هذا الشهر" value={`${thisMonth.toFixed(0)} د.أ`} color={T.gold}/>
      </div>
      <div style={{ padding:"8px 14px 0" }}>
        <div style={{ background:T.card2, borderRadius:14, padding:"12px 16px", borderTop:`3px solid ${T.green}`, display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ fontSize:24 }}>📊</span>
          <div><div style={{ color:T.sub, ...GF, fontSize:11 }}>متوسط تكلفة الكيلومتر</div><div style={{ color:T.green, ...GF, fontSize:20, fontWeight:700 }}>{avgCost} د.أ/كلم</div></div>
        </div>
      </div>

      <div style={{ padding:"12px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث برقم اللوحة"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v=>{
          const recs=vehRecords(v.id);
          const last=recs[0];
          const oilChk=last?checkOil(v.id,last.currKm):null;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${T.border}`, borderRight:`4px solid ${T.blue}` }}>
              <div style={{ padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  {v.type&&<span style={{ color:T.sub, ...GF, fontSize:12 }}>{v.type}</span>}
                </div>
                {last?(
                  <div>
                    <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>آخر تعبئة</div>
                        <div style={{ color:T.text, ...GF, fontSize:13, fontWeight:600 }}>{toDateStr(last.date)}</div>
                      </div>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>العداد الحالي</div>
                        <div style={{ color:T.gold, ...GF, fontSize:13, fontWeight:700 }}>{last.currKm.toLocaleString()} كلم</div>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:8 }}>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>المسافة</div>
                        <div style={{ color:T.text, ...GF, fontSize:13 }}>{last.dist.toLocaleString()} كلم</div>
                      </div>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>تكلفة الكلم</div>
                        <div style={{ color:T.green, ...GF, fontSize:13, fontWeight:600 }}>{last.costPerKm} د.أ</div>
                      </div>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>قيمة التعبئة</div>
                        <div style={{ color:T.text, ...GF, fontSize:13 }}>{last.amount} د.أ</div>
                      </div>
                    </div>
                    {oilChk&&<div style={{ marginTop:8, background:oilChk.color+"22", borderRadius:8, padding:"6px 10px", color:oilChk.color, ...GF, fontSize:12 }}>{oilChk.msg}</div>}
                  </div>
                ):(
                  <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل تعبئة بعد</div>
                )}
              </div>
              <div style={{ borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>{
                  const lk=lastFuelKm(v.id);
                  setForm({vehicleId:v.id,prevKm:lk||"",currKm:"",amount:""});
                  setShowAdd(true);
                }} style={{ width:"100%", background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ تسجيل تعبئة</button>
              </div>
            </div>
          );
        })}
      </div>

      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="تسجيل تعبئة وقود">
        <div style={{ background:T.card2, borderRadius:12, padding:"10px 14px", marginBottom:14, border:`1px solid ${T.gold}33` }}>
          <div style={{ color:T.sub, ...GF, fontSize:11 }}>التاريخ (تلقائي)</div>
          <div style={{ color:T.gold, ...GF, fontSize:14, fontWeight:700, marginTop:4 }}>{new Date().toLocaleDateString("ar-JO")} — {formatTime12(new Date())}</div>
        </div>
        <FieldSelect label="رقم المركبة" value={form.vehicleId} onChange={v=>{
          const lk=lastFuelKm(v);
          setForm(f=>({...f,vehicleId:v,prevKm:lk||""}));
        }} opts={vehicles.map(v=>({v:v.id,l:v.plate}))} req/>
        <Field label="العداد السابق (كلم)" value={form.prevKm} onChange={v=>setForm(f=>({...f,prevKm:v}))} type="number" req/>
        <Field label="العداد الحالي (كلم)" value={form.currKm} onChange={v=>setForm(f=>({...f,currKm:v}))} type="number" req/>
        {form.prevKm&&form.currKm&&+form.currKm>+form.prevKm&&(
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>المسافة المحسوبة</span>
            <span style={{ color:T.green, ...GF, fontSize:15, fontWeight:700 }}>{(+form.currKm-+form.prevKm).toLocaleString()} كلم</span>
          </div>
        )}
        <Field label="قيمة التعبئة (د.أ) مثال: 45.500" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" req/>
        {form.amount&&form.prevKm&&form.currKm&&+form.currKm>+form.prevKm&&(
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>تكلفة الكيلومتر</span>
            <span style={{ color:T.green, ...GF, fontSize:15, fontWeight:700 }}>{(+form.amount/(+form.currKm-+form.prevKm)).toFixed(3)} د.أ/كلم</span>
          </div>
        )}
        <Btn label="✓ حفظ التعبئة" onClick={addRecord} full color={T.gold}/>
      </Modal>

      <Modal show={!!oilAlert} onClose={()=>setOilAlert(null)} title="تنبيه غيار الزيت 🔧">
        {oilAlert&&(
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>{oilAlert.urgent?"🔴":"🟠"}</div>
            <div style={{ color:oilAlert.color, ...GF, fontSize:17, fontWeight:700, marginBottom:8 }}>{oilAlert.plate}</div>
            <div style={{ color:T.text, ...GF, fontSize:15, marginBottom:24 }}>{oilAlert.msg}</div>
            <Btn label="حسناً، سأتخذ إجراءً" onClick={()=>setOilAlert(null)} full color={oilAlert.color}/>
          </div>
        )}
      </Modal>
    </div>
  );
}

// NOTIFICATIONS ENGINE
// ═══════════════════════════════════════
function buildNotifications(violations, vehicles, maintenanceRecs, fuelRecords) {
  const notes=[];

  // violations
  violations.filter(v=>v.status!=="مسددة").forEach(v=>{
    const r=30-daysDiff(v.vdate);
    if(r<=0) notes.push({id:"viol-"+v.id,icon:"⛔",title:"مخالفة — انتهت المهلة",body:`${v.plate} — ${v.vtype}`,color:T.red,tab:"violations"});
    else if(r<=5) notes.push({id:"viol-"+v.id,icon:"🔴",title:`مخالفة — ${r} أيام متبقية`,body:`${v.plate} — ${v.vtype}`,color:T.red,tab:"violations"});
    else if(r<=10) notes.push({id:"viol-"+v.id,icon:"🟠",title:`مخالفة — ${r} يوم متبقي`,body:`${v.plate} — ${v.vtype}`,color:T.orange,tab:"violations"});
  });

  // license & insurance
  vehicles.forEach(v=>{
    const chk=(exp,label)=>{
      const diff=daysDiff(new Date(),exp);
      if(diff>=0) notes.push({id:"lic-"+v.id+label,icon:"🔴",title:`${label} منتهي`,body:v.plate,color:T.red,tab:"license"});
      else{const r=Math.abs(diff);
        if(r<=3) notes.push({id:"lic-"+v.id+label,icon:"🔴",title:`${label} — ${r} أيام`,body:v.plate,color:T.red,tab:"license"});
        else if(r<=7) notes.push({id:"lic-"+v.id+label,icon:"🟠",title:`${label} — ${r} أيام`,body:v.plate,color:T.orange,tab:"license"});
        else if(r<=14) notes.push({id:"lic-"+v.id+label,icon:"🟡",title:`${label} — ${r} يوم`,body:v.plate,color:T.yellow,tab:"license"});
      }
    };
    if(v.license_exp) chk(v.license_exp,"الترخيص");
    if(v.insurance_exp) chk(v.insurance_exp,"التأمين");
  });

  // maintenance
  vehicles.forEach(v=>{
    // get latest km from fuel
    const fRecs=fuelRecords.filter(r=>r.vehicleId===v.id).sort((a,b)=>b.km-a.km);
    const currKm=fRecs.length?fRecs[0].currKm:null;
    const mRecs=maintenanceRecs.filter(r=>r.vehicleId===v.id).sort((a,b)=>a.km-b.km);
    if(!mRecs.length) return;
    const last=mRecs[mRecs.length-1];
    const nextOil=last.km+5000;
    if(currKm){
      const diff=nextOil-currKm;
      if(diff<=0) notes.push({id:"maint-oil-"+v.id,icon:"🔴",title:"غيار زيت متأخر",body:`${v.plate} — تجاوز ${Math.abs(diff).toLocaleString()} كلم`,color:T.red,tab:"maintenance"});
      else if(diff<=500) notes.push({id:"maint-oil-"+v.id,icon:"🟠",title:"غيار زيت قريب",body:`${v.plate} — ${diff.toLocaleString()} كلم متبقية`,color:T.orange,tab:"maintenance"});
    }
    // overdue checks
    const twoMo=new Date(); twoMo.setMonth(twoMo.getMonth()-2);
    if(new Date(last.date)<twoMo) notes.push({id:"maint-old-"+v.id,icon:"⚠️",title:"راجع بيانات الصيانة",body:`${v.plate} — أكثر من شهرين`,color:T.orange,tab:"maintenance"});
  });

  return notes;
}

function NotificationsPanel({ notes, onNav, onClose }) {
  if(!notes.length) return (
    <div style={{ padding:"32px 20px", textAlign:"center" }}>
      <div style={{ fontSize:44, marginBottom:12 }}>✅</div>
      <div style={{ color:T.sub, ...GF, fontSize:15 }}>لا توجد تنبيهات</div>
    </div>
  );
  return (
    <div>
      {notes.map(n=>(
        <button key={n.id} onClick={()=>{onNav(n.tab);onClose();}}

          <span style={{ fontSize:22, flexShrink:0 }}>{n.icon}</span>
          <div style={{ flex:1, textAlign:"right" }}>
            <div style={{ color:n.color, ...GF, fontSize:13, fontWeight:700 }}>{n.title}</div>

          </div>
          <span style={{ color:T.border, fontSize:16 }}>‹</span>
        </button>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════
// MAIN SCREEN — updated with bell
// ═══════════════════════════════════════
function ViolationsTab({ violations, saveViolations, vehicles, noteOptions, onBack }) {
  const [view,setView]=useState("active");
  const [showAdd,setShowAdd]=useState(false);
  const [detail,setDetail]=useState(null);
  const [selected,setSelected]=useState([]);
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({plate:"",driver:"",vdate:"",vtype:"",vnum:"",amount:"",note:""});
  const PHONE="00962";

  const daysLeft=v=>30-daysDiff(v.vdate);
  const statusOf=v=>{
    if(v.status==="مسددة") return {label:"مسددة",color:T.green};
    if(v.status==="انتظار") return {label:"انتظار",color:T.orange};
    const r=daysLeft(v);
    if(r<=0) return {label:"انتهت المهلة",color:T.red};
    return {label:"مفتوحة",color:T.yellow};
  };
  const alertOf=v=>{
    if(v.status==="مسددة"||v.status==="انتظار") return null;
    const r=daysLeft(v);
    if(r<=0) return {msg:"⛔ انتهت مهلة الخصم",color:T.red};
    if(r<=5)  return {msg:`🔴 تنبيه شديد — ${r} أيام`,color:T.red};
    if(r<=10) return {msg:`🟠 تنبيه متوسط — ${r} يوم`,color:T.orange};
    return null;
  };

  const active=violations.filter(v=>v.status!=="مسددة");
  const archive=violations.filter(v=>v.status==="مسددة");
  const displayed=(view==="active"?active:archive).filter(v=>!search||v.plate.includes(search)||v.driver.includes(search)||(v.vnum||"").includes(search));

  const totalAmt=active.reduce((s,v)=>s+(+v.amount||0),0);
  const savingAmt=active.filter(v=>daysLeft(v)>0&&v.status!=="مسددة").reduce((s,v)=>s+(+v.amount||0)*0.3,0);
  const weekAlert=active.filter(v=>{const r=daysLeft(v);return r>0&&r<=7&&v.status!=="مسددة";}).length;

  const driverMap={};
  violations.forEach(v=>{if(v.driver) driverMap[v.driver]=(driverMap[v.driver]||0)+1;});
  const topDriver=Object.entries(driverMap).sort((a,b)=>b[1]-a[1])[0];

  const addViolation=()=>{
    if(!form.plate||!form.driver||!form.vdate||!form.vtype||!form.amount) return;
    saveViolations([...violations,{...form,id:uid(),status:"مفتوحة",created:new Date().toISOString()}]);
    setForm({plate:"",driver:"",vdate:"",vtype:"",vnum:"",amount:"",note:""});
    setShowAdd(false);
  };
  const markPaid=id=>{
    saveViolations(violations.map(v=>v.id===id?{...v,status:"مسددة",paidDate:new Date().toISOString()}:v));
    setDetail(null);
  };
  const sendToAccounting=()=>{
    const items=violations.filter(v=>selected.includes(v.id));
    let msg="📋 *تقرير المخالفات — الأثر الذهبي*\n\n";
    items.forEach((v,i)=>{msg+=`${i+1}. لوحة: ${v.plate} | السائق: ${v.driver}\n   التاريخ: ${toDateStr(v.vdate)} | النوع: ${v.vtype}\n   المبلغ: ${v.amount} د.أ | المتبقي: ${daysLeft(v)} يوم\n\n`;});
    saveViolations(violations.map(v=>selected.includes(v.id)?{...v,status:"انتظار",sentDate:new Date().toISOString()}:v));
    setSelected([]);
    window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`,"_blank");
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>

        </div>

      {selected.length>0&&(

          <span style={{ color:T.gold, ...GF, flex:1, fontSize:13 }}>✓ {selected.length} مخالفة محددة</span>

        {displayed.map(v=>{

                  </div>
                  <div style={{ color:T.sub, ...GF, fontSize:12, marginBottom:6 }}>👤 {v.driver} | {v.vtype}</div>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:T.sub, ...GF, fontSize:12 }}>📅 {toDateStr(v.vdate)}</span>
                    <div><span style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700 }}>{v.amount}</span><span style={{ color:T.sub, ...GF, fontSize:12 }}> د.أ</span></div>
                  </div>
                  {v.status!=="مسددة"&&r>0&&(
                    <div style={{ marginTop:10, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                        <span style={{ color:T.sub, ...GF, fontSize:11 }}>المتبقي</span>

                      <div style={{ background:T.border, borderRadius:4, height:5 }}>

      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="إضافة مخالفة جديدة">

        <Field label="الموظف المسؤول" value={form.driver} onChange={v=>setForm({...form,driver:v})} req/>

        <FieldSelect label="تصنيف المخالفة" value={form.vtype} onChange={v=>setForm({...form,vtype:v})} opts={VTYPES} req/>

          return (
            <div>

              <div style={{ background:T.card2, borderRadius:12, padding:16, margin:"16px 0" }}>

                  ["بعد خصم 30%",`${disc} د.أ`],["الوفر",`${save_} د.أ`],["الملاحظة",detail.note||"—"],

}

// TAB 2 — LICENSE & INSURANCE
// ═══════════════════════════════════════
function LicenseTab({ vehicles, saveVehicles, onBack }) {
  const [showAdd,setShowAdd]=useState(false);
  const [detail,setDetail]=useState(null);
  const [renewing,setRenewing]=useState(null);
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({plate:"",type:"",license_exp:"",insurance_exp:""});
  const [rForm,setRForm]=useState({kind:"ترخيص",date:"",amount:""});

  const statusOf=exp=>{
    const diff=daysDiff(new Date(),exp);
    if(diff>=0) return {label:"منتهي",color:T.red};
    const r=Math.abs(diff);
    if(r<=3) return {label:`${r} أيام — شديد`,color:T.red};
    if(r<=7) return {label:`${r} أيام — عالي`,color:T.orange};
    if(r<=14) return {label:`${r} يوم — تنبيه`,color:T.yellow};
    return {label:"ساري",color:T.green};
  };
  const worstColor=v=>{
    const order=[T.red,T.orange,T.yellow,T.green];
    const ls=statusOf(v.license_exp),is=statusOf(v.insurance_exp);
    return order.indexOf(ls.color)<order.indexOf(is.color)?ls.color:is.color;
  };

  const green=vehicles.filter(v=>worstColor(v)===T.green).length;
  const warn=vehicles.filter(v=>[T.yellow,T.orange].includes(worstColor(v))).length;
  const expd=vehicles.filter(v=>worstColor(v)===T.red).length;
  const displayed=vehicles.filter(v=>!search||v.plate.includes(search)||v.type?.includes(search));

  const addVehicle=()=>{
    if(!form.plate||!form.license_exp||!form.insurance_exp) return;
    saveVehicles([...vehicles,{...form,id:uid(),renewHistory:[]}]);
    setForm({plate:"",type:"",license_exp:"",insurance_exp:""});
    setShowAdd(false);
  };
  const doRenew=()=>{
    if(!rForm.kind||!rForm.date) return;
    saveVehicles(vehicles.map(v=>{
      if(v.id!==renewing.id) return v;
      const h=[...(v.renewHistory||[]),{...rForm,addedAt:new Date().toISOString()}];
      const up={...v,renewHistory:h};
      if(rForm.kind==="ترخيص") up.license_exp=rForm.date;
      else up.insurance_exp=rForm.date;
      return up;
    }));
    setRenewing(null); setRForm({kind:"ترخيص",date:"",amount:""});
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="📋 الترخيص والتأمين" onBack={onBack}/>
      <div style={{ padding:"14px 14px 0", display:"flex", gap:8 }}>
        <StatBox icon="✅" label="سارية" value={green} color={T.green}/>
        <StatBox icon="⚠️" label="تحتاج انتباه" value={warn} color={T.yellow}/>
        <StatBox icon="🔴" label="منتهية" value={expd} color={T.red}/>
      </div>
      <div style={{ padding:"12px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث برقم اللوحة أو النوع"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>
      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v=>{
          const ls=statusOf(v.license_exp), is_=statusOf(v.insurance_exp), wc=worstColor(v);
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${wc}33`, borderRight:`4px solid ${wc}`, padding:"14px 16px", cursor:"pointer" }} onClick={()=>setDetail(v)}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                <span style={{ color:T.sub, ...GF, fontSize:12 }}>{v.type}</span>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                  <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>الترخيص</div>
                  <div style={{ color:T.text, ...GF, fontSize:12, marginBottom:6 }}>{toDateStr(v.license_exp)}</div>
                  <Badge label={ls.label} color={ls.color}/>
                </div>
                <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                  <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>التأمين</div>
                  <div style={{ color:T.text, ...GF, fontSize:12, marginBottom:6 }}>{toDateStr(v.insurance_exp)}</div>
                  <Badge label={is_.label} color={is_.color}/>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ padding:"0 14px" }}>
        <Btn label="+ إضافة مركبة" onClick={()=>setShowAdd(true)} full color={T.gold}/>
      </div>

      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="إضافة مركبة جديدة">
        <Field label="رقم اللوحة" value={form.plate} onChange={v=>setForm({...form,plate:v})} req/>
        <Field label="نوع المركبة (اختياري)" value={form.type} onChange={v=>setForm({...form,type:v})}/>
        <Field label="تاريخ انتهاء الترخيص" value={form.license_exp} onChange={v=>setForm({...form,license_exp:v})} type="date" req/>
        <Field label="تاريخ انتهاء التأمين" value={form.insurance_exp} onChange={v=>setForm({...form,insurance_exp:v})} type="date" req/>
        <Btn label="✓ حفظ المركبة" onClick={addVehicle} full color={T.gold}/>
      </Modal>

      <Modal show={!!detail} onClose={()=>setDetail(null)} title={detail?.plate||""}>
        {detail&&(
          <div>
            <div style={{ background:T.card2, borderRadius:12, padding:16, marginBottom:16 }}>
              {[["نوع المركبة",detail.type||"—"],["انتهاء الترخيص",toDateStr(detail.license_exp)],["انتهاء التأمين",toDateStr(detail.insurance_exp)]].map(([k,v])=>(
                <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ color:T.sub, ...GF, fontSize:13 }}>{k}</span>
                  <span style={{ color:T.text, ...GF, fontSize:13 }}>{v}</span>
                </div>
              ))}
            </div>
            {(detail.renewHistory||[]).length>0&&(
              <div style={{ marginBottom:16 }}>
                <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:10 }}>سجل التجديدات</p>
                {detail.renewHistory.map((r,i)=>(
                  <div key={i} style={{ background:T.card2, borderRadius:10, padding:"8px 12px", marginBottom:8, display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:T.text, ...GF, fontSize:13 }}>{r.kind}</span>
                    <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(r.date)}{r.amount?` | ${r.amount} د.أ`:""}</span>
                  </div>
                ))}
              </div>
            )}
            <Btn label="🔄 تجديد" onClick={()=>{setRenewing(detail);setDetail(null);}} full color={T.blue}/>
          </div>
        )}
      </Modal>

      <Modal show={!!renewing} onClose={()=>setRenewing(null)} title={`تجديد — ${renewing?.plate}`}>
        {renewing&&(
          <div>
            <FieldSelect label="نوع التجديد" value={rForm.kind} onChange={v=>setRForm({...rForm,kind:v})} opts={["ترخيص","تأمين"]} req/>
            <Field label="تاريخ الانتهاء الجديد" value={rForm.date} onChange={v=>setRForm({...rForm,date:v})} type="date" req/>
            <Field label="المبلغ المدفوع (د.أ) — اختياري" value={rForm.amount} onChange={v=>setRForm({...rForm,amount:v})} type="number"/>
            <Btn label="✓ حفظ التجديد" onClick={doRenew} full color={T.gold}/>
          </div>
        )}
      </Modal>
    </div>
  );
}

// TAB 3 — HANDOVER
// ═══════════════════════════════════════
function HandoverTab({ handovers, saveHandovers, vehicles, equipmentList, onBack }) {
  const [formVeh,setFormVeh]=useState(null);
  const [histVeh,setHistVeh]=useState(null);
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({type:"استلام",driver:"",equip:{},photos:{f:null,b:null,r:null,l:null}});

  const now2=new Date();
  const vehHandovers=id=>handovers.filter(h=>h.vehicleId===id).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const lastH=id=>{const a=vehHandovers(id);return a.length?a[a.length-1]:null;};

  const uploadPhoto=(side,e)=>{
    const file=e.target.files[0]; if(!file) return;
    const rd=new FileReader();
    rd.onload=()=>setForm(f=>({...f,photos:{...f.photos,[side]:rd.result}}));
    rd.readAsDataURL(file);
  };

  const submit=()=>{
    if(!form.driver||!form.type) return;
    const rec={id:uid(),vehicleId:formVeh,type:form.type,driver:form.driver,date:new Date().toISOString(),equip:form.equip,photos:form.photos};
    const filtered=handovers.filter(h=>!(h.vehicleId===formVeh&&daysDiff(h.date)>30));
    saveHandovers([...filtered,rec]);
    setForm({type:"استلام",driver:"",equip:{},photos:{f:null,b:null,r:null,l:null}});
    setFormVeh(null);
  };

  const photoSides=[{k:"f",l:"أمامية"},{k:"b",l:"خلفية"},{k:"r",l:"يمين"},{k:"l",l:"يسار"}];
  const displayed=vehicles.filter(v=>!search||v.plate.includes(search)||v.type?.includes(search));

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🔑 الاستلام والتسليم" onBack={onBack}/>
      <div style={{ padding:"12px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث برقم اللوحة أو النوع"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>
      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v=>{
          const last=lastH(v.id), lc=last?.type==="استلام"?T.blue:T.green;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${T.border}`, overflow:"hidden" }}>
              <div style={{ padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  {last&&<Badge label={last.type} color={lc}/>}
                </div>
                {v.type&&<div style={{ color:T.sub, ...GF, fontSize:12, marginTop:4 }}>{v.type}</div>}
                {last&&<div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>👤 {last.driver} — {toDateStr(last.date)} {formatTime12(last.date)}</div>}
              </div>
              <div style={{ display:"flex", borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>setFormVeh(v.id)} style={{ flex:1, background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ إجراء جديد</button>
                <button onClick={()=>setHistVeh(v)} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.sub, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>📂 السجل</button>
              </div>
            </div>
          );
        })}
      </div>

      <Modal show={!!formVeh} onClose={()=>setFormVeh(null)} title={`إجراء — ${vehicles.find(v=>v.id===formVeh)?.plate||""}`}>
        <div style={{ background:T.card2, borderRadius:12, padding:"10px 14px", marginBottom:14, border:`1px solid ${T.gold}33` }}>
          <div style={{ color:T.sub, ...GF, fontSize:11 }}>التاريخ والوقت (تلقائي)</div>
          <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700, marginTop:4 }}>{now2.toLocaleDateString("ar-JO")} — {formatTime12(now2)}</div>
        </div>
        <FieldSelect label="الحالة" value={form.type} onChange={v=>setForm({...form,type:v})} opts={["استلام","تسليم"]} req/>
        <Field label="اسم السائق" value={form.driver} onChange={v=>setForm({...form,driver:v})} req/>
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>عدة المركبة</label>
          <div style={{ background:T.card2, borderRadius:12, padding:"12px 14px" }}>
            {equipmentList.map(item=>(
              <label key={item} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, cursor:"pointer" }}>
                <input type="checkbox" checked={!!form.equip[item]} onChange={e=>setForm(f=>({...f,equip:{...f.equip,[item]:e.target.checked}}))}
                  style={{ width:18, height:18, accentColor:T.gold, flexShrink:0 }}/>
                <span style={{ color:T.text, ...GF, fontSize:14 }}>{item}</span>
              </label>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>صور المركبة (اختياري)</label>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {photoSides.map(({k,l})=>(
              <div key={k}>
                <input type="file" accept="image/*" onChange={e=>uploadPhoto(k,e)} style={{ display:"none" }} id={`ph-${k}`}/>
                <label htmlFor={`ph-${k}`} style={{ display:"block", background:T.card2, borderRadius:10, border:`2px dashed ${form.photos[k]?T.gold:T.border}`, padding:"14px 8px", textAlign:"center", cursor:"pointer" }}>
                  {form.photos[k]
                    ? <img src={form.photos[k]} style={{ width:"100%", height:55, objectFit:"cover", borderRadius:8 }} alt=""/>
                    : <><div style={{ fontSize:22 }}>📷</div><div style={{ color:T.sub, ...GF, fontSize:11, marginTop:4 }}>{l}</div></>}
                </label>
              </div>
            ))}
          </div>
        </div>
        <Btn label="✓ حفظ الإجراء" onClick={submit} full color={T.gold}/>
      </Modal>

      <Modal show={!!histVeh} onClose={()=>setHistVeh(null)} title={`سجل — ${histVeh?.plate}`}>
        {histVeh&&(()=>{
          const records=vehHandovers(histVeh.id).reverse();
          if(!records.length) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:24 }}>لا يوجد سجل بعد</div>;
          return records.map(h=>{
            const hc=h.type==="استلام"?T.blue:T.green;
            const equippedItems=Object.entries(h.equip||{}).filter(([,v])=>v).map(([k])=>k);
            const photos=Object.entries(h.photos||{}).filter(([,v])=>v);
            return (
              <div key={h.id} style={{ background:T.card2, borderRadius:14, padding:"12px 14px", marginBottom:12, borderRight:`3px solid ${hc}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <Badge label={h.type} color={hc}/>
                  <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(h.date)} {formatTime12(h.date)}</span>
                </div>
                <div style={{ color:T.text, ...GF, marginTop:8, fontWeight:600 }}>👤 {h.driver}</div>
                {equippedItems.length>0&&<div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>✓ {equippedItems.join("، ")}</div>}
                {photos.length>0&&(
                  <div style={{ display:"flex", gap:6, marginTop:8, flexWrap:"wrap" }}>
                    {photos.map(([s,src])=><img key={s} src={src} style={{ width:52, height:52, objectFit:"cover", borderRadius:8 }} alt=""/>)}
                  </div>
                )}
              </div>
            );
          });
        })()}
      </Modal>
    </div>
  );
}

// TAB 4 — MAINTENANCE
// ═══════════════════════════════════════
function MaintenanceTab({ records, saveRecords, vehicles, fuelRecords, onBack }) {
  const [addVeh,setAddVeh]=useState(null);
  const [histVeh,setHistVeh]=useState(null);
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({km:"",date:todayISO()});

  const vehRecs=id=>records.filter(r=>r.vehicleId===id).sort((a,b)=>a.km-b.km);
  const calcStatus=id=>{
    const vr=vehRecs(id);
    // get latest km from fuel records
    const fRecs=fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>b.currKm-a.currKm);
    const latestFuelKm=fRecs.length?fRecs[0].currKm:null;

    if(!vr.length) return {urgencyKm:Infinity,noData:true,latestFuelKm};
    const last=vr[vr.length-1], count=vr.length;
    const nextOil=last.km+5000, alerts=[];
    const threeWeeksAgo=new Date(); threeWeeksAgo.setDate(threeWeeksAgo.getDate()-21);
    const lastDate=new Date(last.date), overdueCheck=lastDate<threeWeeksAgo;
    if(count%2===0) alerts.push({label:"فلتر الزيت",overdue:overdueCheck});
    if(count%3===0){alerts.push({label:"البريكات",overdue:overdueCheck});alerts.push({label:"فلتر الديزل",overdue:overdueCheck});alerts.push({label:"فلتر الهواء",overdue:overdueCheck});}
    const twoMonthsAgo=new Date(); twoMonthsAgo.setMonth(twoMonthsAgo.getMonth()-2);
    const noService=lastDate<twoMonthsAgo;

    // oil alert from fuel km
    let oilFromFuel=null;
    if(latestFuelKm){
      const diff=nextOil-latestFuelKm;
      if(diff<=0) oilFromFuel={msg:`عداد المحروقات تجاوز موعد الغيار بـ ${Math.abs(diff).toLocaleString()} كلم`,color:T.red};
      else if(diff<=500) oilFromFuel={msg:`موعد غيار الزيت خلال ${diff.toLocaleString()} كلم (من عداد المحروقات)`,color:T.orange};
    }

    return {nextOil,lastKm:last.km,lastDate:last.date,count,alerts,noService,urgencyKm:nextOil,latestFuelKm,oilFromFuel};
  };

  const sorted=[...vehicles].sort((a,b)=>(calcStatus(a.id).urgencyKm||9999999)-(calcStatus(b.id).urgencyKm||9999999));
  const displayed=sorted.filter(v=>!search||v.plate.includes(search)||v.type?.includes(search));

  const thisMonth=records.filter(r=>{const d=new Date(r.date||r.addedAt),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).length;

  const doAdd=()=>{
    if(!form.km||!form.date) return;
    saveRecords([...records,{id:uid(),vehicleId:addVeh,km:+form.km,date:form.date,addedAt:new Date().toISOString()}]);
    setForm({km:"",date:todayISO()}); setAddVeh(null);
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🔧 الصيانة" onBack={onBack}/>
      <div style={{ padding:"14px 14px 0" }}>
        <div style={{ background:T.card2, borderRadius:14, padding:"14px 16px", borderTop:`3px solid ${T.orange}`, display:"flex", alignItems:"center", gap:14 }}>
          <span style={{ fontSize:28 }}>🔧</span>
          <div><div style={{ color:T.sub, ...GF, fontSize:11 }}>إجراءات هذا الشهر</div><div style={{ color:T.orange, ...GF, fontSize:22, fontWeight:700 }}>{thisMonth}</div></div>
        </div>
      </div>
      <div style={{ padding:"12px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث برقم اللوحة أو النوع"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>
      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v=>{
          const s=calcStatus(v.id);
          const borderC=s.noData?T.border:s.alerts.some(a=>a.overdue)||s.noService?T.red:s.alerts.length?T.orange:T.green;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${borderC}33`, borderRight:`4px solid ${borderC}` }}>
              <div style={{ padding:"14px 16px" }} onClick={()=>setHistVeh(v)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    {s.noService&&<Badge label="⚠️ راجع البيانات" color={T.red}/>}
                    {v.type&&<span style={{ color:T.sub, ...GF, fontSize:11 }}>{v.type}</span>}
                  </div>
                </div>
                {s.noData
                  ? <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل صيانة — يرجى الإدخال</div>
                  : <>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                      <span style={{ color:T.sub, ...GF, fontSize:12 }}>آخر غيار: {s.lastKm?.toLocaleString()} كلم | {toDateStr(s.lastDate)}</span>
                      <span style={{ color:T.sub, ...GF, fontSize:11 }}>غيار #{s.count}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", background:T.card2, borderRadius:10, padding:"8px 12px" }}>
                      <span style={{ color:T.sub, ...GF, fontSize:12 }}>الغيار القادم</span>
                      <span style={{ color:T.orange, ...GF, fontWeight:700, fontSize:14 }}>{s.nextOil?.toLocaleString()} كلم</span>
                    </div>
                    {s.latestFuelKm&&(
                      <div style={{ background:T.card2, borderRadius:10, padding:"8px 12px", marginTop:6, display:"flex", justifyContent:"space-between" }}>
                        <span style={{ color:T.sub, ...GF, fontSize:12 }}>⛽ عداد المحروقات</span>
                        <span style={{ color:T.blue, ...GF, fontWeight:700, fontSize:13 }}>{s.latestFuelKm.toLocaleString()} كلم</span>
                      </div>
                    )}
                    {s.oilFromFuel&&<div style={{ marginTop:6, background:s.oilFromFuel.color+"22", borderRadius:8, padding:"5px 10px" }}><span style={{ color:s.oilFromFuel.color, ...GF, fontSize:12 }}>⛽ {s.oilFromFuel.msg}</span></div>}
                    {s.alerts.length>0&&(
                      <div style={{ marginTop:8 }}>
                        {s.alerts.map((a,i)=>(
                          <div key={i} style={{ background:(a.overdue?T.red:T.orange)+"22", borderRadius:8, padding:"5px 10px", marginBottom:4 }}>
                            <span style={{ color:a.overdue?T.red:T.orange, ...GF, fontSize:12 }}>{a.overdue?"⚠️ متأخر —":"🔔 مستحق —"} {a.label}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                }
              </div>
              <div style={{ display:"flex", borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>setAddVeh(v.id)} style={{ flex:1, background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ تسجيل غيار زيت</button>
                <button onClick={()=>setHistVeh(v)} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.sub, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>📂 السجل</button>
              </div>
            </div>
          );
        })}
      </div>

      <Modal show={!!addVeh} onClose={()=>setAddVeh(null)} title={`تسجيل غيار — ${vehicles.find(v=>v.id===addVeh)?.plate||""}`}>
        <Field label="قراءة العداد الحالية (كلم)" value={form.km} onChange={v=>setForm({...form,km:v})} type="number" req/>
        <Field label="تاريخ الإجراء" value={form.date} onChange={v=>setForm({...form,date:v})} type="date" req/>
        <Btn label="✓ حفظ غيار الزيت" onClick={doAdd} full color={T.gold}/>
      </Modal>

      <Modal show={!!histVeh} onClose={()=>setHistVeh(null)} title={`سجل صيانة — ${histVeh?.plate}`}>
        {histVeh&&(()=>{
          const rr=vehRecs(histVeh.id).reverse(), total=rr.length;
          if(!total) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:24 }}>لا يوجد سجل بعد</div>;
          return rr.map((r,i)=>(
            <div key={r.id} style={{ background:T.card2, borderRadius:12, padding:"12px 14px", marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ color:T.orange, ...GF, fontWeight:700 }}>غيار زيت #{total-i}</div>
                <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:4 }}>{toDateStr(r.date)}</div>
              </div>
              <div style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{r.km.toLocaleString()} <span style={{ color:T.sub, fontSize:12 }}>كلم</span></div>
            </div>
          ));
        })()}
      </Modal>
    </div>
  );
}

// SETTINGS
// ═══════════════════════════════════════
function SettingsTab({ noteOptions, saveNoteOptions, equipmentList, saveEquipment, savedPw, setSavedPw, vehicles, saveVehicles, onLogout, onBack }) {
  const [open,setOpen]=useState(null);
  const [newNote,setNewNote]=useState(""); const [newEq,setNewEq]=useState("");
  const [newPw,setNewPw]=useState(""); const [cfmPw,setCfmPw]=useState(""); const [pwMsg,setPwMsg]=useState("");

  const changePw=()=>{
    if(!newPw) return;
    if(newPw!==cfmPw){setPwMsg("كلمتا المرور غير متطابقتين ❌");return;}
    setSavedPw(newPw); setNewPw(""); setCfmPw("");
    setPwMsg("✅ تم تغيير كلمة المرور وحفظها");
  };

  const Section=({id,title,children})=>(
    <div style={{ background:T.card, borderRadius:14, marginBottom:12, overflow:"hidden" }}>
      <button onClick={()=>setOpen(open===id?null:id)} style={{ width:"100%", background:"none", border:"none", padding:"16px 18px", display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }}>
        <span style={{ color:T.text, ...GF, fontSize:15 }}>{title}</span>
        <span style={{ color:T.sub, fontSize:14 }}>{open===id?"▲":"▼"}</span>
      </button>
      {open===id&&<div style={{ padding:"0 18px 18px", borderTop:`1px solid ${T.border}` }}><div style={{ marginTop:14 }}>{children}</div></div>}
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="⚙️ الإعدادات" onBack={onBack}/>
      <div style={{ padding:16 }}>
        <Section id="pw" title="🔐 تغيير كلمة المرور">
          <Field label="كلمة المرور الجديدة" value={newPw} onChange={setNewPw} type="password"/>
          <Field label="تأكيد كلمة المرور" value={cfmPw} onChange={setCfmPw} type="password"/>
          {pwMsg&&<p style={{ color:pwMsg.includes("✅")?T.green:T.red, ...GF, fontSize:13, marginBottom:12 }}>{pwMsg}</p>}
          <Btn label="حفظ كلمة المرور" onClick={changePw} full color={T.gold}/>
        </Section>

        <Section id="vehicles" title={`🚗 إدارة المركبات واستيراد البيانات`}>
          <VehicleImporter vehicles={vehicles} saveVehicles={saveVehicles}/>
        </Section>

        <Section id="notes" title={`📝 ملاحظات المخالفات (${noteOptions.length})`}>
          {noteOptions.map((n,i)=>(
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <span style={{ color:T.text, ...GF, fontSize:13 }}>{n}</span>
              <button onClick={()=>saveNoteOptions(noteOptions.filter((_,j)=>j!==i))} style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:6, padding:"4px 10px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="ملاحظة جديدة"
              style={{ flex:1, background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, padding:"9px 12px", color:T.text, ...GF, fontSize:13, outline:"none" }}/>
            <button onClick={()=>{if(newNote){saveNoteOptions([...noteOptions,newNote]);setNewNote("");}}} style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"9px 18px", cursor:"pointer", ...GF, fontWeight:700, fontSize:16 }}>+</button>
          </div>
        </Section>

        <Section id="equip" title={`🔩 عدة المركبة (${equipmentList.length})`}>
          {equipmentList.map((e,i)=>(
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <span style={{ color:T.text, ...GF, fontSize:13 }}>{e}</span>
              <button onClick={()=>saveEquipment(equipmentList.filter((_,j)=>j!==i))} style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:6, padding:"4px 10px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={newEq} onChange={e=>setNewEq(e.target.value)} placeholder="عنصر جديد"
              style={{ flex:1, background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, padding:"9px 12px", color:T.text, ...GF, fontSize:13, outline:"none" }}/>
            <button onClick={()=>{if(newEq){saveEquipment([...equipmentList,newEq]);setNewEq("");}}} style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"9px 18px", cursor:"pointer", ...GF, fontWeight:700, fontSize:16 }}>+</button>
          </div>
        </Section>
        <button onClick={onLogout}
          style={{ width:"100%", background:T.red+"22", border:`1px solid ${T.red}44`, borderRadius:14, padding:"14px", color:T.red, ...GF, fontSize:15, fontWeight:700, cursor:"pointer", marginTop:8 }}>
          🚪 تسجيل الخروج
        </button>
      </div>
    </div>
  );
}
// ═══════════════════════════════════════
function App() {
  const [screen,setScreen]=useState(()=>localStorage.getItem("gm_loggedin")==="1"?"main":"login");
  const [loading,setLoading]=useState(true);
  const [savedPw,setSavedPw_]=useState("1234");
  const [violations,setViolations]=useState([]);
  const [vehicles,setVehicles]=useState([]);
  const [handovers,setHandovers]=useState([]);
  const [maintenanceRecs,setMaintenanceRecs]=useState([]);
  const [fuelRecords,setFuelRecords]=useState([]);
  const [noteOptions,setNoteOptions]=useState(DEFAULT_NOTES);
  const [equipmentList,setEquipmentList]=useState(DEFAULT_EQUIP);

  useEffect(()=>{
    const pw=db.get("pw2"), v=db.get("violations"), veh=db.get("vehicles"),
          h=db.get("handovers"), m=db.get("maint"), no=db.get("noteOpts"),
          eq=db.get("equipList"), fu=db.get("fuel");
    if(pw) setSavedPw_(pw);
    if(v)  setViolations(v);
    if(veh) setVehicles(veh);
    else { setVehicles([]); db.set("vehicles",[]); }
    if(h)  setHandovers(h);
    if(m)  setMaintenanceRecs(m);
    if(fu) setFuelRecords(fu);
    if(no) setNoteOptions(no);
    if(eq) setEquipmentList(eq);
    setLoading(false);
  },[]);

  if(loading) return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center", direction:"rtl" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:44, marginBottom:12 }}>🚗</div>
        <div style={{ color:T.gold, ...GF, fontSize:16 }}>جارٍ التحميل...</div>
      </div>
    </div>
  );

  const save={
    violations:v=>{setViolations(v);db.set("violations",v);},
    vehicles:v=>{setVehicles(v);db.set("vehicles",v);},
    handovers:h=>{setHandovers(h);db.set("handovers",h);},
    maint:m=>{setMaintenanceRecs(m);db.set("maint",m);},
    fuel:f=>{setFuelRecords(f);db.set("fuel",f);},
    noteOpts:n=>{setNoteOptions(n);db.set("noteOpts",n);},
    equipList:e=>{setEquipmentList(e);db.set("equipList",e);},
    pw:p=>{setSavedPw_(p);db.set("pw2",p);},
  };

  const nav=s=>setScreen(s), back=()=>setScreen("main");
  const login=()=>{ localStorage.setItem("gm_loggedin","1"); setScreen("main"); };
  const logout=()=>{ localStorage.removeItem("gm_loggedin"); setScreen("login"); };

  const notifications=buildNotifications(violations,vehicles,maintenanceRecs,fuelRecords);

  if(screen==="login")       return <LoginScreen savedPw={savedPw} onLogin={login}/>;
  if(screen==="main")        return <MainScreen onNav={nav} onLogout={logout} notifications={notifications}/>;
  if(screen==="violations")  return <ViolationsTab violations={violations} saveViolations={save.violations} vehicles={vehicles} noteOptions={noteOptions} onBack={back}/>;
  if(screen==="license")     return <LicenseTab vehicles={vehicles} saveVehicles={save.vehicles} onBack={back}/>;
  if(screen==="handover")    return <HandoverTab handovers={handovers} saveHandovers={save.handovers} vehicles={vehicles} equipmentList={equipmentList} onBack={back}/>;
  if(screen==="maintenance") return <MaintenanceTab records={maintenanceRecs} saveRecords={save.maint} vehicles={vehicles} fuelRecords={fuelRecords} onBack={back}/>;
  if(screen==="fuel")        return <FuelTab fuelRecords={fuelRecords} saveFuelRecords={save.fuel} vehicles={vehicles} maintenanceRecs={maintenanceRecs} onBack={back}/>;
  if(screen==="settings")    return <SettingsTab noteOptions={noteOptions} saveNoteOptions={save.noteOpts} equipmentList={equipmentList} saveEquipment={save.equipList} savedPw={savedPw} setSavedPw={save.pw} vehicles={vehicles} saveVehicles={save.vehicles} onLogout={logout} onBack={back}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

if("serviceWorker" in navigator) {
  window.addEventListener("load", ()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
}
</script>
