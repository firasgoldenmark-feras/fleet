<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0c14;font-family:'Cairo',sans-serif;direction:rtl;color:#e8eaf0;min-height:100vh;}
input,select,button,textarea{font-family:'Cairo',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#12151f;}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:2px;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
input,select{background:#1a1e2e;border:1px solid #252840;border-radius:10px;padding:11px 14px;color:#e8eaf0;font-size:14px;width:100%;outline:none;}
select option{background:#1a1e2e;}
button{cursor:pointer;}
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}
.header{background:#12151f;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #252840;position:sticky;top:0;z-index:50;}
.header-title{color:#D4AF37;font-size:17px;font-weight:700;}
.back-btn{background:#1a1e2e;border:none;color:#D4AF37;font-size:16px;border-radius:10px;padding:8px 14px;}
.card{background:#12151f;border-radius:16px;margin-bottom:12px;border:1px solid #252840;overflow:hidden;}
.card2{background:#1a1e2e;border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.badge{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11px;white-space:nowrap;}
.stat-box{background:#1a1e2e;border-radius:14px;padding:14px 16px;flex:1;min-width:0;}
.stat-row{display:flex;gap:8px;padding:14px 14px 0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:flex-end;}
.modal-content{background:#12151f;border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px 48px;}
.modal-handle{width:40px;height:4px;background:#252840;border-radius:2px;margin:0 auto 20px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{color:#D4AF37;font-size:17px;font-weight:700;}
.close-btn{background:#222638;border:none;color:#7a8296;border-radius:8px;padding:6px 14px;}
.btn{border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;font-family:'Cairo',sans-serif;}
.btn-gold{background:#D4AF37;color:#000;}
.btn-green{background:#22c55e;color:#000;}
.btn-red{background:#ef4444;color:#fff;}
.btn-blue{background:#3b82f6;color:#fff;}
.btn-outline-sub{background:transparent;border:1.5px solid #7a8296;color:#7a8296;padding:8px 16px;font-size:12px;}
.btn-outline-red{background:transparent;border:1.5px solid #ef4444;color:#ef4444;padding:8px 16px;font-size:12px;}
.btn-sm{padding:8px 16px;font-size:12px;}
.btn-full{width:100%;}
.field-label{color:#7a8296;font-size:12px;display:block;margin-bottom:6px;}
.field-wrap{margin-bottom:14px;}
.tab-bar{display:flex;gap:6px;padding:8px 14px 0;}
.tab-btn{flex:1;background:#12151f;color:#7a8296;border:none;border-radius:10px;padding:9px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;}
.tab-btn.active{background:#D4AF37;color:#000;}
.veh-selector{padding:10px 14px;border-bottom:1px solid #252840;background:#12151f;}
.row-info{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #252840;}
.hidden{display:none!important;}
.text-gold{color:#D4AF37;}
.text-red{color:#ef4444;}
.text-green{color:#22c55e;}
.text-orange{color:#f97316;}
.text-blue{color:#3b82f6;}
.text-sub{color:#7a8296;}
.text-yellow{color:#eab308;}
.section-card{background:#12151f;border-radius:16px;padding:14px 16px;margin-bottom:12px;}
.checkbox-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.checkbox-item input[type=checkbox]{width:18px;height:18px;accent-color:#D4AF37;flex-shrink:0;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.photo-box img{width:100%;height:55px;object-fit:cover;border-radius:8px;}

canvas{touch-action:none;}

.loading{min-height:100vh;background:#0a0c14;display:flex;align-items:center;justify-content:center;text-align:center;}

<body>
<div id="app">
<div class="loading" id="loading-screen">
<div>
<div style="font-size:44px;margin-bottom:12px">🚗</div>
<div style="color:#D4AF37;font-size:16px">جارٍ التحميل...</div>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ══════════════════════════════════════════
// STATE & DB
// ══════════════════════════════════════════
const db = {
get(k){ try{ const v=localStorage.getItem("gm_"+k); return v?JSON.parse(v):null; }catch{ return null; } },
set(k,v){ try{ localStorage.setItem("gm_"+k,JSON.stringify(v)); }catch{} }
};
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const toDateStr = d => d ? new Date(d).toLocaleDateString("ar-JO") : "—";
const daysDiff = (from, to=new Date()) => Math.floor((new Date(to)-new Date(from))/86400000);
const fmt12 = date => { const d=new Date(date); let h=d.getHours(),m=d.getMinutes(); const ap=h>=12?"PM":"AM"; h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`; };
const todayISO = () => new Date().toISOString().split("T")[0];
const sendWA = (phone, msg) => { if(!phone) return; window.open(`https://wa.me/${phone.replace(/D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank"); };
const h = (tag, attrs={}, ...children) => {
const el = document.createElement(tag);
for(const [k,v] of Object.entries(attrs)){
if(k==="style"&&typeof v==="object"){ Object.assign(el.style,v); }
else if(k.startsWith("on")){ el.addEventListener(k.slice(2).toLowerCase(),v); }
else if(k==="className"){ el.className=v; }
else if(k==="htmlFor"){ el.htmlFor=v; }
else if(k==="checked"){ el.checked=v; }
else if(k==="value"&&(tag==="select"||tag==="input"||tag==="textarea")){ el.value=v; }
else{ el.setAttribute(k,v); }
}
for(const c of children.flat()){
if(c===null||c===undefined||c===false) continue;
el.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
}
return el;
};
const DEFAULT_NOTES = ["السائق أبلغ متأخراً","مشكوك في صحتها","جارٍ مراجعة الجهة","السائق رفض الإقرار","تم إيقاف السائق مؤقتاً","أخرى"];
const DEFAULT_EQUIP = ["مفتاح جنط","جك","عاكسة","سبير أمامي","سبير خلفي","ترخيص دعاية وإعلان","طفاية حريق","بطاقة تعبئة الوقود","رخصة المركبة"];
const VTYPES = ["سرعة زائدة","وقوف مخالف","تجاوز إشارة","عدم الالتزام بالحارة","استخدام الجوال","عدم ربط الحزام","أخرى"];
let STATE = {
screen: "login",
savedPw: "1234",
violations: [],
vehicles: [],
handovers: [],
maintenance: [],
fuel: [],
noteOptions: [...DEFAULT_NOTES],
equipList: [...DEFAULT_EQUIP],
myPhone: ""
};
function loadState(){
const pw=db.get("pw2"),v=db.get("violations"),veh=db.get("vehicles"),
h2=db.get("handovers"),m=db.get("maint"),fu=db.get("fuel"),
no=db.get("noteOpts"),eq=db.get("equipList"),ph=db.get("myPhone");
if(pw) STATE.savedPw=pw;
if(v) STATE.violations=v;
if(veh) STATE.vehicles=veh; else db.set("vehicles",[]);
if(h2) STATE.handovers=h2;
if(m) STATE.maintenance=m;
if(fu) STATE.fuel=fu;
if(no) STATE.noteOptions=no;
if(eq) STATE.equipList=eq;
if(ph) STATE.myPhone=ph;
if(localStorage.getItem("gm_loggedin")==="1") STATE.screen="main";
}
function save(key, val){
STATE[key]=val;
const map={violations:"violations",vehicles:"vehicles",handovers:"handovers",maintenance:"maint",fuel:"fuel",noteOptions:"noteOpts",equipList:"equipList",myPhone:"myPhone",savedPw:"pw2"};
if(map[key]) db.set(map[key],val);
}
// ══════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════
function navigate(screen){ STATE.screen=screen; render(); }
function render(){
const app = document.getElementById("app");
app.innerHTML="";
const screens = {
login: renderLogin,
main: renderMain,
myvehicles: renderMyVehicles,
violations: renderViolations,
license: renderLicense,
handover: renderHandover,
maintenance: renderMaintenance,
fuel: renderFuel,
settings: renderSettings
};
const fn = screens[STATE.screen]||renderMain;
app.appendChild(fn());
}
// ══════════════════════════════════════════
// SHARED COMPONENTS
// ══════════════════════════════════════════
function makeHeader(title, onBack, rightEl){
const hdr = h("div",{className:"header"});
if(onBack){
const btn = h("button",{className:"back-btn",onClick:onBack},"← رجوع");
hdr.appendChild(btn);
} else { hdr.appendChild(h("div",{style:{width:"80px"}})); }
hdr.appendChild(h("span",{className:"header-title"},title));
const rw = h("div",{style:{width:"80px",textAlign:"left"}});
if(rightEl) rw.appendChild(rightEl);
hdr.appendChild(rw);
return hdr;
}
function makeModal(title, contentFn, onClose){
const overlay = h("div",{className:"modal-overlay",onClick:onClose});
const content = h("div",{className:"modal-content",onClick:e=>e.stopPropagation()});
content.appendChild(h("div",{className:"modal-handle"}));
const mh = h("div",{className:"modal-header"});
mh.appendChild(h("h2",{className:"modal-title"},title));
mh.appendChild(h("button",{className:"close-btn",onClick:onClose},"✕"));
content.appendChild(mh);
const body = contentFn();
if(body) content.appendChild(body);
overlay.appendChild(content);
return overlay;
}
function showModal(title, contentFn){
const modal = makeModal(title, contentFn, ()=>modal.remove());
document.body.appendChild(modal);
return modal;
}
function makeField(label, val, onChange, type="text", placeholder="", req=false){
const wrap = h("div",{className:"field-wrap"});
if(label) wrap.appendChild(h("label",{className:"field-label"},label+(req?" *":"")));
const inp = h("input",{type, value:val||"", placeholder});
inp.addEventListener("input",e=>onChange(e.target.value));
wrap.appendChild(inp);
return {wrap, inp};
}
function makeSelect(label, val, onChange, opts, req=false){
const wrap = h("div",{className:"field-wrap"});
if(label) wrap.appendChild(h("label",{className:"field-label"},label+(req?" *":"")));
const sel = h("select");
sel.appendChild(h("option",{value:""},"— اختر —"));
opts.forEach(o=>{
const v=o.v||o, l=o.l||o;
const opt=h("option",{value:v},l);
if(v===val) opt.selected=true;
sel.appendChild(opt);
});
sel.addEventListener("change",e=>onChange(e.target.value));
wrap.appendChild(sel);
return {wrap, sel};
}
function makeBtn(label, onClick, cls="btn btn-gold btn-full"){
const btn = h("button",{className:cls,onClick},label);
return btn;
}
function makeBadge(label, color){
const s = h("span",{className:"badge"},label);
s.style.background=color+"22"; s.style.color=color; s.style.border=`1px solid ${color}44`;
return s;
}
function makeStatBox(icon, label, value, color="#D4AF37"){
const box = h("div",{className:"stat-box",style:{borderTop:`3px solid ${color}`}});
box.appendChild(h("div",{style:{fontSize:"22px"}},icon));
box.appendChild(h("div",{style:{color,fontSize:"20px",fontWeight:"700",marginTop:"4px",lineHeight:"1"}},String(value)));
box.appendChild(h("div",{style:{color:"#7a8296",fontSize:"11px",marginTop:"4px",lineHeight:"1.3"}},label));
return box;
}
function makeVehicleSelector(selected, onChange){
const wrap = h("div",{className:"veh-selector"});
const sel = h("select",{style:{background:"#1a1e2e",border:"1px solid rgba(212,175,55,0.27)",borderRadius:"10px",padding:"10px 14px",color:selected?"#D4AF37":"#7a8296",fontSize:"14px",fontWeight:"600"}});
sel.appendChild(h("option",{value:""},"— اختر المركبة —"));
STATE.vehicles.forEach(v=>{
const opt=h("option",{value:v.id},v.plate+(v.type?` — ${v.type}`:""));
if(v.id===selected) opt.selected=true;
sel.appendChild(opt);
});
sel.addEventListener("change",e=>onChange(e.target.value));
wrap.appendChild(sel);
return wrap;
}
// ══════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════
function buildNotifications(){
const notes=[];
STATE.violations.filter(v=>v.status!=="مسددة").forEach(v=>{
const r=30-daysDiff(v.vdate);
if(r<=0) notes.push({id:"viol-"+v.id,icon:"⛔",title:"مخالفة — انتهت المهلة",body:`${v.plate} — ${v.vtype}`,color:"#ef4444",tab:"violations",priority:true});
else if(r<=5) notes.push({id:"viol-"+v.id,icon:"🔴",title:`مخالفة — ${r} أيام متبقية`,body:`${v.plate} — ${v.vtype}`,color:"#ef4444",tab:"violations",priority:true});
else if(r<=10) notes.push({id:"viol-"+v.id,icon:"🟠",title:`مخالفة — ${r} يوم متبقي`,body:`${v.plate}`,color:"#f97316",tab:"violations"});
});
STATE.vehicles.forEach(v=>{
const chk=(exp,label)=>{
if(!exp) return;
const diff=daysDiff(new Date(),exp);
if(diff>=0) notes.push({id:"lic-"+v.id+label,icon:"🔴",title:`${label} منتهي`,body:v.plate,color:"#ef4444",tab:"license",priority:true});
else{ const r=Math.abs(diff);
if(r<=3) notes.push({id:"lic-"+v.id+label,icon:"🔴",title:`${label} — ${r} أيام`,body:v.plate,color:"#ef4444",tab:"license",priority:true});
else if(r<=7) notes.push({id:"lic-"+v.id+label,icon:"🟠",title:`${label} — ${r} أيام`,body:v.plate,color:"#f97316",tab:"license"});
else if(r<=14) notes.push({id:"lic-"+v.id+label,icon:"🟡",title:`${label} — ${r} يوم`,body:v.plate,color:"#eab308",tab:"license"});
}
};
if(v.license_exp) chk(v.license_exp,"الترخيص");
if(v.insurance_exp) chk(v.insurance_exp,"التأمين");
});
STATE.vehicles.forEach(v=>{
const fRecs=STATE.fuel.filter(r=>r.vehicleId===v.id).sort((a,b)=>b.currKm-a.currKm);
const currKm=fRecs.length?fRecs[0].currKm:null;
const mRecs=STATE.maintenance.filter(r=>r.vehicleId===v.id).sort((a,b)=>a.oilKm-b.oilKm);
if(!mRecs.length) return;
const last=mRecs[mRecs.length-1];
const nextOil=last.nextOilKm||(last.oilKm+5000);
if(currKm){
const diff=nextOil-currKm;
if(diff<=0) notes.push({id:"maint-"+v.id,icon:"🔴",title:"غيار زيت متأخر",body:`${v.plate} — تجاوز ${Math.abs(diff).toLocaleString()} كلم`,color:"#ef4444",tab:"maintenance",priority:true});
else if(diff<=500) notes.push({id:"maint-"+v.id,icon:"🟠",title:"غيار زيت قريب",body:`${v.plate} — ${diff.toLocaleString()} كلم`,color:"#f97316",tab:"maintenance"});
}
});
return notes;
}
// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
function renderLogin(){
const wrap = h("div",{style:{minHeight:"100vh",background:"#0a0c14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}});
wrap.appendChild(h("div",{style:{fontSize:"56px",marginBottom:"12px"}},"🚗"));
wrap.appendChild(h("h1",{style:{color:"#D4AF37",fontSize:"28px",fontWeight:"800",margin:"0"}},"الأثر الذهبي"));
wrap.appendChild(h("p",{style:{color:"#7a8296",fontSize:"13px",marginTop:"6px",marginBottom:"44px"}},"نظام إدارة أسطول المركبات"));
const card = h("div",{style:{width:"100%",maxWidth:"380px",background:"#12151f",borderRadius:"24px",padding:"28px",border:"1px solid #252840"}});
const userBox = h("div",{style:{background:"#1a1e2e",borderRadius:"12px",padding:"12px 16px",marginBottom:"18px"}});
userBox.appendChild(h("div",{style:{color:"#7a8296",fontSize:"11px",marginBottom:"4px"}},"اسم المستخدم"));
userBox.appendChild(h("div",{style:{color:"#e8eaf0",fontSize:"15px",fontWeight:"600"}},"فراس عمران"));
card.appendChild(userBox);
let pw="";
const {wrap:fw, inp:pwInp} = makeField("كلمة المرور","","v=>{pw=v}","password","أدخل كلمة المرور");
pwInp.addEventListener("input",e=>pw=e.target.value);
card.appendChild(fw);
const errMsg = h("p",{style:{color:"#ef4444",fontSize:"13px",margin:"0 0 12px",textAlign:"center",display:"none"}});
card.appendChild(errMsg);
card.appendChild(makeBtn("دخول →",()=>{
if(pw===STATE.savedPw){ localStorage.setItem("gm_loggedin","1"); navigate("main"); }
else{ errMsg.style.display="block"; errMsg.textContent="كلمة المرور غير صحيحة ❌"; }
}));
wrap.appendChild(card);
return wrap;
}
// ══════════════════════════════════════════
// MAIN SCREEN
// ══════════════════════════════════════════
function renderMain(){
const wrap = h("div",{style:{minHeight:"100vh",background:"#0a0c14"}});
const notes = buildNotifications();
const count = notes.length;
// Top bar
const topbar = h("div",{style:{background:"#12151f",padding:"22px 20px 18px",borderBottom:"1px solid #252840",display:"flex",justifyContent:"space-between",alignItems:"center"}});
const titleDiv = h("div");
titleDiv.appendChild(h("h1",{style:{color:"#D4AF37",fontSize:"21px",fontWeight:"800",margin:"0"}},"الأثر الذهبي 🏆"));
titleDiv.appendChild(h("p",{style:{color:"#7a8296",fontSize:"12px",margin:"4px 0 0"}},"نظام إدارة أسطول المركبات"));
topbar.appendChild(titleDiv);
const btns = h("div",{style:{display:"flex",gap:"8px"}});
if(STATE.myPhone&&count>0){
btns.appendChild(makeBtn("📲",()=>{
const priority=notes.filter(n=>n.priority);
if(!priority.length) return;
let msg="🚨 *تنبيهات عاجلة — أسطول الأثر الذهبي*
";
priority.forEach(n=>{ msg+=`${n.icon} ${n.title}
${n.body}
`; });
sendWA(STATE.myPhone,msg);
},"btn",));
}
const notifBtn = h("button",{style:{background:"#1a1e2e",border:`1px solid ${count>0?"#D4AF37":"#252840"}`,color:"#7a8296",borderRadius:"12px",padding:"10px 14px",fontSize:"18px",position:"relative"}});
notifBtn.textContent="🔔";
if(count>0){
const badge=h("span",{className:"notif-badge"},String(count));
notifBtn.appendChild(badge);
}
notifBtn.addEventListener("click",()=>showNotificationsModal(notes));
btns.appendChild(notifBtn);
btns.appendChild(makeBtn("⚙️",()=>navigate("settings"),"btn",));
topbar.appendChild(btns);
wrap.appendChild(topbar);
const content = h("div",{style:{padding:"20px 16px"}});
const tabs=[
{id:"myvehicles",icon:"🚗",label:"مركباتي",sub:"ملخص شامل لجميع مركبات الشركة",color:"#D4AF37"},
{id:"violations",icon:"🚨",label:"المخالفات",sub:"متابعة مخالفات المركبات وتنبيهات الدفع",color:"#ef4444"},
{id:"license",icon:"📋",label:"الترخيص والتأمين",sub:"تواريخ الانتهاء والتجديد والسجل",color:"#3b82f6"},
{id:"handover",icon:"🔑",label:"الاستلام والتسليم",sub:"حركة المركبات اليومية وعدة السيارة",color:"#22c55e"},
{id:"maintenance",icon:"🔧",label:"الصيانة",sub:"غيار الزيت والفلاتر والبريكات",color:"#f97316"},
{id:"fuel",icon:"⛽",label:"المحروقات",sub:"تعبئة الوقود وتكلفة الكيلومتر",color:"#3b82f6"},
];
tabs.forEach(t=>{

function showSignaturePad(onSave){
const overlay=h("div",{className:"modal-overlay"});
const content=h("div",{className:"modal-content",onClick:e=>e.stopPropagation()});
content.appendChild(h("div",{className:"modal-handle"}));
const mh=h("div",{className:"modal-header"});
mh.appendChild(h("h2",{className:"modal-title"},"توقيع السائق"));
mh.appendChild(h("button",{className:"close-btn",onClick:()=>overlay.remove()},"✕"));
content.appendChild(mh);
content.appendChild(h("p",{style:{color:"#7a8296",fontSize:"12px",marginBottom:"8px",textAlign:"center"}},"وقّع بإصبعك في المنطقة أدناه"));
const canvas=h("canvas",{width:320,height:160,className:"sig-canvas"});
content.appendChild(canvas);
const ctx=canvas.getContext("2d");
ctx.fillStyle="#1a1e2e"; ctx.fillRect(0,0,320,160);
ctx.strokeStyle="#252840"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(20,120); ctx.lineTo(300,120); ctx.stroke();
let drawing=false, lastPos=null;
const getPos=(e)=>{ const rect=canvas.getBoundingClientRect(); const touch=e.touches?e.touches[0]:e; return{x:(touch.clientX-rect.left)*(canvas.width/rect.width),y:(touch.clientY-rect.top)*(canvas.height/rect.height)}; };
canvas.addEventListener("mousedown",e=>{ drawing=true; lastPos=getPos(e); });
canvas.addEventListener("mousemove",e=>{ if(!drawing) return; const pos=getPos(e); ctx.beginPath(); ctx.moveTo(lastPos.x,lastPos.y); ctx.lineTo(pos.x,pos.y); ctx.strokeStyle="#D4AF37"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.stroke(); lastPos=pos; });
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("touchstart",e=>{ e.preventDefault(); drawing=true; lastPos=getPos(e); },{passive:false});
canvas.addEventListener("touchmove",e=>{ e.preventDefault(); if(!drawing) return; const pos=getPos(e); ctx.beginPath(); ctx.moveTo(lastPos.x,lastPos.y); ctx.lineTo(pos.x,pos.y); ctx.strokeStyle="#D4AF37"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.stroke(); lastPos=pos; },{passive:false});
canvas.addEventListener("touchend",e=>{ e.preventDefault(); drawing=false; },{passive:false});
const btnRow=h("div",{style:{display:"flex",gap:"8px",marginTop:"12px"}});
btnRow.appendChild(makeBtn("مسح",()=>{ ctx.fillStyle="#1a1e2e"; ctx.fillRect(0,0,320,160); ctx.strokeStyle="#252840"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(20,120); ctx.lineTo(300,120); ctx.stroke(); },"btn btn-outline-sub btn-sm"));
btnRow.appendChild(makeBtn("إلغاء",()=>overlay.remove(),"btn btn-outline-red btn-sm"));
const saveBtn=makeBtn("✓ حفظ التوقيع",()=>{ onSave(canvas.toDataURL()); overlay.remove(); },"btn btn-gold");
saveBtn.style.flex="1";
btnRow.appendChild(saveBtn);
content.appendChild(btnRow);
overlay.appendChild(content);
document.body.appendChild(overlay);
}

function renderMaintenance(){

const calcStatus=id=>{
const vr=STATE.maintenance.filter(r=>r.vehicleId===id).sort((a,b)=>a.oilKm-b.oilKm);
const fRecs=STATE.fuel.filter(r=>r.vehicleId===id).sort((a,b)=>b.currKm-a.currKm);
const latestFuelKm=fRecs.length?fRecs[0].currKm:null;
if(!vr.length) return{noData:true,latestFuelKm};
const last=vr[vr.length-1];
const nextOil=last.nextOilKm||(last.oilKm+5000);
const alerts=[];
if((last.filterOil||0)>=2) alerts.push({label:"فلتر الزيت"});
if((last.filterDiesel||0)>=3) alerts.push({label:"فلتر الديزل"});
if((last.filterAir||0)>=3) alerts.push({label:"فلتر الهواء"});
if((last.brakes||0)>=3) alerts.push({label:"البريكات"});
const twoMo=new Date(); twoMo.setMonth(twoMo.getMonth()-2);
const noService=new Date(last.date)<twoMo;
let oilFromFuel=null;
if(latestFuelKm){ const diff=nextOil-latestFuelKm; if(diff<=0) oilFromFuel={msg:`عداد المحروقات تجاوز موعد الغيار بـ ${Math.abs(diff).toLocaleString()} كلم`,color:"#ef4444"}; else if(diff<=500) oilFromFuel={msg:`موعد غيار الزيت خلال ${diff.toLocaleString()} كلم`,color:"#f97316"}; }
return{nextOil,lastKm:last.oilKm,lastDate:last.date,filterOil:last.filterOil||1,filterDiesel:last.filterDiesel||1,filterAir:last.filterAir||1,brakes:last.brakes||1,alerts,noService,latestFuelKm,oilFromFuel};
};

function importExcel(file, onDone){
const reader=new FileReader();
reader.onload=e=>{
try{
const wb=XLSX.read(e.target.result,{type:"array"});
const ws=wb.Sheets[wb.SheetNames[0]];
const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
if(!data.length) return;
const hdrs=data[0].map(h=>String(h).trim());
const lower=hdrs.map(h=>String(h).toLowerCase().trim());
const match=kws=>{ const i=lower.findIndex(h=>kws.some(k=>h.includes(k))); return i>=0?hdrs[i]:null; };
const plateCol=match(["لوحة","plate","رقم المركب","رقم السيار","vehicle"]);
if(!plateCol){ alert("لم يتم التعرف على عمود اللوحة"); return; }
const pI=hdrs.indexOf(plateCol);
const rows=data.slice(1).filter(r=>r.some(c=>c!=="")).map(r=>({ id:uid(), plate:String(r[pI]||"").trim(), type:"", make:"", regNum:"", license_exp:"", insurance_exp:"", renewHistory:[] })).filter(r=>r.plate);
const existing=STATE.vehicles.filter(v=>!rows.some(p=>p.plate===v.plate));
save("vehicles",[...existing,...rows]);
alert(`✅ تم استيراد ${rows.length} مركبة`);
onDone();
}catch(err){ alert("خطأ في قراءة الملف"); }
};
reader.readAsArrayBuffer(file);
}
